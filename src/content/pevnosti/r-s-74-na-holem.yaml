# === HISTORIE ===
history: >
  R-S 74 „Na holém" byl postaven v letech 1937–1938 firmou Záruba-Pfeffermann
  jako předsunutý srub tvrze Hanička. Oboustranný typ II. stupně, plánovaná
  posádka 32 mužů pod velením por. Miloslava Šimečka.


  V září 1938 plně obsazen a vyzbrojen. Po Mnichovu evakuován, během okupace
  Němci demontovali pancéřové prvky. V letech 1946–1947 znovu krátce obsazen
  v rámci pokusu o oživení obrany, poté opuštěn.


  V 60. letech v rámci armádního projektu „Kahan" spolu s tvrzí Haničkou
  převzat a adaptován pro sklady civilní obrany. Systematická muzejní
  rekonstrukce proběhla v letech 2004–2012 spolkem Klub vojenské historie
  Rokytnice. Obnovena dvě střelecká stanoviště, strojovna, ubikace a
  zásobovací prostory.

