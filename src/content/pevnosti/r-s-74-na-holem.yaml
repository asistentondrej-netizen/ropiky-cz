description: >
  Rekonstruovaný oboustranný pěchotní srub na exponovaném hřebenu Orlických
  hor — součást muzejního okruhu tvrze Hanička. Samostatná muzejní expozice
  zaměřená na posádku a organizaci boje. Ideální rozšíření návštěvy tvrze
  Hanička na celodenní program.

