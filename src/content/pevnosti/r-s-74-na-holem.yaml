# === NÁVŠTĚVA ===
visit: >
  Samostatná muzejní expozice doplňující prohlídku tvrze Hanička. Otevřeno
  víkendy a svátky duben–říjen 10:00–17:00, v hlavní sezóně denně. Společná
  vstupenka s tvrzí Hanička (300 Kč dospělí, úspora 50 Kč). Každoročně
  první víkend v září Den posádky s rekonstrukcí bojové pohotovosti 1938.
  Aktuální program na hanicka.cz.

