title: R-S 74 „Na holém"
code: R-S 74
type: pechotni-srub
line: Rokytnice v Orlických horách
region: Královéhradecký kraj
location:
  lat: 50.1753
  lon: 16.4728
  address: Rokytnice v Orl. horách, hřeben
built: '1938'
state: muzeum
description: Rekonstruovaný oboustranný pěchotní srub na exponovaném hřebenu Orlických
  hor. Součást muzejního okruhu tvrze Hanička, vlastní expozice o posádce a organizaci
  boje.
history: 'R-S 74 „Na holém" byl postaven v letech 1937–1938 firmou Záruba-Pfeffermann
  Brno jako předsunutý srub tvrze Hanička. Oboustranný typ II. stupně, výzbroj 4 TK
  + 1 PTK, plánovaná posádka 32 mužů.


  V září 1938 plně obsazen a vyzbrojen pod velením por. Miloslava Šimečka. Po Mnichovu
  evakuován, během okupace Němci demontovali pancéřové prvky. V letech 1946–1947 znovu
  obsazen v rámci pokusu o oživení obrany proti novým hrozbám, poté opuštěn.


  Systematická rekonstrukce proběhla v letech 2004–2012 spolkem **Klub vojenské historie
  Rokytnice**. Byla obnovena dvě střelecká stanoviště, strojovna, ubikace a část zásobovacích
  prostor.'
visit: 'R-S 74 „Na holém" je **samostatná muzejní expozice** doplňující prohlídku
  tvrze Hanička. Doporučujeme navštívit jako součást **celodenního programu Orlické
  hory**.


  **Otevírací doba:** Víkendy a svátky duben–říjen, 10:00–17:00. V hlavní sezóně (červen–srpen)
  denně. Prohlídka s průvodcem každou celou hodinu. Aktuální otevírací doba a rezervace
  prohlídky na hanicka.cz.


  **Vstupné:** 80 Kč dospělí, 40 Kč děti, rodinná vstupenka 180 Kč. **Společná vstupenka
  s tvrzí Hanička**: 300 Kč dospělí (úspora 50 Kč).


  **Délka prohlídky:** 45 minut s průvodcem.


  **Jak se tam dostat:**


  - Autem: 40 km východně od Rychnova nad Kněžnou po silnici 310, pak odbočka do Rokytnice
  a 2 km pěšky od tvrze Hanička

  - Autobusem: linka 790 z Rychnova (nejlépe ve víkend)

  - Pěšky z Rokytnice: 1 hodina po červené turistické značce


  **Co zde uvidíte:**


  - **Rekonstruované střelecké stanoviště** s replikou TK vz. 37 v lafetě M

  - **Dobové ubikace posádky** (32 mužů) — lůžka, kuchyně, stoly, dokumenty

  - **Strojovna** s dieselagregátem (repliku)

  - **Dochované pancéřové prvky** (2 zvony)

  - **Unikátní expozice o životě v srubu** — osobní věci vojáků, dopisy, fotografie


  **Doporučený celodenní program:**


  - 9:00: Příjezd do Rokytnice, parkování u tvrze Hanička

  - 9:30–12:00: **Tvrz Hanička** (podzemní prohlídka 2 h + expozice civilní obrany
  30 min)

  - 12:00–13:00: Oběd v restauraci Rokytnické Hanička

  - 13:00–15:00: **R-S 74 „Na holém"** (45 min) + procházka po naučné stezce po sousedních
  srubech (45 min)

  - 15:00–17:00: Volný program — hřeben Orlických hor, pěší turistika


  **Speciální akce:** Každoročně **první víkend v září** se zde koná **Den posádky**
  s rekonstrukcí bojové pohotovosti z roku 1938. Ukázky střeleb, dobová strava, vojenský
  koncert. Velká rodinná akce.'
