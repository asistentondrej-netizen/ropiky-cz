line: Opava
region: "Moravskoslezský kraj"
location:
  lat: 49.9524
  lon: 17.7758
  elevation: 374
  address: Jamnice
state: zachovaly

description: >
  Rozestavěná dělostřelecká tvrz u Jamnice na úseku Opavy. Součástí čs. opevnění 1935–1938, výstavba nebyla dokončena před Mnichovem 1938.

history: >
  Tvrz Šibenice byla součástí plánu výstavby čs. opevnění 1935–1938.
  Realizace byla přerušena po Mnichovské dohodě 30. 9. 1938, tvrz zůstala
  nedokončená. Některé betonové objekty jsou dodnes patrné v krajině.

visit: >
  Tvrz je **rozestavěná** — jednotlivé objekty jsou volně přístupné v terénu,
  ale bez interiérů a vybavení. Před návštěvou ověřte přístupnost, některé
  části mohou být na soukromých pozemcích.

