built: '1937'
state: pristupny
description: Řopíky podél dnešní moravsko-rakouské hranice v okolí památkového UNESCO území Lednicko-valtického areálu.
history: 'Linie kolem Valtic byla budována jako součást obrany proti tehdejšímu Rakousku. Po Anschlussu 1938 se stala frontovou
  linií.


  Po záboru jihomoravské oblasti Říší v říjnu 1938 se většina objektů dostala do německých rukou a byla využita k výcviku.
  Po válce byly některé objekty rozprášeny, jiné přežily.


  Dnes jsou součástí turistických tras po Lednicko-valtickém areálu — kontrast barokní krajiny a betonových objektů tvoří
  výrazný krajinný prvek.

  '
visit: 'Řopíky v Lednicko-valtickém areálu — obranná linie podél rakouských hranic. Neobvyklá kombinace UNESCO památky a vojenské
  architektury 30. let.


  **Přístup:** volně, 24/7. Objekty jsou rozptýlené v lesích areálu, většina volně přístupná pouze zvenčí.


  **Co uvidíte:** cca 20 řopíků LO vz. 37 rozesetých kolem Valtic, Lednice a Břeclavi. Některé v parku přímo mezi klasicistními
  památkami, jiné v lužních lesích podél Dyje. Objekty jsou většinou polozarostlé, některé v dobrém stavu.


  **Doporučená délka:** půl dne pro 4–6 řopíků, celý den v kombinaci s památkami areálu (zámky, Kolonáda, Minaret).


  **Dostupnost:** Autem z Břeclavi (5 km) nebo z Brna po D2 (60 km). Cyklisté po Moravské vinařské stezce. Vlakem do Lednice
  + pěšky/kolo.


  **Doporučeno kombinovat s:** zámkem Lednice a Valtice (UNESCO), Minaretem, Janohradem. Kombinace „opevnění + UNESCO + příroda
  Dyje" — unikátní v ČR. Ideální pro rodinný výlet.'
