description: Řopíky podél dnešní moravsko-rakouské hranice v okolí památkového UNESCO území Lednicko-valtického areálu.
history: 'Linie kolem Valtic byla budována jako součást obrany proti tehdejšímu Rakousku. Po Anschlussu 1938 se stala frontovou linií.


  Po záboru jihomoravské oblasti Říší v říjnu 1938 se většina objektů dostala do německých rukou a byla využita k výcviku. Po válce byly některé objekty rozprášeny, jiné přežily.


  Dnes jsou součástí turistických tras po Lednicko-valtickém areálu — kontrast barokní krajiny a betonových objektů tvoří výrazný krajinný prvek.

  '
visit: 'Průchozí cyklotrasy vedou kolem několika řopíků — ideální jako doplněk prohlídky zámků Valtice a Lednice.

  '
