description: 'Pěchotní srub v liberecké linii těžkého opevnění, součást obrany severních hranic. Dnes v pokročilém stupni rozpadu.'
history: |
  Liberecká linie (Li) byla budována v druhé polovině 30. let na ochranu severočeské průmyslové oblasti. Stavba postupovala v obtížných horských podmínkách Jizerských hor.

  Po Mnichovu objekty zabrány Wehrmachtem, výzbroj odvezena. Po válce většinu objektů nikdo systematicky neudržoval.
visit: |
  Objekty v zarostlém terénu, součást turistických tras v Jizerkách. Vnitřky většinou zatopené.
