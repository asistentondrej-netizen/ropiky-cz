title: Řopík 5/143/1 — Valtice, Boří les jih
code: 5/143/1
type: lo-vz-37
line: Valticko — jižní Morava
region: Jihomoravský kraj
location:
  lat: 48.72852
  lon: 16.77366
  address: Boří les jižně od Valtic, směr Kolonáda Rajstna
built: '1937'
state: pristupny
description: Řopík v lese jižně od Valtic — nejbližší objekt ke Kolonádě Rajstna (vzdálenost cca 1,6 km severovýchodně od Kolonády). Součást linie, která kryla přístup od rakouské hranice.
history: |
  Objekt 5/143/1 byl betonován v roce 1937 jako bod obrany jižního předpolí Valtic. Okolí Kolonády Rajstna mělo v té době strategický význam — odsud byl pozorovací výhled na rakouské území. V září 1938 přichystán ke střelbě, osádka tři vojáci, vyzbrojen kulomety ZB vz. 26. Po Mnichovu opuštěn. Za okupace ponechán v lese bez využití.
visit: |
  Řopík uprostřed Boří lesa — stinná a klidná atmosféra.
  
  **Přístup:** volně, 24/7. Po lesních cestách 30 min pěšky od Kolonády Rajstna směr severovýchod.
  
  **Co uvidíte:** Standardní LO vz. 37, dvě střílny, zachovaná střecha. Obrůstá bříza a akát.
  
  **Doporučená délka:** 20 minut.
  
  **Dostupnost:** Nejlépe v kombinaci s pěším výletem od Kolonády Rajstna přes Boří les. Na kole po lesních cyklotrasách.
  
  **Doporučeno kombinovat s:** Kolonádou Rajstna, zámkem Valtice, dalšími objekty v Boří lese.
