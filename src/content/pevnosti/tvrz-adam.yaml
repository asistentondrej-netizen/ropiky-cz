# === NÁVŠTĚVA ===
visit: >
  Tvrz Adam je standardně veřejnosti **nepřístupná**. Občas se pořádají
  speciální prohlídky pro odborné skupiny nebo při vybraných akcích
  Klubu vojenské historie. Sledujte oznámení Králického pevnostního areálu
  nebo Královéhradeckého kraje. Exteriér bojových srubů lze navštívit
  samostatně — jsou viditelné z turistických stezek.

