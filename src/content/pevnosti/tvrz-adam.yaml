# === HISTORIE ===
history: >
  Tvrz Adam je třetí a zároveň nejvýše položenou tvrzí Králické linie —
  nachází se v nadmořské výšce přes 800 m u Českých Petrovic. Stavba probíhala
  souběžně s Boudou a Hůrkou v letech 1936–1938.


  Komplex tvoří čtyři bojové sruby (K-S 11 „U lesa", K-S 10 „U silničky",
  K-S 9 „Pod hřbitovem", K-S 8 „U obce") a vchodový srub K-S 11a, propojené
  přibližně 1 000 m podzemních chodeb.


  Po Mnichovu byla tvrz odevzdána Wehrmachtu bez boje. Po roce 1945 ji
  převzala Československá lidová armáda a do 90. let ji využívala jako
  muniční sklad. Na rozdíl od Boudy a Hůrky přešla po privatizaci do soukromých
  rukou a veřejnosti zůstává zpravidla uzavřena. Občas se pořádají speciální
  prohlídky pro odborné skupiny nebo při vybraných příležitostech.

