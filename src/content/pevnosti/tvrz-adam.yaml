description: >
  Plně dokončená dělostřelecká tvrz, třetí z trojice Bouda–Hůrka–Adam
  v Králickém pevnostním areálu. Nachází se v blízkosti Českých Petrovic
  v nadmořské výšce přes 800 m. V současnosti je veřejnosti nepřístupná
  (objekt v rukou soukromého vlastníka), občas se pořádají výjimečné akce.

