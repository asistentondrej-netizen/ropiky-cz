description: 'Plně dokončená tvrz, třetí z trojice Bouda–Hůrka–Adam v Králickém pevnostním areálu. Nachází se v soukromém vlastnictví, veřejnosti zpravidla nepřístupná.'
history: |
  Tvrz Adam byla dokončena v roce 1938 jako třetí z „králické trojice" tvrzí. Po Mnichovu sloužila Wehrmachtu, po válce čs. armádě jako muniční sklad.

  Na rozdíl od Boudy a Hůrky je Adam dnes v soukromém vlastnictví a veřejnosti zpravidla nepřístupný. Občas se pořádají výjimečné akce nebo prohlídky pro odborné skupiny.
visit: |
  Standardně uzavřeno. Sledujte informace Královéhradeckého kraje a Klubu vojenské historie, kteří občas pořádají speciální prohlídky.
