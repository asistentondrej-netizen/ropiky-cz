title: Řopík LO vz. 37 Hnanice (Gnadlersdorf)
code: LO Hnanice
type: lo-vz-37
line: Jižní Morava (Podyjí)
region: Jihomoravský kraj
location:
  lat: 48.8092
  lon: 15.9821
  address: Hnanice (Gnadlersdorf), poblíž česko-rakouské hranice
built: '1937'
state: pristupny
description: Jeden z nejfotogennějších řopíků v ČR — atypicky umístěný přímo u česko-rakouské hranice. Symbolický objekt linie
  Podyjí.
history: 'Řopík byl betonován v letech 1937–1938 jako součást přihraniční linie v Podyjí. Po Mnichovu ztracen spolu s pohraničím,
  v letech 1939–1945 v rakouském (resp. německém) Gnadlersdorfu. Po válce vrácen, nikdy nevyhoštěn.


  Objekt je populární mezi turisty díky otevřenému umístění a krásnému kontextu historické hranice Československa.

  '
visit: 'Jeden z nejhezčích řopíků na zážitek — kontext česko-rakouské hranice a Podyjského národního parku.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** LO vz. 37 typu B (oboustranný) — střílny, vchodová kazemata, stopy překážek. Objekt stojí u cyklostezky
  v polích s výhledem na Rakousko.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** Autem ze Znojma (8 km) na Hnanice. Cyklisté po Moravské vinařské stezce nebo Kyjovské. Pěšky z Šatova (4
  km).


  **Doporučeno kombinovat s:** NP Podyjí, vinařstvím Šobes, hradem Vranov nad Dyjí, Šatovským vinařským sklepem, řopíkem u
  Hevlína.

  '
