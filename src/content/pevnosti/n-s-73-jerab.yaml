title: N-S 73 „Jeřáb"
code: N-S 73
type: pechotni-srub
line: Náchod
region: Královéhradecký kraj
location:
  lat: 50.4078
  lon: 16.1783
  elevation: 453
  address: Dobrošov, nad tvrzí
built: '1938'
state: zachovaly
description: Zachovalý jednostranný pěchotní srub s výhledem na Náchod. Součást obranného
  pásma tvrze Dobrošov, dostupný z naučné stezky. Oblíbený cíl rodinných výletů díky
  kombinaci historie a výhledu.
history: 'N-S 73 byl postaven v letech 1937–1938 firmou Lanna jako jeden z předsunutých
  srubů chránících přístup k dělostřelecké tvrzi Dobrošov. Srub II. stupně odolnosti,
  výzbroj plánovaná 2 těžké kulomety vz. 37 ve bočních střílnách.


  V září 1938 byl plně obsazen posádkou 22 mužů pod velením por. Karla Jiříčka. Po
  Mnichovu evakuován, během okupace Němci demontovali pancéřové zvony a střílny. Beton
  zůstal neporušen.


  Po válce objekt nevyužíván. Od 90. let v péči Klubu vojenské historie Náchod, který
  ho částečně zpřístupnil a vystavil informační panely.'
visit: "Srub je **volně přístupný** jako součást **naučné stezky Dobrošov**, která\
  \ propojuje tvrz Dobrošov s okolními pěchotními sruby. Trasa vhodná pro pěší i cyklisty.\n\
  \n**Jak se tam dostat:**\n\n- Pěšky z parkoviště tvrze Dobrošov: 1,5 km po modré\
  \ turistické značce (~25 min)\n- Cyklistům: po silnici 301 z Náchoda směr Dobrošov,\
  \ pak polní cestou\n- Autem: možné zastavení u Zelené brány Dobrošova (parkování\
  \ 50 Kč)\n\n**Na místě:** \n\n- Venkovní prohlídka srubu (stěny tl. 1,5 m, dochovaná\
  \ střelecká místnost)\n- Informační panel s historií a mapou pevnostního pásma Dobrošov\n\
  - Výhled na Náchod, hřeben Krkonoš a Kladsko\n- Lavičky a piknik místo\n\n**Pro\
  \ pevnostní turisty:** N-S 73 je výchozím bodem pro návštěvu pěti dalších srubů\
  \ na naučné stezce (N-S 72, N-S 74, N-S 75, N-S 76). Celá trasa cca 4 km, 2–3 hodiny\
  \ pěší chůze.\n\n**Doporučená kombinace:** Tvrz Dobrošov (podzemní prohlídka 2,5\
  \ h) + srub N-S 82 „Březinka\" (muzeum, 1,5 h) = **celodenní fortifikační okruh\
  \ Náchodska** s hlubokým zážitkem.\n\n**Bezpečnost:** Uvnitř srubu nebezpečí zranění\
  \ (prosakující voda, ostré hrany). Doporučena venkovní prohlídka s informacemi z\
  \ panelu."
