title: Řopík 8/9/A-160 — u Janohradu
code: 8/9/A-160 Janohrad
type: lo-vz-37
line: B-4 Úvaly — Břeclav
region: Jihomoravský kraj
location:
  lat: 48.7962
  lon: 16.8292
  address: Lednice — u novogotické zříceniny Janův hrad, lužní les
built: '1937'
state: pristupny
description: Řopík v lužním lese u Janohradu — kontrastní souseda novogotické romantické
  „zříceniny" z roku 1810 s betonem 30. let. Jeden z nejpřekvapivějších objektů lednicko-valtického
  areálu.
history: 'Betonován v říjnu 1937 na toku Dyje, kde linie využívala řeku jako přirozenou
  překážku. Objekt kryl přechod přes lávky a brody v lužním lese.


  V září 1938 osazen, ale kvůli hustému porostu bylo vedení palby komplikované. Po
  Mnichovu opuštěn.


  Za války objekt využívali čeští partyzáni jako úkryt — v roce 1944 zde ukryli zbraně
  pro skupinu „Jarmila", která operovala na jižní Moravě. Po válce zapomenut do 80.
  let, kdy jej znovu objevili ochránci přírody LVA.

  '
visit: 'Řopík uprostřed UNESCO parku — kousek od Janohradu. Dokonalá ukázka, jak se
  vojenská architektura sloučila s romantickou krajinotvorbou.


  **Přístup:** volně. V lužním lese, 500 m od Janova hradu.


  **Co uvidíte:** LO vz. 37 typ A-160 zarostlý plazivými rostlinami. Autentická atmosféra
  „zapomenutého bunkru".


  **Doporučená délka:** 20 minut (v kombinaci s Janohradem cca 1,5 hodiny).


  **Dostupnost:** Pěšky z Lednice (4 km) nebo plavbou lodí po Dyji (výletní doprava
  z Lednice).


  **Doporučeno kombinovat s:** Janovým hradem (klíčový bod LVA), zámkem Lednice, Minaretem,
  skleníkem s botanickou zahradou, dalšími řopíky B-4.

  '
