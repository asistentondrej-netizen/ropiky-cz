  address: Mladkov, tvrz Adam
built: '1936–1938'
state: zavreny
description: Jeden z pěti bojových srubů dělostřelecké tvrze Adam v králickém úseku. Tvrz jako celek viz samostatný záznam „Tvrz Adam".
history: |
  K-S 43 „Zahrada" je jedním z pěti bojových srubů tvrze Adam (dalšími jsou K-S 44 Jabloň, K-S 45 U boudy, K-S 45a Lípa a K-S 46 Můstek; vchodovým objektem tvrze je K-S 42). Stavebně dokončen 1938, pancéřování osazeno z cca 95 %, výzbroj však nainstalována nebyla.

  Po Mnichovu obsazen Wehrmachtem jako součást komplexu tvrze Adam, využíván jako sklad. Po válce pod správou ČSLA jako sklad munice. V 90. letech s celou tvrzí prodán soukromému vlastníkovi; od té doby uzavřen.

  Detailní kontext celé tvrze Adam — projekt, výzbroj, poválečný osud — je v záznamu „Tvrz Adam".
visit: |
  Samostatně není srub přístupný — je součástí uzavřeného areálu tvrze Adam v soukromém vlastnictví. Exteriér lze zdálky pozorovat z veřejných cest (modrá turistická značka Mladkov → Lichkov).

  Nejbližší plně přístupné tvrze: **Bouda** (3 km) — nejkompletnější expozice ŘOP; **Hůrka** (5 km) — částečně přístupná.
