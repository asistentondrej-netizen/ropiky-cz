title: K-S 43 „Adam" (vchodový objekt)
code: K-S 43
type: delostrelecka-tvrz
line: Králíky — tvrz Adam
region: Pardubický kraj
location:
  lat: 50.0587
  lon: 16.8234
  address: Mladkov, tvrz Adam
built: '1938'
state: muzeum
description: Vchodový objekt tvrze Adam — jedné z pěti největších tvrzí ŘOP. Tvrz Adam je souputníkem tvrze Bouda (vzdálenost
  3 km).
history: 'Tvrz Adam začala být budována v roce 1936 — plánováno 6 bojových objektů, 2 vchodové, 2 dělostřelecké. V roce 1938
  byl dokončen jen jeden vchodový objekt K-S 43 a začátek podzemí (cca 400 m).


  Po Mnichovu stavba zastavena. Wehrmacht používal existující kazematy jako skladiště. Od roku 1993 rekonstrukce klubovými
  nadšenci. Dnes veřejnost může vidět vchodový objekt a krátký úsek podzemí.

  '
visit: 'Vchodový objekt nedokončené tvrze Adam — zajímavý kontext „co kdyby se stavba dokončila".


  **Otevírací doba:** květen–říjen, víkendy 10:00–17:00. V hlavní sezóně denně mimo pondělí. Aktuální info na adam-pevnost.cz.


  **Vstupné:** cca 100 Kč dospělí, 60 Kč děti.


  **Co uvidíte:** vchodový objekt s padacím mostem, pancéřovými dveřmi, skladovou halou, vstup do nedokončeného podzemí (krátký
  úsek 150 m). Technická výstava o stavbě tvrzí.


  **Doporučená délka:** 60 minut.


  **Dostupnost:** Autem z Mladkova (1 km) k parkovišti u tvrze. Vlakem do Králík + bus do Mladkova.


  **Doporučeno kombinovat s:** tvrzí Bouda (3 km — kompletně dokončená tvrz, kontrast), tvrzí Hůrka (15 km), K-S 31, K-S 33,
  K-S 36 (okolní sruby). Ideální víkendový okruh „Tvrze Králicka".

  '
