title: K-S 43 „Veverka" — dělostřelecký srub tvrze Adam
code: K-S 43
type: delostrelecka-tvrz
line: Králíky — tvrz Adam
region: Pardubický kraj
location:
  lat: 50.0587
  lon: 16.8234
  address: Mladkov, tvrz Adam
built: '1938'
state: zavreny
description: Dělostřelecký srub K-S 43 „Veverka" — jeden z bojových objektů tvrze Adam. Plánován pro houfnice ráže 10 cm
  pro palbu do předpolí směrem k tvrzi Hanička. Vchodový objekt tvrze nese označení K-S 43a „Na sekyře".
history: 'Dělostřelecký srub K-S 43 „Veverka" byl betonován v letech 1937–1938 jako součást tvrze Adam. Jeho hlavním úkolem
  byla dálková palba houfnicemi vz. 38 ráže 10 cm do předpolí králického úseku a do mezer mezi sousedními tvrzemi Hanička
  a Bouda.


  Do září 1938 byl objekt stavebně dokončen, pancéřování osazeno z větší části, ale vlastní výzbroj (otočná houfnicová věž)
  instalována nebyla. Po Mnichovu objekt opuštěn. Wehrmacht jej využíval jako sklad munice.


  Po válce převzala armáda — podzemní část tvrze Adam (včetně K-S 43) je dodnes využívána Armádou ČR a není veřejnosti přístupná.

  '
visit: 'Objekt je v aktivním vojenském užívání a **veřejnosti nepřístupný**. Lze pozorovat pouze zvenku z modré turistické
  značky vedoucí přes Adamovu horu.


  **Přístup:** pouze povrchový pohled z veřejných cest, samotný objekt v oploceném vojenském areálu.


  **Co uvidíte:** zvenčí pancéřové zvony a hlaveň otočné věže (přidanou v 70. letech jako experiment AČR). Z dálky velmi dobře
  fotogenický.


  **Doporučená délka:** 30 minut (povrchový průchod).


  **Dostupnost:** Z Mladkova po modré značce na Adamovu horu (3 km, 1 hod). Autem do Mladkova, dál pěšky.


  **Doporučeno kombinovat s:** tvrzí Bouda (3 km — kompletně dokončená a otevřená tvrz), tvrzí Hanička (10 km), K-S 31, K-S
  33, K-S 36 (okolní pěchotní sruby). Pro vstup do interiéru tvrze ŘOP volte raději Boudu nebo Haničku.

  '
