description: LO vz. 37 typ A-160, součást úsek 5 — Valtice na jižní Moravě. Objekt leží na jihovýchodním okraji Valtic, v lesoparku mezi zámkem a kolonádou Rajstna — empirovou triumfální stavbou z roku 1823. Dohledatelné v databázi ropiky.net (ID 1075718485) a v OSM.
history: |
  Betonován v roce 1938 jako součást jižní linie lehkého opevnění vz. 37 — úsek 5 — Valtice. Dva kulomety ZB vz. 26, směrové střílny. Zesílený typ A-160 s 80cm čelní stěnou — standardní hlavní typ v linii. Čelní stěna 80 cm, III. třída odolnosti.

  V září 1938 zařazen do obranného plánu proti hrozbě útoku z rakouského území (po Anschlussu v březnu 1938). Během všeobecné mobilizace 23.–30. září 1938 obsazen pohotovostní jednotkou se základní výzbrojí.

  Po Mnichovské dohodě a záboru pohraničí opuštěn a předán Wehrmachtu. Němci využili část linie k testům protipevnostní munice; v letech 1939–40 odvezeny kovové prvky (dveře, mříže). Po válce objekt zůstal v krajině bez systematické péče.
visit: |
  **Přístup:** volně přístupný, 24/7.

  **Lokace:** Objekt leží na jihovýchodním okraji Valtic, v lesoparku mezi zámkem a kolonádou Rajstna — empirovou triumfální stavbou z roku 1823. Pěšky z centra Valtic k Rajstně (15 min), dále mírně do svahu.

  **Co uvidíte:** LO vz. 37 typ A-160, dvě boční střílny. Interiér pravděpodobně neprůchodný (vchod zabetonovaný nebo zborcený).

  **Doporučená délka:** 15–20 minut u objektu; jako součást většího výletu po linii 2–4 hodiny.

  **Doporučeno kombinovat s:** zámkem Valtice, kolonádou Rajstna, vinnými sklepy, Národním vinařským centrem.
