# === NÁVŠTĚVA ===
visit: >
  Provozuje Klub vojenské historie Králíky. Jeden z nejdostupnějších objektů
  ŘOP v ČR vlakem (200 m od nádraží). Otevřeno květen–říjen, víkendy
  10:00–17:00. V hlavní sezóně i všední dny. Prohlídky s průvodcem v
  pravidelných intervalech. Aktuální informace na kvh-kraliky.cz.

