title: K-S 8 „U nádraží"
code: K-S 8
type: pechotni-srub
line: Králíky
region: Pardubický kraj
location:
  lat: 50.10509
  lon: 16.781779
built: '1937'
state: muzeum
description: Pěchotní srub u železniční stanice Králíky — kontroloval přechod trati.
  Oboustranný objekt odolnosti III s rekonstruovanou výzbrojí. Provozuje Vojensko-historické
  muzeum Králíky.
sources:
- Wikimedia Commons
- ropiky.net
updated: '2026-04-18'
visit: 'Pěchotní srub u nádraží Králíky — jeden z nejdostupnějších objektů těžkého
  opevnění v ČR. Vhodný start pro pochopení systému Pevnostní oblasti Králíky. Provozuje
  Klub vojenské historie.


  **Otevírací doba:** květen–říjen, víkendy 10:00–17:00. V hlavní sezóně i všední
  dny. Prohlídky s průvodcem v pravidelných intervalech.


  **Vstupné:** cca 100 Kč dospělí, 60 Kč děti. Aktuální info na kvh-kraliky.cz.


  **Co uvidíte:** oboustranný pěchotní srub s replikami kulometů v původních lafetách,
  rekonstruovaný interiér, pozorovací zvon. Exteriér objektu s ukázkou překážkového
  systému (reverzní výstupek, protitankové jámy).


  **Doporučená délka:** 30–45 minut.


  **Dostupnost:** Přímo u vlakového nádraží v Králíkách (200 m pěšky) — jeden z nejsnáze
  dostupných objektů ŘOP v ČR vlakem. Autem parkování u nádraží.


  **Doporučeno kombinovat s:** tvrz Bouda (18 km), tvrz Hůrka (10 km), Vojenské muzeum
  Králíky (centrum města, 1 km). Pro celodenní fortifikační výlet doporučujeme využít
  Králíky jako základnu — ubytování v penzionech na náměstí.'
