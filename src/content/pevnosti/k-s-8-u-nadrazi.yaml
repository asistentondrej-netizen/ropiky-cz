  address: Králíky, nádraží ČD
  elevation: 558

built: '1937'
state: muzeum

description: >
  Pěchotní srub u železniční stanice Králíky — nejsnadněji dostupný objekt
  těžkého opevnění v ČR (200 m od nádraží). Oboustranný objekt odolnosti III
  s rekonstruovanou výzbrojí. Ideální start pro pochopení systému Pevnostní
  oblasti Králíky. Provozuje Klub vojenské historie.

