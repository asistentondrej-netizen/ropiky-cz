# === HISTORIE ===
history: >
  K-S 8 „U nádraží" byl postaven v letech 1937–1938 jako součást králické
  linie. Jeho hlavním úkolem byla kontrola železničního přechodu Králíky —
  Międzylesie (tehdy německá Mittelwalde) a palebná podpora sousedních objektů
  K-S 7 a K-S 9.


  V září 1938 plně obsazen pluky Sušice a Olomouc. Po Mnichovu odevzdán
  Wehrmachtu. Během okupace sloužil jako cíl zkušebních střeleb a sklad.
  Po roce 1945 přešel pod ČSLA, později sklad civilní obrany.


  Od 90. let postupná rekonstrukce občanským sdružením Klub vojenské historie
  Králíky. Dnes muzejní objekt s autentickými replikami výzbroje a interiéru.
  Součást ucelené prohlídkové trasy Pevnostní oblasti Králíky.

