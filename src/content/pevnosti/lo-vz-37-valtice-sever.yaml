state: pristupny
description: Řopík LO vz. 37 na severním okraji Valtic — jeden z objektů, které kryly přístup od severu. Objekt je přístupný a fotogenicky položený v krajině Lednicko-valtického areálu.
history: |
  Betonován v roce 1937 jako součást československé fortifikační linie v jižní Moravě. Objekt číslo 5/137/1 patřil do úseku kryjícího Valtice a přístupovou komunikaci od Mikulova. V září 1938 osazen strážní jednotkou s kulomety ZB vz. 26. Po Mnichovu a listopadovém záboru odevzdán Wehrmachtu. Ten objekt v letech 1939–45 nevyužil, pouze odvezl uzamčené pancéřové dveře. Po válce ponechán v krajině bez oprav.
visit: |
  Nejsevernější z prohlížených valtických řopíků — dobře dostupný ze zámku.
  
  **Přístup:** volně, 24/7. Po polní cestě ze severního okraje Valtic (10 min pěšky).
  
  **Co uvidíte:** Klasický LO vz. 37, dvě střílny pro TK, zachovaná kazemata. Čelní stěna nese stopy dlouhodobé eroze.
  
  **Doporučená délka:** 15–20 minut.
  
  **Dostupnost:** Autem nebo pěšky z centra Valtic (1,5 km). Na kole po Moravské vinařské stezce.
  
  **Doporučeno kombinovat s:** zámkem Valtice, Kolonádou Rajstna, dalšími řopíky linie.
