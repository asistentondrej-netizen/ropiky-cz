title: Řopíky u Hevlína
code: LO Hevlín
type: lo-vz-37
line: Jižní Morava
region: Jihomoravský kraj
location:
  lat: 48.7598
  lon: 16.3587
  elevation: 178
  address: Hevlín, česko-rakouská hranice
built: 1937–1938
state: neznamy
description: Skupina několika řopíků u Hevlína — bývalá česko-rakouská hranice. Jeden z objektů stojí přímo na křižovatce
  severní silnice — charakteristický pohled do mezivojenské éry.
history: 'Řopíky byly budovány v letech 1937–1938 jako součást jihomoravské obranné linie. Po Mnichovu zůstaly v anschlussem
  přičleněném Rakousku (1938–1945). Po válce vráceny, ale nikdy nebyly reaktivovány.


  Objekty v okolí Hevlína tvoří malý „skanzen pod širým nebem" — několik řopíků v blízkosti sebe dává dobrou představu o hustotě
  obranné linie.

  '
visit: 'Ideální krátká zastávka na trasách po jižní Moravě — vícero řopíků na krátkém úseku.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** 4 až 6 řopíků LO vz. 37 v bezprostřední blízkosti Hevlína — některé u silnic (přejezdů), některé v polních
  pasech. Nezrekonstruované, autentické.


  **Doporučená délka:** 30–45 minut.


  **Dostupnost:** Autem z Dyjákovic (5 km), Znojma (25 km) nebo Brna (70 km). Cyklisté po jižní části Moravské vinařské stezky.


  **Doporučeno kombinovat s:** NP Podyjí, vinicemi Znojemska, hradem Valtice (UNESCO), blízkým Rakouskem (Laa an der Thaya,
  termální lázně).

  '
