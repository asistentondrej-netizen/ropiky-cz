title: Řopík Chlum u Hradce Králové
code: LO vz. 37 B — Chlum
type: lo-vz-37
line: Hradec Králové (vnitřní linie)
region: Královéhradecký kraj
location:
  lat: 50.2517
  lon: 15.7497
  address: Chlum u Hradce Králové, náves
built: '1938'
state: pristupny
description: Řopík fungující od 60. let jako autobusová zastávka. Unikátní příklad
  adaptace fortifikačního objektu na civilní použití. Dnes technická památka a turistická
  atrakce.
history: 'Tento řopík typu B byl postaven v červenci 1938 firmou Lanna jako součást
  **vnitřní obranné čáry Hradec Králové** — tzv. „Lahvová čára", která měla zpomalit
  postup nepřítele přicházejícího ze severu ke Kostelci nad Orlicí a dál.


  V září 1938 byl objekt dokončen, ale bez osazené výzbroje. Po Mnichovské dohodě
  zůstal v rámci zbývajícího území ČSR. Za válku nepoužíván, Němci ho neznali (byl
  v druhé linii daleko od fronty).


  **Proměna na autobusovou zastávku:** V roce 1961 rozhodli obyvatelé obce Chlum,
  že opuštěný řopík u silnice poslouží jako přístřešek pro cestující čekající na autobus.
  Z objektu byly odstraněny pancéřové dveře, vnitřek byl ošetřen omítkou a vybaven
  lavičkou. Tato adaptace existuje dodnes.


  V roce 1998 byl objekt prohlášen **technickou památkou** a dnes je pod ochranou
  Národního památkového ústavu. Na místě informační cedule vysvětlující historii a
  proces adaptace.'
visit: 'Unikátní autobusová zastávka v obci Chlum — **jediný řopík v provozu pro civilní
  dopravu** v České republice. Návštěva je **zdarma, 24/7**.


  **Jak se tam dostat:**


  - Autem: 12 km severně od Hradce Králové po silnici 31 (směr Jaroměř), pak odbočka
  na Chlum

  - Autobusem: linka 675 z Hradce Králové (autobusové nádraží), zastávka „Chlum, u
  řopíku" — ano, takto se oficiálně jmenuje!

  - Vlakem do Jaroměře, pak lokální autobus


  **Co zde uvidíte:**


  - Řopík typ B se dvěma střílnami, přizpůsobený k civilnímu využití

  - Uvnitř lavičky pro 6 osob, informační tabule, pouliční osvětlení

  - Cedule „Autobusová zastávka CHLUM" nad vchodem

  - Původní střílny jsou zaslepené plexi, ale vidět z vnějšku

  - **Autentická kombinace betonové fortifikace s civilní funkcí** — foto-fenomén


  **Důležité informace:**


  - **Autobus jezdí!** Linka 675 zastavuje pravidelně (6:30–22:00 v pracovní dny)

  - V zastávce se mohou střídat čekající lidé — **respektujte návštěvníky, kteří skutečně
  čekají na autobus**

  - Fotografování zvnějšku je vždy povoleno, vnitřek jen mimo špičky


  **Doporučená kombinace:**


  - Rozšiřte návštěvu o **Bojiště u Hradce Králové 1866** (5 km, muzeum prusko-rakouské
  války)

  - Jaroměř a **pevnost Josefov** (barokní cihlová pevnost, 15 km, komplexní prohlídka
  3 h)

  - Hrad **Kuks** s lázněmi a Braunovými sochami (20 km)


  Celý **Hradec Králové fortifikační okruh**: Chlum → Josefov → Kuks → zpět do HK.
  Celkem 80 km, celý den, fantastický přehled čs. opevnění od 18. do 20. století.'
sources:
