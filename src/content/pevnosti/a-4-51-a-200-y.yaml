history: 'Bunkr (označovaný A4/51/A-200) je fortifikační stavba zbudovaná pod silnicí mezi obcemi Bratronice a Dolní Bezděkov v okrese Kladno ve Středočeském kraji České republiky. Je součástí systému označovaného Pražská čára vinoucího se od Mělníka přes Slaný a Beroun až ke Slapům u řeky Vltavy, který měl za úkol zpomalit očekávaný postup německých ozbrojených sil. (Zdroj: Wikipedie, CC BY-SA)'
