  address: Mladkov, horské sedlo
built: '1937'
state: pristupny
description: Pěchotní srub na horském sedle — panoramatický výhled a historický kontext. Součást předsunuté linie před tvrzí
  Adam.
history: 'K-S 36 byl postaven v roce 1937 jako jeden z horských objektů obrany Králicka. Oboustranný srub II. odolnosti v
  sedlovém terénu.


  Po Mnichovu ztracen spolu s pohraničím. Dnes v majetku města Mladkov.

  '
visit: 'Horský srub s krásným výhledem — ideální pro turistickou zastávku.


  **Přístup:** volně 24/7.


  **Co uvidíte:** pěchotní srub v horském sedle — pancéřové zvony, střílny, panoramatický výhled na Orlické hory a Králicko.


  **Doporučená délka:** 20 minut + turistická procházka (hodiny).


  **Dostupnost:** Autem z Mladkova (2 km) + pěšky do sedla (400 m). Značené turistické stezky.


  **Doporučeno kombinovat s:** hřebenovými túrami, tvrzí Adam, tvrzí Bouda, Ramzovou. Ideální horský výlet.

  '
