title: MO-S 5 „Na trati"
code: MO-S 5
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.8859
  lon: 18.3294
  address: Hlučín-Darkovičky, skanzen čs. opevnění
built: '1936'
state: muzeum
description: Jeden z nejznámějších pěchotních srubů úseku MO. Součást pevnostního skanzenu Darkovičky u Hlučína — nejnavštěvovanější expozice čs. opevnění v Česku.
history: 'Srub MO-S 5 byl betonován v roce 1936 v rámci první výstavbové etapy úseku Moravská Ostrava. Byl klíčovou komponentou obrany průmyslové oblasti Ostravy proti útoku ze severu.


  V říjnu 1938 byl opuštěn československou armádou a předán německé branné moci. Během okupace zde Wehrmacht prováděl destruktivní střelecké zkoušky.


  Po válce srub sloužil krátce k vojenským účelům, později byl opuštěn. Od 80. let je součástí pevnostního skanzenu Slezského zemského muzea.

  '
visit: 'Skanzen Darkovičky je otevřen celoročně — aktuální otevírací doba a vstupné najdete na webu Slezského zemského muzea (szm.cz).


  Doporučená návštěvní doba: 2–3 hodiny pro celý skanzen (zahrnuje i MO-S 8, MO-S 19 a MO-S 20).

  '
