# === NÁVŠTĚVA ===
visit: >
  Skanzen Darkovičky (Areál čs. opevnění Hlučín-Darkovičky) spravuje Slezské
  zemské muzeum. MO-S 5 „Na trati" je součástí společné prohlídky s MO-S 19
  „Alej", MO-S 20 „Orel" a MO-S 8 „Kub". Prohlídka celého areálu trvá 3–4 hodiny.
  Otevřeno duben–listopad. Aktuální otevírací doba, vstupné a program na szm.cz.

