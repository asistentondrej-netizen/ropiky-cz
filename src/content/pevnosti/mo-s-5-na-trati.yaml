title: MO-S 5 „Na trati"
code: MO-S 5
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.8859
  lon: 18.3294
  address: Hlučín-Darkovičky, skanzen čs. opevnění
built: '1936'
state: muzeum
description: Jeden z nejznámějších pěchotních srubů úseku MO. Součást pevnostního skanzenu Darkovičky u Hlučína — nejnavštěvovanější
  expozice čs. opevnění v Česku.
history: 'Srub MO-S 5 byl betonován v roce 1936 v rámci první výstavbové etapy úseku Moravská Ostrava. Byl klíčovou komponentou
  obrany průmyslové oblasti Ostravy proti útoku ze severu.


  V říjnu 1938 byl opuštěn československou armádou a předán německé branné moci. Během okupace zde Wehrmacht prováděl destruktivní
  střelecké zkoušky.


  Po válce srub sloužil krátce k vojenským účelům, později byl opuštěn. Od 80. let je součástí pevnostního skanzenu Slezského
  zemského muzea.

  '
visit: 'První a nejstarší rekonstrukovaný objekt Areálu čs. opevnění Hlučín-Darkovičky — otevřen veřejnosti již v roce 1993.
  Spolu s MO-S 19 a MO-S 20 tvoří hlavní triumvirát skanzenu.


  **Otevírací doba:** duben–listopad, víkendy 10:00–17:00, v hlavní sezóně (červen–srpen) denně mimo pondělí. Prohlídky s
  průvodcem každou celou hodinu.


  **Vstupné:** cca 150 Kč dospělí, 80 Kč děti/studenti, rodinné vstupné 380 Kč. Platí pro celý areál (MO-S 5, MO-S 8, MO-S
  19, MO-S 20). Aktuální info na szm.cz.


  **Co uvidíte:** oboustranný pěchotní srub s kompletně vybaveným interiérem — dvě střelecké místnosti, pozorovatelna se zvonem,
  ubikace, filtroventilace, munice, ukázka dobového telefonního spojení. V exteriéru jsou vidět stopy po nárazech zkušební
  střelby Wehrmachtu.


  **Doporučená délka:** 45 minut pro MO-S 5, celý areál 3–4 hodiny.


  **Dostupnost:** Autem z Ostravy po silnici II/469 (12 km), parkování u areálu. Vlakem do Hlučína + 3 km pěšky. Vstup od
  parkoviště po naučné stezce (300 m). Bezbariérový přístup k objektu, interiér s mírnými schody.


  **Doporučeno kombinovat s:** ostatními sruby areálu (nutné pro plný zážitek), Ostravou, zámkem Kravaře nebo Hlučínským jezerem.'
