description: >
  Vlajkový objekt skanzenu Hlučín-Darkovičky — nejnavštěvovanější expozice čs.
  opevnění v ČR. Oboustranný pěchotní srub II. stupně odolnosti s dobově
  rekonstruovaným interiérem, střeleckým vybavením a pozorovacím zvonem.
  Spolu s MO-S 19 „Alej" a MO-S 20 „Orel" tvoří triumvirát klíčových srubů
  areálu Slezského zemského muzea.

