# === HISTORIE ===
history: >
  Srub MO-S 5 „Na trati" byl betonován v letech 1936–1937 jako jeden z prvních
  objektů úseku Moravská Ostrava. Jeho úkolem byla kontrola železniční trati
  Bohumín–Ostrava a palebná podpora sousedních srubů MO-S 4 a MO-S 6.
  Oboustranný typ B s odolností II, posádka 32 mužů.


  V září 1938 byl plně obsazen a vyzbrojen. Po Mnichovu odevzdán Wehrmachtu,
  který zde prováděl zkušební střelby protipancéřovou municí — stopy po
  zásazích jsou dodnes patrné na vnějším plášti. Srub zkouškám odolal bez
  prolomení vnitřních prostor.


  Po válce přešel pod ČSLA, sloužil jako sklad civilní obrany. Rekonstrukce
  pro muzejní účely začala v roce 1980 a areál skanzenu Darkovičky byl
  oficiálně otevřen v roce 1983. Dnes patří pod Slezské zemské muzeum a je
  nejnavštěvovanější expozicí čs. opevnění v republice.

