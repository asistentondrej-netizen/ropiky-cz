title: OP-S 23 „Kopec"
code: OP-S 23
type: pechotni-srub
line: Opava
region: Moravskoslezský kraj
location:
  lat: 49.9421
  lon: 17.8754
  address: Opava-sever
built: '1937'
state: pristupny
description: Pěchotní srub „Kopec" — součást severní obranné linie Opavy. Volně přístupný exteriér v polní krajině.
history: 'OP-S 23 byl betonován na podzim 1937. Jeden z řady srubů v severním úseku opavské linie. Po roce 1939 v německých
  rukou, po roce 1945 v majetku ČSA.

  '
visit: 'Klasický opavský pěchotní srub — volně přístupný, v otevřeném terénu.


  **Přístup:** volně, 24/7, zdarma.


  **Co uvidíte:** pěchotní srub II. odolnosti v polní krajině — střílny, pozorovací zvony. Objekt je nezrekonstruovaný.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Opavy (3 km) po silnici na Milostovice, odbočit na polní cestu (200 m).


  **Doporučeno kombinovat s:** OP-S 25, OP-S 26, celou opavskou linií.

  '
