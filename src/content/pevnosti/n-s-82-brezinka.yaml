  address: Náchod — Běloves
built: '1937'
state: muzeum
description: Pěchotní srub u Náchoda, precizně rekonstruovaný Klubem vojenské historie. Jeden z nejpropracovanějších exemplářů zpřístupněných veřejnosti mimo velké skanzeny.
history: 'Srub N-S 82 „Březinka" byl součástí linie úseku Náchod. V září 1938 byl plně obsazen a připraven k boji, po Mnichovu předán Wehrmachtu.


  Po válce byl dlouho opuštěn. Od 90. let ho rekonstruuje Klub vojenské historie Náchod — dnes patří k nejkvalitnějším soukromým rekonstrukcím v Česku.

  '
visit: 'Otevřeno sezónně víkendy a o prázdninách. Informace na kvh-nachod.cz nebo brezinka.cz.

  '
