description: >
  Oboustranný pěchotní srub II. stupně odolnosti u hřbitova v Petržalce-Kopčanech.
  Jeden z nejnavštěvovanějších objektů bratislavské čáry. Kompletní muzejní
  rekonstrukce interiéru (2010–2012) — ventilace, pancéřové dveře, periskop,
  lafeta M. Součást sítě expozic v Petržalce.

