# === HISTORIE ===
history: >
  B-S 8 „Hřbitov" byl postaven v letech 1937–1938 jako součást jižní čáry
  bratislavského pásma. Jméno „Hřbitov" pochází z blízkosti místního
  kopčianského hřbitova. Oboustranný srub II. stupně odolnosti, posádka
  30 mužů.


  V září 1938 plně obsazen. Po Vídeňské arbitráži v listopadu 1938 Petržalka
  připadla Německu — B-S 8 přešel pod správu Wehrmachtu, který demontoval
  výzbroj. Za války sloužil jako sklad.


  Po roce 1945 objekt převzala ČSLA, v době studené války sklad pohraniční
  stráže. Po roce 1989 opuštěn, devastován. Kompletní rekonstrukce v letech
  2010–2012 občanským sdružením B-S 8 Hřbitov. Dnes muzejní objekt s
  „Múzeom obrany Československa" — nejkomplexnější výklad předválečné
  obrany na Slovensku.

