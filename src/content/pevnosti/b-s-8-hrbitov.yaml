# === NÁVŠTĚVA ===
visit: >
  Muzejní expozice „Múzeum obrany Československa" v rekonstruovaném srubu.
  Kombinujte s dalšími objekty v Petržalce (B-S 5 Žabí most, B-S 6 Vrba,
  B-S 4 Lány). Otevřeno duben–říjen, víkendy 10:00–17:00, během letních
  prázdnin i všední dny od 13:00. Aktuální informace na bs8.sk.

