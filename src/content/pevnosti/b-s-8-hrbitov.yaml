visit: 'Pěchotní srub „Hřbitov" v Bratislavě-Petržalce — součást Múzea obrany Československa s nejkomplexnějším výkladem předválečné
  obrany na Slovensku. Provozuje klub B-S 8 Hřbitov.


  **Otevírací doba:** duben–říjen, víkendy 10:00–17:00. Během letních prázdnin i ve všední dny od 13:00. Aktuální info na
  bs8.sk.


  **Vstupné:** cca 4 € dospělí, 2 € děti. Skupinové slevy.


  **Co uvidíte:** rekonstruovaný interiér oboustranného srubu II. odolnosti, repliky kulometů, expozice výstroje a výzbroje
  čs. armády 1938, dokumentace bojů v Petržalce (září 1938). Objekt má specifický význam — leží vedle bývalého hřbitova, odtud
  název.


  **Doporučená délka:** 45 minut.


  **Dostupnost:** Autem z centra Bratislavy (5 km), MHD trolejbus č. 201 z autobusového nádraží, zastávka Bradáčova. Pěšky
  10 minut od řeky Dunaj.


  **Doporučeno kombinovat s:** dalšími sruby v Petržalce (B-S 5 Žabí most, B-S 6 Vrba, B-S 4 Lány — z toho některé volně přístupné).
  Ideální víkendový okruh po bratislavském opevnění. Kombinace s Bratislavským hradem nebo procházkou po nábřeží Dunaje.'
