description: 'Nedokončená dělostřelecká tvrz s jedním z nejnavštěvovanějších podzemních muzeí čs. opevnění. Přístupná trasa podzemím je přes 1 km dlouhá a zahrnuje největší podzemní sály celého systému. Plánovaná pětice bojových srubů byla do září 1938 dokončena jen zčásti — dva sruby byly dostavěny, tři zůstaly rozestavěné. Muzeum spravuje Muzeum Náchodska.

  '
