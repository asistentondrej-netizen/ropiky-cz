visit: 'Muzeum Pevnost Dobrošov spravuje Muzeum Náchodska. Otevřeno sezónně od dubna do října (někdy i listopadu). Prohlídka podzemím trvá cca 90 minut a probíhá s průvodcem. Expozice je přizpůsobena i pro rodiny s dětmi — součástí je i venkovní naučná stezka. Aktuální informace na muzeumnachodska.cz.

  '
