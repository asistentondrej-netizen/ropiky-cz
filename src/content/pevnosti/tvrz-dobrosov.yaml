history: 'Tvrz Dobrošov u Náchoda byla stavěna od roku 1937 jako páteř obrany severovýchodních Čech. Plánováno bylo pět bojových srubů, vchodový objekt a rozsáhlý podzemní systém s největšími podzemními sály celého čs. opevnění — centrální kasárenská hala měla rozměry 80 × 15 metrů.


  V září 1938 byla výstavba v pokročilé fázi: podzemí vyraženo a zčásti vybetonováno, dva bojové sruby (N-S 72 „Můstek" a N-S 73 „Jeřáb") byly betonově dokončeny a vyzbrojeny, další tři zůstaly rozestavěné nebo jen zakotvené. Po Mnichovu byla výstavba zastavena.


  Za okupace Wehrmacht prováděl na srubech Dobrošova intenzivní destruktivní pokusy s protipancéřovou municí — tyto stopy jsou dnes hlavním studijním materiálem o účinnosti německých zbraní proti čs. fortifikacím. Po roce 1945 tvrz postupně převzala armáda, v 60. letech začala rekonstrukce a zpřístupnění veřejnosti.


  Dnes je Dobrošov jednou z nejnavštěvovanějších pevnostních památek v ČR. Prohlídka podzemím trvá přibližně 90 minut a zahrnuje centrální halu, kasárny, strojovnu, filtrovnu a přístup ke dvěma bojovým srubům.

  '
