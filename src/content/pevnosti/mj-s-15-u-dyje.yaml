title: MJ-S 15 „U Dyje"
code: MJ-S 15
type: pechotni-srub
line: Jižní Morava
region: Jihomoravský kraj
location:
  lat: 48.8056
  lon: 16.1876
  address: Dyjákovice, u řeky Dyje
built: '1938'
state: pristupny
description: Izolovaný pěchotní srub „U Dyje" — jeden z klíčových objektů jihomoravské linie na řece Dyji. Bránil přechod
  řeky mezi Hnanicemi a Hevlínem.
history: 'MJ-S 15 byl dokončen v srpnu 1938 — těsně před Mnichovem. Izolovaný oboustranný srub II. odolnosti, postavený jako
  opěrný bod pro obranu Dyje. V září 1938 byl plně vyzbrojen, po odstoupení pohraničí odevzdán Němcům prakticky nový.


  Dnes nezrekonstruovaný, ale relativně dobře zachovalý. Oblíbený cíl fortifikačních turistů.

  '
visit: 'Izolovaný pěchotní srub na břehu Dyje — mimořádný fortifikační zážitek v kombinaci s vodní plochou.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** izolovaný srub s více pancéřovými zvony než běžný objekt (charakteristické pro izolované TO), palebnou flexibilitu
  na všechny strany. Pozůstatky překážkového systému na břehu Dyje.


  **Doporučená délka:** 30–45 minut.


  **Dostupnost:** Autem ze Znojma (15 km) do Dyjákovic, odtud pěšky 800 m k řece. Cyklisté — ideální krátká odbočka z Moravské
  vinařské stezky.


  **Doporučeno kombinovat s:** Znojmem, Dyjákovicemi (hraniční obec), Hnanicemi (řopík + vinařstvo), NP Podyjí. Celodenní
  program „Podyjí + opevnění + víno".

  '
