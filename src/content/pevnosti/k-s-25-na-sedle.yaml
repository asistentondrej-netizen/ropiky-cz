updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub na sedle mezi Králíky a Orlickými horami — součást
  rozsáhlé Pevnostní oblasti Králíky.


  **Přístup:** celoročně volně, 24/7. Exteriér kdykoliv, interiér uzavřen.


  **Co uvidíte:** pěchotní srub II. odolnosti v lesnatém terénu — palebné otvory,
  pozorovací zvony, stopy po překážkovém systému. V okolí je patrná plánovaná obranná
  linie směrem k tvrzi Hůrka.


  **Doporučená délka:** 20–30 minut (pouze exteriér).


  **Dostupnost:** Autem z Králík (8 km) po silnici na Mladkov, odbočit na lesní cestu
  (500 m pěšky). Vlakem do Králík + cyklus/pěšky po naučné stezce „Betonová hranice".


  **Bezpečnost:** lesní terén, v zimě sněhové čepice, v létě klíšťata. Pevná obuv
  doporučena.


  **Doporučeno kombinovat s:** tvrz Hůrka (K-S 52), tvrz Bouda (10 km), K-S 14 U cihelny,
  K-S 8 U nádraží, Vojenské muzeum Králíky. Oblíbený celodenní výlet po „Betonové
  hranici".'
