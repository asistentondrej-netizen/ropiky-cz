updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub v Bratislavě-Petržalce — jeden z nejsnáze dostupných
  objektů ŘOP v okolí slovenského hlavního města. Provozován jako volný památník.


  **Přístup:** celoročně 24/7, zdarma. Exteriér kdykoliv, interiér většinou zavřený
  (možné nárazové otevření při akcích KVH).


  **Co uvidíte:** pěchotní srub II. stupně odolnosti zasazený v prostředí bratislavského
  sídliště — střílny, pozorovací zvon, stopy po překážkovém systému. Objekt patří
  mezi nejzachovalejší v Petržalce.


  **Doporučená délka:** 20 minut (pouze exteriér).


  **Dostupnost:** MHD z centra Bratislavy — trolejbus č. 201 nebo 202 (zastávka Antolská).
  Autem parkování na sídlišti. Vlakem do Bratislavy + MHD.


  **Bezpečnost:** objekt je ve veřejném prostoru, přístup snadný. Dovnitř se většinou
  nedá, neoplocený.


  **Doporučeno kombinovat s:** B-S 4 Lány, B-S 5 Žabí most, B-S 6 Vrba, B-S 8 Hřbitov
  (muzeum). Okruh po petržalských řopících patří k nejkompaktnějším fortifikačním
  prohlídkám v SR. Kombinace s bratislavským centrem (hrad, UFO, staré město).'
