description: Lehký objekt vzor 37 typ A-160 v Bratislavě-Petržalce (dnes bratislavský
  obvod). Součást urgentně budované linie po Anschlussu Rakouska. Volně přístupný,
  součást projektu Zachráňme petržalské bunkre.
