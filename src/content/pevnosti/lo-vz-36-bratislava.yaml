description: 'Vzácně dochované objekty starší typologie LO vz. 36 v okolí Devína a Bratislavy. Předchůdci klasických řopíků s jednoduchší výzbrojí.'
history: |
  Bunkry LO vz. 36 byly stavěny v roce 1936 jako první masová generace lehkého opevnění. Konstrukčně jednodušší (jen frontální střelba), brzy nahrazené dokonalejším vzorem 37 s bočními střílnami.

  Bratislavské bunkry vz. 36 patří mezi nejranější objekty československého opevnění. Po Vídeňské arbitráži a vzniku Slovenského štátu zůstaly opuštěné.

  Dnes několik kusů dochováno v okolí Devína — vzácný typ, jejich identifikace v terénu vyžaduje znalce.
visit: |
  Některé objekty v rámci NP Devínska Kobyla, ostatní v zarostlém terénu kolem Devína. Vhodné pro vojensko-historické nadšence.
