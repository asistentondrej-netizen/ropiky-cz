description: Pěchotní srub MO-S-36 na úseku Moravská Ostrava. Součást československého
  těžkého opevnění z let 1935–1938, stavěného proti hrozbě nacistického Německa.
history: 'Úsek Moravská Ostrava — těžké opevnění 1935–1938, bránící průmyslovou oblast
  Ostravy proti útoku z Polska a Německa. Jeden z nejkompletněji postavených úseků
  čs. opevnění.


  Srub MO-S-36 byl součástí této linie. Stavební práce probíhaly v letech 1935–1938,
  dokončení a výzbroj závisely na fázi budování daného úseku.


  Po Mnichovské dohodě (září 1938) byla linie opuštěna bez boje a objekty předány
  Wehrmachtu. Za války sloužily jako sklady nebo cíle střeleckých zkoušek. Po roce
  1948 byly některé objekty v rámci akce „Trvalé objekty" poškozeny; jiné přežily
  v lesním či polním terénu.'
visit: '**Stav:** objekt je pravděpodobně v ruinózním nebo zarostlém stavu, bez oficiální
  péče. Před návštěvou ověřte přístupnost — může být v soukromém pozemku nebo v chráněné
  oblasti.


  **GPS:** 49.904834, 18.104769 — zadat do navigace nebo [Mapy.cz](https://mapy.cz/zakladni?x=18.104769&y=49.904834&z=17&source=coor&id=18.104769%2C49.904834).


  **Doporučení:** Nevstupujte do objektu bez baterky a vhodné obuvi. Interiér může
  být zaplavený, zřícený nebo obsahovat ostré betonové výstupky. V lesním terénu doporučujeme
  GPS navigaci.'
