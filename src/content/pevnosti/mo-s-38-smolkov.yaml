title: MO-S 38 „Smolkov"
code: MO-S 38
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.9187
  lon: 18.2145
  elevation: 262
  address: Háj ve Slezsku - Smolkov
built: '1937'
state: zachovaly
description: Pěchotní srub „Smolkov" — krajní objekt moravskoostravské linie směrem
  k opavskému úseku. Volně přístupný.
history: 'MO-S 38 byl dokončen v roce 1937 jako spojový článek mezi moravskoostravskou
  a opavskou linií. Oboustranný pěchotní srub II. odolnosti.


  Po Mnichovu sloužil jako skladiště. Po válce v majetku ČSA, od 1990 volně přístupný.

  '
visit: 'Krajní srub — spojuje moravskoostravskou a opavskou linii.


  **Přístup:** volně 24/7.


  **Co uvidíte:** klasický pěchotní srub v polích, pancéřové zvony. V okolí vidět
  pokračování linie směrem na Opavu.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Háje (3 km) nebo Opavy (12 km). Vlakem do Hájské + pěšky.


  **Doporučeno kombinovat s:** MO-S 37 (soused), OP-S 25, 26 Milostovice (začátek
  opavské linie, 12 km), Areálem Hlučín-Darkovičky.

  '
