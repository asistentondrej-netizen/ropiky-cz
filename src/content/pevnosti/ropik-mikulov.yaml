title: Řopíky u Mikulova (Pavlovské vrchy)
code: MK — Mikulovsko
type: lo-vz-37
line: Jižní Morava — Mikulovsko
region: Jihomoravský kraj
location:
  lat: 48.8061
  lon: 16.6364
  address: Mikulov, Pavlovské vrchy, okolí Pálavy
built: '1937'
state: pristupny
description: Řopíky pod hřebenem Pavlovských vrchů a v okolí Mikulova — strategická linie přímo na rakouské hranici.
history: 'Mikulovská linie byla zesílena po Anschlussu Rakouska. Hustá síť řopíků kontrolovala příjezd k Mikulovu a údolí
  Dyje.


  Po Mnichovské dohodě objekty zabrány Wehrmachtem a využity k výcviku. Část byla po válce odstřelena, další přečkaly v krajině.


  Některé objekty mají potenciál pro rekonstrukci jako muzejní expozice — v posledních letech roste zájem o jejich památkovou
  ochranu.

  '
visit: 'Řopíky na Pavlovských vrších — nejjižnější část čs. opevnění na Moravě. Objekty byly součástí plánované obrany proti
  maďarskému útoku (tzv. plán Vltava).


  **Přístup:** volně, 24/7. Objekty jsou rozptýlené v CHKO Pálava, většina volně přístupná.


  **Co uvidíte:** cca 8 řopíků LO vz. 37 v oblasti Mikulov–Dolní Věstonice–Pavlov. Některé přímo na vyhlídkových stezkách
  na Děvín, jiné ve vinicích. Úchvatný kontrast bunkrů s krajinou Pálavy.


  **Doporučená délka:** 3–4 hodiny pro 3–4 objekty s výstupem na Děvín.


  **Dostupnost:** Autem do Mikulova (centrum parkování), odtud pěšky. Vlakem do Mikulova (spoj Brno–Břeclav–Mikulov) + pěšky.
  Cyklisté po Mikulovské vinařské stezce.


  **Doporučeno kombinovat s:** zámkem Mikulov, Svatým kopečkem, Archeologickým parkem Pavlov (Věstonická venuše), vinařstvím
  Sonberk. Ideální propojení památek, přírody, vína a opevnění.'
sources:
