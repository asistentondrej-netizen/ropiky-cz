description: Řopíky pod hřebenem Pavlovských vrchů a v okolí Mikulova — strategická linie přímo na rakouské hranici.
history: 'Mikulovská linie byla zesílena po Anschlussu Rakouska. Hustá síť řopíků kontrolovala příjezd k Mikulovu a údolí Dyje.


  Po Mnichovské dohodě objekty zabrány Wehrmachtem a využity k výcviku. Část byla po válce odstřelena, další přečkaly v krajině.


  Některé objekty mají potenciál pro rekonstrukci jako muzejní expozice — v posledních letech roste zájem o jejich památkovou ochranu.

  '
visit: 'Vhodné jako doplněk návštěvy Mikulova a Pavlovských vrchů (CHKO Pálava). Cykloturistika a pěší trasy vedou kolem několika objektů.

  '
