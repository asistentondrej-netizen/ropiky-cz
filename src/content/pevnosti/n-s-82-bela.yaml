title: N-S 82 „Běla"
code: N-S 82
type: pechotni-srub
line: Náchod
region: Královéhradecký kraj
location:
  lat: 50.415475
  lon: 16.198026
  address: Náchod-Běloves
built: '1937'
state: pristupny
description: Pěchotní srub „Běla" v Bělovesi u Náchoda — součást náchodské linie chránící
  přechod přes Metuji.
history: 'N-S 82 byl postaven v letech 1936–1937 jako součást náchodské linie proti
  směru na Polsko (Kladsko). Oboustranný srub II. odolnosti — charakteristické umístění
  přímo u hlavní silnice.


  Objekt byl v září 1938 plně vyzbrojen. Po Mnichovu ve sporné zóně, později v ČSR.
  Dnes volně přístupný památník.

  '
visit: 'Klasický náchodský pěchotní srub — snadno dostupný, v obci.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** oboustranný srub II. odolnosti u bývalého mlýna v Bělovesi — střílny,
  zvony, zachovalé betonové překážky.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Náchoda (2 km) směrem na Polsko. Vlakem do Náchoda + pěšky
  20 minut.


  **Doporučeno kombinovat s:** tvrzí Dobrošov (10 km, muzeum), Náchodem (hrad, náměstí),
  polským Kladskem (5 km hranice).

  '
