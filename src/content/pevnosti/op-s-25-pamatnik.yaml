title: OP-S 25 „Památník"
code: OP-S 25
type: pechotni-srub
line: Opavsko
region: Moravskoslezský kraj
location:
  lat: 49.955
  lon: 17.902
  address: Opava — Hlučínsko
built: '1937'
state: rozpadly
description: Pěchotní srub „Památník" — jeden z nejvýznamnějších objektů opavské linie. Oboustranný typ B odolnosti III, rozsáhlá
  dispozice. V 90. letech upraven jako pomník obětem druhé světové války. Dnes v zarostlém terénu, exteriér volně přístupný.
history: 'OP-S 25 byl součástí opavské linie těžkého opevnění bránící důležité průmyslové oblasti. Stavba spadala do roku
  1937, dokončení proběhlo částečně v 1938.


  Po Mnichovu zabrán Wehrmachtem, výzbroj odvezena. V poválečných letech objekt bez péče.


  Dnes přístupný zvenku, vnitřek nepřístupný. Možný cíl turisticko-historického zájmu.

  '
visit: 'Volně přístupný v terénu, součást vyznačených stezek na Opavsku.

  '
