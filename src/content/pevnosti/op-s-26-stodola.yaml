title: OP-S 26 „Stodola"
code: OP-S 26
type: pechotni-srub
line: Opava
region: Moravskoslezský kraj
location:
  lat: 49.9578
  lon: 17.8945
  address: Opava-Milostovice (sever)
built: '1937'
state: pristupny
description: Pěchotní srub „Stodola" — bezprostřední soused OP-S 25. Spolu tvoří pár
  vzájemně se krytých objektů. Ilustruje typické umístění dvou srubů v opavské linii.
history: 'OP-S 26 byl postaven současně s OP-S 25 v létě a podzim 1937. Oboustranný
  srub II. odolnosti — zajišťoval palbu v opačném směru než OP-S 25.


  Název „Stodola" pochází z blízké usedlosti. Po válce sloužil jako sklad zemědělského
  nářadí — odtud pokračování pojmenování. Dnes nezrekonstruovaný, autentický stav.

  '
visit: 'Srub v páru s OP-S 25 — návštěva logicky spojená.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** pěchotní srub II. odolnosti v otevřenější krajině než OP-S 25 —
  lépe vidět vzájemné palebné pole obou srubů. Pancéřové zvony dochované.


  **Doporučená délka:** 15 minut (v kombinaci s OP-S 25 celkem 45 minut).


  **Dostupnost:** 300 m severně od OP-S 25. Pěšky polní cestou.


  **Doporučeno kombinovat s:** OP-S 25 (v bezprostřední blízkosti), Opavou, Areálem
  Hlučín-Darkovičky.

  '
