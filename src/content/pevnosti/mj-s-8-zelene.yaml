title: MJ-S 8 „Zelené"
code: MJ-S 8
type: pechotni-srub
line: Jižní Morava (Slavonice)
region: Jihočeský kraj
location:
  lat: 49.0129
  lon: 15.3608
  address: Slavonice, u železniční stanice
built: '1938'
state: pristupny
description: Jednostranný pěchotní srub II. stupně na východním okraji Slavonic. Dochovaný v téměř původním stavu, s naučnou
  stezkou. Součást Slavonické pevnostní trasy.
history: 'MJ-S 8 „Zelené" byl budován v létě 1938 urgentním programem po anšlusu Rakouska. Firmou Ing. Marek Brno, oboustranný
  srub II. stupně s plánovanou výzbrojí 4 TK + 1 PTK.


  V září 1938 stavebně dokončen z ~95 %, bez osazených zbraní. Po Mnichovu okupace, Němci objekt opustili bez významných úprav.
  Za válku sklad nářadí místních Volkssturm oddílů.


  Po roce 1945 bez využití. V 80. letech amatérskou péčí dokumentován, od 1995 součástí Slavonické pevnostní trasy.'
visit: 'MJ-S 8 „Zelené" je součástí **Slavonické pevnostní trasy**, která propojuje čtyři jihomoravské objekty (MJ-S 3, 4,
  5, 8) v okruhu 6 km. Vhodné pro pěší i cyklisty.


  **Jak se tam dostat:**


  - Vlakem do Slavonic (hlavní stanice), pak 15 min pěšky směrem na Stálkov

  - Autem: parkoviště před železniční stanicí Slavonice (zdarma)

  - Cyklostezka Greenways Praha–Vídeň vede kolem objektu


  **Na místě:**


  - Venkovní prohlídka oboustranného srubu (rozměry 18 × 14 m)

  - Dvě boční střílny, čtyři šachty pro pancéřové zvony

  - Vstup zabezpečen mříží (vnitřek lze nahlédnout, ale nepřístupný)

  - Informační tabule s plánem slavonické linie a historií roku 1938


  **Celá Slavonická pevnostní trasa (cca 6 km, 3 hodiny):**


  1. **Vlaková stanice Slavonice** (start)

  2. **MJ-S 8 „Zelené"** (15 min, venkovní prohlídka)

  3. **MJ-S 5 „Dřevák"** (ruina, 30 min)

  4. **MJ-S 4 „Předsunutý zvon"** (40 min, jediný IV. stupeň v ČR)

  5. **Historické centrum Slavonic** (1 hodina)

  6. **MJ-S 3 „Zahrada"** (muzeum, 45 min — placené)

  7. **Návrat na vlakovou stanici**


  **Doporučení:**


  - Nejlepší období: **květen–říjen** (zimní ledy na cestě jsou nebezpečné)

  - **Pevná obuv** a lehké občerstvení s sebou

  - **Cyklostezka** je ideální pro rodiny (rovinatý terén)

  - V centru Slavonic doporučujeme oběd v **restauraci U zlatého lva** (renesanční interiér)


  **Tip pro fotografy:** Objekt je fotogenický zejména **za ranní mlhy** (jaro, podzim) — pevnostní beton v kontrastu se sádly
  kolem vytváří ikonické snímky.'
