description: >
  Největší a nejvíce rekonstruovaný pěchotní srub v ČR. Vlajkový objekt
  Vojensko-historického areálu Cihelna u Králík. Každoroční dějiště akce
  „Cihelna" — jedné z největších vojensko-historických rekonstrukcí v Evropě.
  Kompletní dobová výzbroj, ubikace, strojovna, filtrovna.

