# === HISTORIE ===
history: >
  Pěchotní srub K-S 14 „U cihelny" byl součástí silně opevněné králicko-orlické
  linie. Stavba probíhala v letech 1937–1938 firmou Záruba-Pfeffermann.
  Oboustranný typ C s odolností III a plánovanou posádkou 37 mužů.


  V září 1938 byl plně obsazen. Po Mnichovu odevzdán Wehrmachtu. Během okupace
  sloužil jako sklad a cíl zkušebních střeleb. Po válce přešel k ČSLA.
  V 60. letech v souvislosti s projektem „Kahan" byla tvrz Hanička i okolní
  sruby převzaty pro armádní účely — K-S 14 sloužil jako muniční sklad.


  Od začátku 90. let probíhá rozsáhlá muzejní rekonstrukce. Dnes je K-S 14
  vlajkovým objektem Vojensko-historického areálu Cihelna spravovaného
  občanským sdružením. Interiér zahrnuje autentickou výzbroj, ubikace,
  filtrovnu, strojovnu, muniční sklad a velitelské stanoviště.


  Každoročně v srpnu se zde koná akce „Cihelna" — rekonstrukce dobových
  bojů s účastí stovek reenaktorů, těžké techniky a tisíců návštěvníků.

