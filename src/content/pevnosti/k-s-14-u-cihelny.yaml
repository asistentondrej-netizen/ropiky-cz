# === NÁVŠTĚVA ===
visit: >
  Vojensko-historický areál Cihelna zahrnuje pěchotní srub K-S 14 „U cihelny",
  kavernu Prostřední Lipka a venkovní expozici těžké techniky (tanky, děla,
  transportéry). Sezónně otevřeno duben–listopad. Akce „Cihelna" se koná
  tradičně o prvním srpnovém víkendu. Provozuje Vojensko-historický klub.
  Aktuální informace na vojenske-muzeum-kraliky.cz a akce-cihelna.cz.

