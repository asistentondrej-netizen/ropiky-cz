title: MO-S 9 „Forman"
code: MO-S 9
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.9142
  lon: 18.3244
  address: Šilheřovice — Darkovičky
built: '1937'
state: muzeum
description: Oboustranný pěchotní srub odolnosti II typ B, součást Vojensko-historického areálu Darkovičky — největšího muzea čs. opevnění v ČR. Plně vystrojený, s autentickou pancéřovou výzbrojí a pancéřovými zvony.
history: |
  Pěchotní srub MO-S 9 „Forman" byl postaven v roce 1937 jako součást husté moravskoostravské linie chránící průmyslovou aglomeraci před útokem od severu (od Polska a Německa). Projekt vypracovala IV. ekspozitura ŘOP Ostrava (podplukovník Antonín Žebrek), výstavbu zadala firma Ing. Kruliš-Hess. Jde o oboustranný pěchotní srub typu B, odolnost II (stěny 225 cm, stropy 250 cm železobetonu) s dvěma palebnými křídly.

  Výzbroj: v pravém křídle protitankový kanón vz. 36 ráže 4,7 cm v kombinaci se spřaženým těžkým kulometem vz. 37 (lafeta L1 s tzv. „spárovanou střílnou" M — charakteristický prvek českého opevnění), v levém křídle dvojče těžkých kulometů vz. 37. Na střeše dva pancéřové zvony pro pozorování a paluba pro malou polní kulometnou četu. Kasárna pro 32 mužů posádky, filtroventilace proti chemickým zbraním, elektrocentrála a vlastní studna.

  Po Mnichovu byl srub bez boje předán Wehrmachtu. V letech 1940–1944 zde probíhaly pro Říši důležité střelecké zkoušky — testovaly se průstřelnosti čs. pancéřových zvonů proti německým 88 mm kanónům a 105 mm houfnicím. Pancéřové zvony z MO-S 9 byly následně demontovány a odvezeny k metalurgickému rozboru. Tyto informace Wehrmacht využil při projektování Atlantického valu.

  Po válce (1945–1950) využívala objekty této linie československá armáda jako plnohodnotné bojové pevnosti — součást protipolské obrany ve „stalinské" doktríně. Díky tomu MO-S 9 dostal v 50. letech novou pancéřovou výzbroj (německé zvony z Atlantiku!) a byl udržován do 60. let. Teprve v roce 1966 byl vyřazen z provozu.

  Od roku 1980 se o objekt stará Slezské zemské muzeum, od roku 1994 je MO-S 9 hlavní expozicí Vojensko-historického areálu Darkovičky — společně s MO-S 5 „Na trati", MO-S 7 „U Brzosdky", MO-S 8 „Obora" a jedním izbovým srubem. V roce 2013 byla expozice prohlášena národní kulturní památkou. S roční návštěvností 35 000+ návštěvníků jde o nejnavštěvovanější objekt čs. opevnění.
visit: |
  Areál Darkovičky je otevřený od dubna do listopadu, prohlídky s průvodcem v pravidelných časech. Aktuální program, vstupné a rezervace na szm.cz (Slezské zemské muzeum, pobočka Darkovičky).

  Doporučená délka prohlídky: 120 minut. Trasa zahrnuje MO-S 9 Forman (hlavní expozice s kompletním vybavením), MO-S 5 Na trati (rekonstrukce původního stavu z 1938), MO-S 7 U Brzosdky (částečně rekonstruován) a izbový srub MO-S 8. V rámci celodenní návštěvy lze absolvovat všechny objekty. Doporučená obuv — značená cesta mezi objekty 1,5 km.

  Každoročně druhý víkend v září „Dny opevnění Darkovičky" s bojovými ukázkami a ukázkami dobové techniky. Pravidelně pořádány i komentované noční prohlídky.

  Parkování zdarma u Infocentra areálu (300 m od MO-S 9). Vlakem do stanice Hlučín, odtud autobusová linka 290 do Darkoviček. Autem z D1 (exit 354 Ostrava-Rudná) 20 min. Areál je součástí Euroregionu Těšínské Slezsko a často kombinován s návštěvou polských opevnění u Racibórzu.
