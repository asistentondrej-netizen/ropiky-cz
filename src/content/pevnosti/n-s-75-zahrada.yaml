description: 'Pěchotní srub přímo na česko-polské hranici v Náchodě. V turistické lokalitě s lázněmi Běloves.'
history: |
  N-S 75 patří do náchodské linie, která byla součástí těch nejsilnějších úseků čs. opevnění díky strategické poloze na pomezí Kladska.

  Po Mnichovu zabrán Wehrmachtem, části výzbroje odvezeny. Po válce objekt zůstal zakonzervován, později zpřístupněn veřejnosti.

  Dnes součást Vojensko-historického muzea Náchod, část trasy kolem linie N.
visit: |
  Zpřístupněn v rámci naučné stezky. Kombinace s lázněmi Běloves a Náchodem jako historická procházka.
