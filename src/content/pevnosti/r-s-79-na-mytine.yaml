title: R-S 79 „Na mýtině"
code: R-S 79
type: pechotni-srub
line: Rokytnice v Orlických horách
region: Královéhradecký kraj
location:
  lat: 50.1689
  lon: 16.4747
  address: Rokytnice v Orlických horách
built: '1937'
state: zachovaly
description: Pěchotní srub na rokytnickém úseku orlickohorské linie. Typický horský
  srub v pokročilém stupni rozpadu.
history: 'Rokytnická linie (R) byla součástí husté obrany Orlických hor. R-S 79 byl
  středně velký dvoukřídlý srub s bočními střílnami.


  Po Mnichovu Wehrmacht zbavil objekty výzbroje. V poválečných letech část objektů
  využívala ČSLA jako cvičné cíle.


  Dnes objekt jen jako torzo v terénu — vhodné pro znalce vojenské architektury.

  '
visit: 'Přístupný po turistických stezkách Orlických hor. Vnitřek nedostupný.

  '
