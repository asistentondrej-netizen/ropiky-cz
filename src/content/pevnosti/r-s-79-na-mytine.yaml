description: Pěchotní srub na rokytnickém úseku orlickohorské linie. Typický horský srub v pokročilém stupni rozpadu.
history: 'Rokytnická linie (R) byla součástí husté obrany Orlických hor. R-S 79 byl středně velký dvoukřídlý srub s bočními střílnami.


  Po Mnichovu Wehrmacht zbavil objekty výzbroje. V poválečných letech část objektů využívala ČSLA jako cvičné cíle.


  Dnes objekt jen jako torzo v terénu — vhodné pro znalce vojenské architektury.

  '
visit: 'Přístupný po turistických stezkách Orlických hor. Vnitřek nedostupný.

  '
