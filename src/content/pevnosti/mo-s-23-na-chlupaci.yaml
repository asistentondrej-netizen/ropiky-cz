title: MO-S 23 „Na Chlupáči"
code: MO-S 23
type: pechotni-srub
line: Moravská Ostrava
region: "Moravskoslezský kraj"
location:
  lat: 49.93637
  lon: 18.20459
  elevation: 275
built: '1937'
state: zachovaly
description: Pěchotní srub „Na Chlupáči" — jeden z nejznámějších objektů ostravské
  linie mimo muzejní areál. Oboustranný typ B odolnosti II, typická křídla pro dva
  těžké kulomety v lafetách L1. Konzervován, vnější pochozí, interiér uzavřen.
sources:
- Wikimedia Commons
wikidata_id: Q98636459
commons_category: MO-S 23 Na Chlupáči casemate
updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub „Na Chlupáči" v oblasti Hlučínska — součást
  moravskoostravské linie ŘOP chránící Ostravskou průmyslovou aglomeraci.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti v otevřeném terénu — palebné otvory,
  pozorovací zvon (některé objekty zvony ztratily při poválečném demontáži ocelových
  součástí). Výhled na Ostravskou aglomeraci.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** Autem z Ostravy po silnici II/469 (8 km) na Hlučín, odbočit na vedlejší
  cestu. Vlakem/autobusem do Hlučína + pěšky (1 km). Napojeno na cyklistickou stezku
  podél Odry.


  **Doporučeno kombinovat s:** Areálem čs. opevnění Hlučín-Darkovičky (muzeum, 4 km),
  MO-S 30 Dvoják (Bohumín), Landek Parkem Ostrava. Celodenní okruh po ostravském opevnění.'
