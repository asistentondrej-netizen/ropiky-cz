description: Pěchotní srub „Na Chlupáči" — jeden z nejznámějších objektů ostravské linie mimo muzejní areál. Oboustranný typ
  B odolnosti II, typická křídla pro dva těžké kulomety v lafetách L1. Konzervován, vnější pochozí, interiér uzavřen.
