visit: 'Volně přístupný pěchotní srub „Na Chlupáči" v oblasti Hlučínska — součást moravskoostravské linie ŘOP chránící Ostravskou
  průmyslovou aglomeraci.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti v otevřeném terénu — palebné otvory, pozorovací zvon (některé objekty zvony
  ztratily při poválečném demontáži ocelových součástí). Výhled na Ostravskou aglomeraci.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** Autem z Ostravy po silnici II/469 (8 km) na Hlučín, odbočit na vedlejší cestu. Vlakem/autobusem do Hlučína
  + pěšky (1 km). Napojeno na cyklistickou stezku podél Odry.


  **Doporučeno kombinovat s:** Areálem čs. opevnění Hlučín-Darkovičky (muzeum, 4 km), MO-S 30 Dvoják (Bohumín), Landek Parkem
  Ostrava. Celodenní okruh po ostravském opevnění.'
