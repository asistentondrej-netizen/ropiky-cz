description: Řopík typ A-160 (zesílený) v ulici Pod dvorem na východním okraji Valtic — zlevicovaný objekt s výhledem směrem k Boří dvoru. „S" v kódu označuje směrovou orientaci střílen.
history: |
  Betonován v roce 1938, typ A-160 znamená zesílenou verzi s tloušťkou čelní stěny 80 cm a odolností proti 150 mm dělostřelectvu. Objekt byl součástí druhé linie obrany Valtic od východu. V září 1938 osazen, kulomet ZB vz. 26, tříčlenná osádka. Po Mnichovu uzavřen. Za okupace sloužil jako skladovací prostor pro hospodářský dvůr.
visit: |
  Nejlépe zachovalý z valtických řopíků — přístupný i z centra města pěšky.
  
  **Přístup:** volně, 24/7. Z centra Valtic 10 min pěšky ulicí Pod dvorem.
  
  **Co uvidíte:** LO vz. 37 typ A-160, dvě střílny pro TK, zachovaná kazemata s větracím kanálem. Čelní stěna nese patinu.
  
  **Doporučená délka:** 20–30 minut.
  
  **Dostupnost:** Pěšky z centra Valtic nebo autem k okraji ulice. Na kole po Moravské vinařské stezce.
  
  **Doporučeno kombinovat s:** zámkem Valtice, Kolonádou Rajstna, Národním salonem vín.
