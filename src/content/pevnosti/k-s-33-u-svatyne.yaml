title: K-S 33 „U svatyně"
code: K-S 33
type: pechotni-srub
line: Králíky
region: Pardubický kraj
location:
  lat: 50.0712
  lon: 16.7987
  address: Králíky-Mladkov, u kostela
built: '1937'
state: pristupny
description: Pěchotní srub „U svatyně" — součást obranné linie tvrze Adam. Volně přístupný
  exteriér.
history: 'K-S 33 byl betonován na podzim 1937. Oboustranný pěchotní srub II. odolnosti,
  součást předsunuté obrany tvrze Adam.


  V září 1938 plně vyzbrojen. Po Mnichovu rozebírán Wehrmachtem, zvony odvezeny do
  Říše. Dnes nezrekonstruovaný, ale dobře zachovalý.

  '
visit: 'Volně přístupný srub v blízkosti tvrze Adam.


  **Přístup:** volně 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti s prázdnými pancéřovými otvory (zvony
  odvezeny), střílny. Z vrchu vidět sousední sruby.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Králík (8 km) do Mladkova + pěšky (300 m).


  **Doporučeno kombinovat s:** tvrzí Adam, tvrzí Bouda, K-S 31 U besídky, Mladkovem.

  '
