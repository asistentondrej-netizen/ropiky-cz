description: Řopík typ A-160 (zesílený) v Boří doubravě. Stojí uprostřed polí mezi valtickou samotou Boří dvůr a rakouskou hranicí — typický zástupce linie B-4 v krajině UNESCO areálu.
history: |
  Betonován v dubnu 1938 jako součást linie chránící koridor mezi Valticemi a rakouským Schrattenbergem. Typ A-160 znamená odolnost proti 150 mm dělostřelectvu s tloušťkou stěny 60 cm.

  Po mobilizaci 1938 osazen skupinou 3 mužů s kulometem ZB vz. 26. V září 1938 objekt uzavřen a odevzdán Wehrmachtu.

  Za války poškozen testováním německé protitankové zbraně — dodnes viditelné stopy průstřelů na pravé straně kazematy. Od 90. let udržován spolkem KVH Valtice.
visit: |
  Klasický řopík v otevřené krajině Lednicko-valtického areálu — fotogenický pohled na pole a Pálavu.

  **Přístup:** volně, 24/7. Od samoty Boří dvůr 500 m polní cestou.

  **Co uvidíte:** LO vz. 37 typ A-160 — zesílená verze s tlustší přední stěnou. Dvě střílny pro kulomety, vchod s pancéřovými dveřmi (pozůstatky).

  **Doporučená délka:** 20 minut.

  **Dostupnost:** Autem z Valtic (5 km) po silnici směr Schrattenberg, pak polní cestou. Na kole po cyklotrase Moravská vinařská stezka.

  **Doporučeno kombinovat s:** zámkem Valtice (5 km), Bořím dvorem (samota se studnou), Kolonádou na Rajstně (vyhlídka), řopíkem v Úvalech.
