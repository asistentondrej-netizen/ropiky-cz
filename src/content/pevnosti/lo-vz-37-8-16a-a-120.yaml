description: LO vz. 37 typ A-120, součást úsek 8 — Boří les / Lanžhot na jižní Moravě. Objekt leží v NPR Soutok, blízko slovensko-moravské hranice (řeka Morava), v oblasti nejsilněji opevněné části Valticka. Dohledatelné v OSM.
history: 'Betonován v roce 1938 jako součást jižní linie lehkého opevnění vz. 37 — úsek 8 — Boří les / Lanžhot. Dva kulomety ZB vz. 26 v bočním postavení (kosá palba). Čelní stěna 60 cm, II. třída odolnosti.


  V září 1938 zařazen do obranného plánu proti hrozbě útoku z rakouského území (po Anschlussu v březnu 1938). Během všeobecné mobilizace 23.–30. září 1938 obsazen pohotovostní jednotkou se základní výzbrojí.


  Po Mnichovské dohodě a záboru pohraničí opuštěn a předán Wehrmachtu. Němci využili část linie k testům protipevnostní munice; v letech 1939–40 odvezeny kovové prvky (dveře, mříže). Po válce objekt zůstal v krajině bez systematické péče.

  '
visit: '**Přístup:** volně přístupný, 24/7.


  **Lokace:** Objekt leží v NPR Soutok, blízko slovensko-moravské hranice (řeka Morava), v oblasti nejsilněji opevněné části Valticka. Autem do Lanžhota, dále 4 km po lesní cestě do NPR (omezený motorový provoz).


  **Co uvidíte:** LO vz. 37 typ A-120, dvě boční střílny pro těžký kulomet. Interiér pravděpodobně neprůchodný (vchod zabetonovaný nebo zborcený).


  **Doporučená délka:** 15–20 minut u objektu; jako součást většího výletu po linii 2–4 hodiny.


  **Doporučeno kombinovat s:** soutokem Dyje a Moravy, slovenskou stranou hranice, cyklotrasou Jantarová stezka.

  '
