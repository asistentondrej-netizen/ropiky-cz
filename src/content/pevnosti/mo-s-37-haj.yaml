history: 'MO-S 37 byl postaven v letech 1936–1937. Oboustranný pěchotní srub II. odolnosti.
  V 70. letech krátce využíván Civilní obranou jako úkrytový prostor.


  Dnes volně přístupný, nezrekonstruovaný.

  '
visit: 'Krajní moravskoostravský srub — volně přístupný, klidné prostředí.


  **Přístup:** volně 24/7.


  **Co uvidíte:** srub v okraji obce Háj, pancéřové zvony, typické palebné pole směrem
  k Ostravě.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Háje (500 m) nebo z Opavy (15 km). Vlakem do Hájské + pěšky.


  **Doporučeno kombinovat s:** MO-S 38 Smolkov (1 km), Areálem Hlučín-Darkovičky,
  Ostravou, Opavou.

  '
