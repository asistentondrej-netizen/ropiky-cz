title: N-S 83 „Běloves"
code: N-S 83
type: pechotni-srub
line: Náchod
region: Královéhradecký kraj
location:
  lat: 50.4221
  lon: 16.1762
  address: Náchod-Běloves, přechod Metuje
built: '1937'
state: pristupny
description: Pěchotní srub „Běloves" — klíčový objekt chránící most přes Metuji na cestě do Polska. Dobře zachovalý, volně
  přístupný.
history: 'N-S 83 je jeden z mála objektů, kde byly v září 1938 vedeny boje — při incidentu s německými freikorpsisty. Po mobilizaci
  24.–30. září byl objekt plně obsazen a obsluhoval palebnou kontrolu mostu.


  Po Mnichovu v majetku čs. státu. Dnes nezrekonstruovaný, ale kompletně zachovalý — typický srub s pancéřovými zvony, vchodem
  s ochranou a stopami překážek.

  '
visit: 'Historicky významný srub — místo incidentu ze září 1938.


  **Přístup:** volně 24/7, zdarma. V okolí informační tabule KVH Náchod.


  **Co uvidíte:** srub v parku u silnice, informační tabule o incidentu freikorpsistů. Dobře zachovalé betonové překážky v
  okolí.


  **Doporučená délka:** 20 minut.


  **Dostupnost:** Autem z Náchoda (3 km) směrem Polsko. Vlakem do Náchoda + autobus. Pěšky po naučné stezce.


  **Doporučeno kombinovat s:** tvrzí Dobrošov, Náchodem, polským Kladskem (blízké hraniční město Polanica Zdrój).

  '
