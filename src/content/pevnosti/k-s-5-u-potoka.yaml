updated: '2026-04-18'
visit: 'Pěchotní srub K-S 5 „U potoka" — součást obranné linie tvrze Hůrka, exteriérně
  volně přístupný. Atypicky uzavřený mezi skalami Orlických hor.


  **Přístup:** celoročně volně, 24/7 (exteriér). Interiér občas otevřen při akcích
  Klubu vojenské historie Pevnost Králíky.


  **Co uvidíte:** jednostranný pěchotní srub se zachovanými zvony, palebnými otvory
  a klasickou orientací na sousední objekty tvrze. Krásné lesní zasazení u potoka
  — odtud název.


  **Doporučená délka:** 20 minut.


  **Dostupnost:** Autem z Králík (12 km) na Červenou Vodu, odbočit u Mlýnice na lesní
  cestu (600 m pěšky). Vlakem do Králík + autobus nebo taxi.


  **Bezpečnost:** v zimě zledovatělý přístup od potoka. Doporučena pevná obuv.


  **Doporučeno kombinovat s:** komplexní prohlídkou tvrze Hůrka (K-S 52 Pod skalou,
  vchodový objekt, podzemí), pěchotním srubem K-S 14 U cihelny, Vojenským muzeem Králíky.
  Ideální součást celodenního okruhu.'
