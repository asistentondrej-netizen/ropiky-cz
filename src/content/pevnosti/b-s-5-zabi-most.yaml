# === HISTORIE ===
history: >
  B-S 5 „Žabí most" byl vybudován v letech 1937–1938 firmou Ing.
  Záruba-Pfeffermann Brno jako součást obrany bratislavské čáry. Jednostranný
  pěchotní srub II. stupně s výzbrojí 2 TK vz. 37, 1 PTK vz. 36 a 1 LK v zvonu.


  Název „Žabí most" pochází z pomístního označení — v blízkosti objektu se
  nacházel malý most přes Chorvátske rameno, kde v jarních měsících žily velké
  populace žab. V září 1938 plně obsazen posádkou slovenské části čs. armády
  (pluk 39 „Výhlad") pod velením nadp. Štefana Adámka.


  Po Vídeňské arbitráži (listopad 1938) byla Petržalka přičleněna k Německu.
  B-S 5 zůstal v německé části, Wehrmacht demontoval výzbroj. Za války sloužil
  jako sklad munice Luftwaffe.


  Po roce 1945 objekt převzala ČSLA, v 50.–80. letech sloužil jako sklad
  pohraniční stráže. Po roce 1989 opuštěn, v 90. letech devastován vandaly.


  Systematická rekonstrukce proběhla v letech 2007–2015 spolkem Zachráňme
  petržalské bunkre — obnoven interiér, instalovány repliky lafet M, obnoven
  pozorovací zvon a vchod s pancéřovými dveřmi.

