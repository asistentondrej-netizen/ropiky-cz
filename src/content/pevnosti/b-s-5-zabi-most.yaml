title: B-S 5 „Žabí most"
code: B-S 5
type: pechotni-srub
line: Bratislava-Petržalka
region: Bratislavský kraj (SR)
location:
  lat: 48.131
  lon: 17.1175
  address: Bratislava-Petržalka, Chorvátske rameno
built: '1938'
state: muzeum
description: Rekonstruovaný jednostranný pěchotní srub v centru pevnostní linie kolem Petržalky. Součást expozice „Petržalské
  bunkre" spolku Zachráňme petržalské bunkre. Jeden z mála přístupných čs. srubů na Slovensku.
history: 'B-S 5 „Žabí most" byl vybudován v letech 1937–1938 firmou Ing. Záruba-Pfeffermann Brno jako součást obrany bratislavské
  čáry proti hrozbě z Maďarska a Rakouska. Jednostranný pěchotní srub II. stupně, výzbroj 2 TK vz. 37 a 1 PTK vz. 36.


  Název „Žabí most" pochází z pomístního označení — v blízkosti objektu se nacházel malý most přes Chorvátske rameno, kde
  v jarních měsících žily velké populace žab. V září 1938 plně obsazen posádkou slovenské části čs. armády (pluk 39 „Výhlad")
  pod velením nadp. Štefana Adámka.


  Po Vídeňské arbitráži (listopad 1938) byla Petržalka přičleněna k Německu a Maďarsku. B-S 5 zůstal v německé části, Němci
  demontovali výzbroj. Za války sloužil jako sklad munice Luftwaffe.


  Po roce 1945 objekt převzala ČSLA, v 50.–80. letech sloužil jako sklad pohraniční stráže. Po roce 1989 opuštěn, v 90. letech
  devastován vandaly a bezdomovci.


  Systematická rekonstrukce proběhla v letech 2007–2015 spolkem **Zachráňme petržalské bunkre** — obnoven interiér, instalovány
  repliky lafet M, obnoven pozorovací zvon a vchod s pancéřovými dveřmi.'
visit: 'B-S 5 „Žabí most" je součástí **expozice Petržalské bunkre** — tematické trasy přes deset rekonstruovaných řopíků
  a pěchotních srubů v Petržalce. Nejdostupnější objekt v centru městské části.


  **Otevírací doba:** Víkendy duben–říjen, zpravidla 13:00–17:00. Prohlídka s průvodcem každou celou hodinu. Zimní období
  uzavřeno. Aktuální program na zacranmepetrzalskebunkre.sk.


  **Vstupné:** 5 EUR dospělí, 3 EUR děti/studenti. Rodinná vstupenka 12 EUR.


  **Délka prohlídky:** 45 minut (samotný objekt) nebo 2,5 hodiny pro kombinovanou prohlídku s sousedními B-S 6 „Vrba" a B-S
  4 „Lány".


  **Dostupnost:**


  - MHD: tramvaj 1 nebo 3 do zastávky Pečnianska, pak 5 min pěšky

  - Autem: Petržalka, parkovací dům OC Aupark (placený), odtud 10 min pěšky

  - Na kole: cyklostezka Chorvátske rameno vede přímo kolem objektu

  - Pěšky z centra Bratislavy přes Nový most: 35 min


  **Co vidět:**


  - Rekonstruovaná střelecká místnost s replikou TK vz. 37 v lafetě M

  - Pancéřové dveře typu N a vnitřní uzávěra

  - Pozorovací zvon s periskopem

  - Pancéřová vložka střílny s dochovanou cedulí „ZB-53"

  - Expozice bratislavské čáry v suterénu


  **Doporučená kombinace:** Celá trasa Petržalských bunkrů (3 hod) + historické centrum Bratislavy (2 hod) + Bratislavský
  hrad = **celodenní výlet do slovenského fortifikačního dědictví**.


  **Tip:** Každý rok v září se na lokalitě koná **Den čs. opevnění** s rekonstrukcí bojové pohotovosti posádek z roku 1938.
  Obrovská návštěvnická akce s dobovým oblečením, historickými zbraněmi a ukázkami střeleb.'
