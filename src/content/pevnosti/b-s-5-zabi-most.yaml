description: >
  Vlajkový rekonstruovaný pěchotní srub bratislavské Petržalky. Jednostranný
  srub II. stupně odolnosti je součástí expozice „Petržalské bunkre" spolku
  Zachráňme petržalské bunkre — jediné ucelené prohlídkové trasy čs. opevnění
  na Slovensku. Zrekonstruovaný interiér s replikami zbraní, pancéřovými
  dveřmi a pozorovacím zvonem.

