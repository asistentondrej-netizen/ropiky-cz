# === NÁVŠTĚVA ===
visit: >
  Součást tematické trasy „Petržalské bunkre" — jediné ucelené expozice čs.
  opevnění na Slovensku. Otevřeno víkendy duben–říjen 13:00–17:00, prohlídky
  s průvodcem každou celou hodinu. Každoročně v září se koná Den čs. opevnění
  s rekonstrukcí bojové pohotovosti 1938. Aktuální program na
  zacranmepetrzalskebunkre.sk.

