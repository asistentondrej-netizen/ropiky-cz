title: Řopík 8/5/A-140 — Poštorná (Břeclav)
code: 8/5/A-140 Poštorná
type: lo-vz-37
line: B-4 Úvaly — Břeclav
region: Jihomoravský kraj
location:
  lat: 48.7446
  lon: 16.8796
  address: Břeclav-Poštorná, polní cesta východně od sídliště
built: '1938'
state: rozpadly
description: Řopík na jižním okraji Břeclavi — součást linie B-4 uzavírající prostor
  mezi Valticemi a Dyjí. Po částečné demolici v 60. letech zbyly jen trosky.
history: 'Objekt postaven v březnu 1938 jako severní kotvící bod úseku B-4. Linie
  zde přecházela do oblasti řeky Dyje, kde ji měla v případě útoku podpořit palba
  z jiných řopíků na druhém břehu.


  V září 1938 plně osazen, po Mnichovu opuštěn. Za protektorátu ve stavu skladu.


  V letech 1964–1965 objekt částečně demolován při rozšiřování průmyslové zóny Poštorná
  — zničena pravá polovina kazematy, přední stěna s jednou střílnou dodnes stojí.
  Trosky jsou zarostlé, bez značení.

  '
visit: 'Rozpadlý řopík jako „připomínka toho, co bývalo" — jedna z nejhorších ukázek,
  jak se k opevnění v ČSSR chovalo. Zajímavé místo spíše pro historika než turistu.


  **Přístup:** volně, ale v mírně zarostlém terénu mimo turistické trasy.


  **Co uvidíte:** jen přední stěnu původního objektu, polovina kazematy odstřelena,
  vnitřek zasypán sutí. Stojí jako memento destrukce 60. let.


  **Doporučená délka:** 10 minut (rychlá zastávka pro dokumentaci).


  **Dostupnost:** Z centra Břeclavi 3 km po silnici Valtická. Autem do Poštorné, pak
  polní cestou 500 m.


  **Doporučeno kombinovat s:** návštěvou Břeclavi (nádraží, kostel sv. Václava Poštorná
  — unikátní cihlový kostel 1894), tvrzem Břeclav (zaniklá), jinými řopíky B-4.

  '
