title: Řopík 8/X/A-140 — Úvaly u Valtic (hraniční bod)
code: 8/X/A-140 Úvaly
type: lo-vz-37
line: B-4 Úvaly — Břeclav
region: Jihomoravský kraj
location:
  lat: 48.718
  lon: 16.771
  address: Úvaly u Valtic, pole u bývalého hraničního přechodu
built: '1937'
state: pristupny
description: Nejjižnější řopík moravské části linie B-4. Stojí necelých 50 m od rakouské
  hranice v otevřeném terénu vinohradů, bez maskování — jeden z nejviditelnějších
  objektů na jihu Moravy.
history: 'Objekt betonován v listopadu 1937 firmou Ing. Zdenka Pokorného (Hodonín)
  jako součást úseku B-4. Linie zde vede rovnou po hranici bez přírodních překážek
  — jediný relief je železniční násep 500 m na sever.


  V září 1938 osazen četou pěšího pluku 43. Po Mnichovu opuštěn, linii ponechaly československé
  jednotky Němcům bez boje. Za protektorátu sloužil Wehrmachtu jako skladiště.


  V 50. letech uvažováno o demolici v rámci „zneškodnění opevnění", objekt však zůstal
  zachován díky vzdálenosti od silnic. Dnes volně přístupný v krajině.

  '
visit: 'Nejjižnější řopík Moravy a jeden z nejfotogennějších — otevřený výhled do
  Rakouska, na svahy Pavlovských vrchů a do vinohradů.


  **Přístup:** volně 24/7, zdarma. Objekt stojí v poli, přístup po polní cestě z Úvalů
  u Valtic (cca 800 m pěšky).


  **Co uvidíte:** typický LO vz. 37 typ A (jednostranný) — přední stěna s dvěma střílnami,
  vzadu vchod s ochranným zdvihem. Vnitřek přístupný, ale bez vybavení.


  **Doporučená délka:** 20–30 minut.


  **Dostupnost:** Autem z Valtic (4 km) po silnici II/414 směr Úvaly. Vlak do Valtic,
  pak pěšky nebo na kole po Moravské vinařské stezce.


  **Doporučeno kombinovat s:** vinařstvím v Úvalech, zámkem Valtice (3 km), dalšími
  řopíky na lince Boří dvůr a Hlohovec.

  '
sources:
