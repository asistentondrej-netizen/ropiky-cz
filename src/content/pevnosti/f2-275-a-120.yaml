history: 'Dělostřelecká tvrz Jírová hora (též Maternice) je dělostřelecká tvrz, jejíž výstavba nebyla nikdy zahájena. Tvrz měla patřit mezi páteř obrany československého opevnění na severní hranici Československa. Umístění tvrze bylo plánováno v prostoru nepojmenované kóty 546, dříve nazývané Maternice, severozápadně od Hronova. Tvrz měla patřit mezi nejsilnější z plánovaných tvrzí československé pevnostní soustavy, tvořena měla být čtyřmi pěchotními sruby (T-S 8-10, T-S 15), dělostřeleckou otočnou věží… (Zdroj: Wikipedie, CC BY-SA)'
