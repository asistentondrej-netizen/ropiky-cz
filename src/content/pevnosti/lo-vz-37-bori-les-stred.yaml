description: Standardní řopík typ A-140 uprostřed Boří lesa — typický zástupce linie, která probíhala lesem od Valtic k Břeclavi. Fotogenický objekt obrůstaný mladým lesním porostem.
history: |
  Betonován v říjnu 1937. Typ A-140 je běžný středně zesílený typ (60 cm čelní stěna). Osazen v září 1938, tříčlenná osádka. Po Mnichovu opuštěn. Za okupace sloužil ojediněle jako improvizovaný úkryt pro lesní dělníky. V 70. letech pokus o vytrhnutí střílny byl neúspěšný — pancéřové díly odolaly.
visit: |
  Objekt pro milovníky klidu — mimo hlavní turistickou stezku.
  
  **Přístup:** volně, 24/7. Po lesních cestách ze silnice Valtice—Charvátská NV.
  
  **Co uvidíte:** LO vz. 37 typ A-140, dvě střílny, zachovaná kazemata. Okolí husté lesní porosty.
  
  **Doporučená délka:** 15 minut.
  
  **Dostupnost:** Autem k lesní odbočce, pak 500 m pěšky. Na kole po lesních stezkách.
  
  **Doporučeno kombinovat s:** dalšími objekty v Boří lese, objektem u Bořího dvora.
