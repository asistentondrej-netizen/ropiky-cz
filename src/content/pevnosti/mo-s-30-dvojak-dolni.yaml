title: MO-S 30 „Dvoják dolní"
code: MO-S 30
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.93307
  lon: 18.15902
built: '1937'
state: pristupny
description: Dvojče MO-S 30/31 „Dvoják" — dvojice pěchotních srubů stavěných jako
  taktická jednotka. Odolnost II s přímým palebným krytím. Volně přístupný exteriér,
  součást naučné stezky ostravského opevnění.
sources:
- Wikimedia Commons
- ropiky.net
updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub „Dvoják dolní" v oblasti Bohumína — jeden z
  nejsevernějších objektů moravskoostravské linie ŘOP.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti s charakteristickým orientováním — „dvoják"
  označuje typ s dvěma střeleckými komorami. Objekt je zasazen v polní krajině, v
  dohledu má sousední srub MO-S 30 horní.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Bohumína (3 km) po silnici do Starého Bohumína. Vlakem do
  Bohumína (hlavní trať Praha–Košice) + pěšky/bus. Napojeno na cyklostezky kolem Odry.


  **Doporučeno kombinovat s:** Starým Bohumínem (památník Přátelství, Polské hranice),
  MO-S 5 Bohumín, Areálem Hlučín-Darkovičky (15 km). Fortifikační okruh Bohumín–Ostrava.'
