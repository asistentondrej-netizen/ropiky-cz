visit: 'Volně přístupný pěchotní srub „Dvoják dolní" v oblasti Bohumína — jeden z nejsevernějších objektů moravskoostravské
  linie ŘOP.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti s charakteristickým orientováním — „dvoják" označuje typ s dvěma střeleckými
  komorami. Objekt je zasazen v polní krajině, v dohledu má sousední srub MO-S 30 horní.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Bohumína (3 km) po silnici do Starého Bohumína. Vlakem do Bohumína (hlavní trať Praha–Košice) +
  pěšky/bus. Napojeno na cyklostezky kolem Odry.


  **Doporučeno kombinovat s:** Starým Bohumínem (památník Přátelství, Polské hranice), MO-S 5 Bohumín, Areálem Hlučín-Darkovičky
  (15 km). Fortifikační okruh Bohumín–Ostrava.'
