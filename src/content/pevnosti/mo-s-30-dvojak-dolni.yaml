description: Dvojče MO-S 30/31 „Dvoják" — dvojice pěchotních srubů stavěných jako
  taktická jednotka. Odolnost II s přímým palebným krytím. Volně přístupný exteriér,
  součást naučné stezky ostravského opevnění.
sources:
- Wikimedia Commons
