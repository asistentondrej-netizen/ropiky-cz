description: >
  Plně dokončená dělostřelecká tvrz u Králík, jedna z pěti dostavěných tvrzí
  čs. opevnění. Podzemí o délce přibližně 1 750 metrů spojuje šest bojových
  a vchodových objektů. Po válce sloužila jako tajný muniční sklad československé
  armády, dnes je součástí Králického pevnostního areálu.

