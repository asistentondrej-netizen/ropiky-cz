# === HISTORIE ===
history: >
  Tvrz Hůrka byla stavěna v letech 1936–1938 jako páteř obrany Králicka
  spolu se sousední tvrzí Bouda. Komplex tvoří pět bojových srubů (K-S 12
  „U rybníčku", K-S 13 „U cesty", K-S 14 „U potoka", K-S 15 „U lesa", K-S 16
  „U lomu") a vchodový srub K-S 12a, propojené 1 750 metry podzemních chodeb
  v hloubce 30 metrů pod úrovní terénu.


  V září 1938 byla tvrz plně vyzbrojena a obsazena posádkou. Po Mnichovu
  odevzdána Wehrmachtu, který ji využíval jako muniční sklad. Po válce
  ji převzala Československá lidová armáda a 50 let ji provozovala jako
  tajný sklad munice — tento status zachoval většinu objektu v dobrém stavu.


  Po roce 2000 byla tvrz postupně zpřístupňována veřejnosti. Dnes je součástí
  Králického pevnostního areálu spolu s nedalekou tvrzí Bouda, muzeem v pevnosti
  K-S 14 a dalšími objekty.

