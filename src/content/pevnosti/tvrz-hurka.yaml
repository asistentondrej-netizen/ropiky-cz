# === NÁVŠTĚVA ===
visit: >
  Prohlídka tvrze Hůrka je součástí Králického pevnostního areálu. Trasa vede
  přes vchodový srub K-S 12a, podzemní chodby, kasárny a několik bojových srubů.
  Prohlídka pouze s průvodcem, doba cca 90 minut. Aktuální informace
  na kralickypevnostniareal.cz.

