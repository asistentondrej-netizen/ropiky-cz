title: OP-S 25 „Milostovice"
code: OP-S 25
type: pechotni-srub
line: Opava
region: Moravskoslezský kraj
location:
  lat: 49.9532
  lon: 17.8891
  address: Opava-Milostovice
built: '1937'
state: pristupny
description: Pěchotní srub „Milostovice" — jeden z mála dobře zachovaných izolovaných TO opavské linie. Slezské zemské muzeum
  označilo objekt jako Památník opevnění 1938.
history: 'OP-S 25 byl betonován v létě 1937 jako součást plánované obranné linie severně od Opavy. Jednostranný pěchotní srub
  II. odolnosti s pancéřovými zvony — dochované dodnes.


  Po Mnichovu sloužil Wehrmachtu jako skladiště. V letech 1957–1990 součást civilní obrany. Od roku 1995 památník Slezského
  zemského muzea, drobné exteriérové úpravy.

  '
visit: 'Pěchotní srub v klidném lesním prostředí severně od Opavy — exteriérní prohlídka možná kdykoliv, občas otevřeno při
  akcích muzea.


  **Přístup:** celoročně volně (exteriér), 24/7. Interiér — víkendové prohlídky v sezóně (květen–září).


  **Vstupné:** exteriér zdarma, interiér cca 50 Kč v rámci muzejního programu.


  **Co uvidíte:** dobře zachovalý srub s pancéřovými zvony v původních pozicích, informační tabule památníku, stopy překážek.
  V okolí je patrná plánovaná linie směrem k Hlučínsku.


  **Doporučená délka:** 20–30 minut.


  **Dostupnost:** Autem z Opavy (5 km) po silnici na Krnov, odbočit na Milostovice. Autobus MHD Opava č. 209 (zastávka Milostovice).


  **Doporučeno kombinovat s:** Opavou (Slezské zemské muzeum, chrám sv. Ducha), Areálem Hlučín-Darkovičky (25 km), OP-S 22,
  OP-S 26. Celodenní opavsko-hlučínský okruh.

  '
