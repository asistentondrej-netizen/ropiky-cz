updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub „Křivá" na severním svahu Orlických hor — součást
  obranné linie mezi tvrzemi Hanička a Skutina.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti — charakteristické zakřivení terénem
  a umístění v mírném kopci. Pozorovací zvony, palebné otvory. Objekt je nezrekonstruovaný.


  **Doporučená délka:** 20 minut.


  **Dostupnost:** Autem z Rokytnice v Orlických horách (6 km) nebo z Bartošovic. Vlakem
  do Rokytnice + pěšky/kolo po cyklotrase. Napojení na turistické značení Orlických
  hor.


  **Doporučeno kombinovat s:** tvrz Hanička (R-S 74, muzeum), ostatní R-S sruby (54,
  60, 69), obcí Bartošovice v Orlických horách, Zemskou bránou. Ideální celodenní
  túra.'
