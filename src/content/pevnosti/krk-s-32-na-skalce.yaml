  address: Krkonoše — okolí Pomezních Bud
built: '1937'
state: rozpadly
description: Pěchotní srub „Na skalce" v krkonošském pohraničí — součást severní krkonošské linie. Oboustranný typ B odolnosti III. Po Mnichovu opuštěn, za války demontovány pancéřové prvky. Zachovalé torzo v lesním terénu nedaleko turistických cest.
history: 'KrK-S 32 byl součástí krkonošské linie těžkého opevnění, jež nebyla nikdy plně dokončena. Sruby v této oblasti byly stavěny v náročných horských podmínkách.


  Po Mnichovu byly objekty zabrány Wehrmachtem, část výzbroje odvezena do Atlantického valu. Po válce postupně chátraly.

  '
visit: 'Objekt v terénu, vhodný jako součást turistické trasy. Vnitřek nepřístupný.

  '
