description: 'Pěchotní srub v podhůří Krkonoš. Po Mnichovu opuštěn, dnes torzo v terénu.'
history: |
  KrK-S 32 byl součástí krkonošské linie těžkého opevnění, jež nebyla nikdy plně dokončena. Sruby v této oblasti byly stavěny v náročných horských podmínkách.

  Po Mnichovu byly objekty zabrány Wehrmachtem, část výzbroje odvezena do Atlantického valu. Po válce postupně chátraly.
visit: |
  Objekt v terénu, vhodný jako součást turistické trasy. Vnitřek nepřístupný.
