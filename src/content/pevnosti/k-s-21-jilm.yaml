  parkovani: Parkoviště před areálem (50 Kč).
  mhd: Z Králík bus linka 660 do Dolní Moravy, 500 m pěšky.
  teplotaUvnitr_C: 10
  upozorneni:
    - Teplota v podzemí celoročně 8–12 °C — teplé oblečení i v létě.
    - Vlhkost 80–90 %, citlivé na astma.
    - Prohlídka 2 hodiny, součástí je 800 m chůze v podzemí.
    - Rezervujte alespoň týden dopředu ve vrcholné sezóně.

