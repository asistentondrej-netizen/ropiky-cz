description: >
  Vchodový objekt dělostřelecké tvrze Bouda — nejnavštěvovanější brána do
  podzemního komplexu králické pevnostní oblasti. Robustní železobetonová
  stavba s rampou pro nákladní vozidla, dvěma pancéřovými vraty a ubikací
  strážní jednotky. Součást prohlídky tvrze Bouda.
