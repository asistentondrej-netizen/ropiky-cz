# === NÁVŠTĚVA ===
visit: >
  Vchod do podzemního komplexu tvrze Bouda — začátek 2hodinové prohlídky
  800m tunelového systému. Prohlídka výhradně s průvodcem, každou celou
  hodinu. Rezervace silně doporučena v letních měsících. Otevřeno duben–říjen,
  v hlavní sezóně (červenec–srpen) denně. Aktuální program na bouda.cz.

