title: K-S 21 „Jilm"
code: K-S 21
type: pechotni-srub
line: Králíky (pásmo tvrze Bouda)
region: Pardubický kraj
location:
  lat: 50.1203
  lon: 16.7392
  address: Králíky, tvrz Bouda (nadzemní část)
built: '1937'
state: muzeum
description: Vchodový objekt tvrze Bouda — nejnavštěvovanější brána do podzemního komplexu. Součást prohlídky tvrze Bouda.
  Obsahuje rampu pro nákladní vozidla a technickou infrastrukturu.
history: 'K-S 21 „Jilm" (oficiálně také K-S 22 podle některé literatury) byl postaven v letech 1936–1937 firmou Záruba-Pfeffermann
  Brno jako **vchodový objekt dělostřelecké tvrze Bouda**. Konstrukčně jde o robustní železobetonovou stavbu s rampou pro
  nákladní vozidla zahloubenou do svahu, propojenou podzemním systémem se čtyřmi pěchotními sruby tvrze.


  **Unikátnost objektu:**


  - **Obousměrná rampa** pro nákladní vozidla (sklon 10 %, délka 35 m)

  - **Vnitřní obrat** — vozidlo mohlo zajet dovnitř, otočit se a vyjet

  - **Dvě velká pancéřová vrata** (vnější + vnitřní) pro dvojitou obranu

  - **Ubikace strážní jednotky** (6 mužů)

  - **Plně filtroventilováno** a napojeno na podzemí


  V září 1938 plně obsazen, v říjnu předán Wehrmachtu. Za války sklad munice, po roce 1948 sklad munice ČSLA (dlouhodobé využití
  zachovalo objekt v dobrém stavu).


  Od roku 1991 součást prohlídkového okruhu tvrze Bouda.'
visit: 'K-S 21 je **vchod do podzemního komplexu tvrze Bouda** — začínáte tady a pokračujete do 800 m dlouhého tunelového
  systému. Pravděpodobně nejdramatičtější začátek prohlídky v čs. fortifikační turistice.


  **Otevírací doba:** Duben–říjen, víkendy a svátky 9:00–17:00. V hlavní sezóně (červenec–srpen) denně. Vstup jen s průvodcem,
  prohlídky každou celou hodinu. Rezervace silně doporučena, zejména v letních měsících. Bouda.cz.


  **Vstupné:** 200 Kč dospělí, 100 Kč děti, rodinná vstupenka 450 Kč. Kombinovaná vstupenka **Bouda + K-S 22a „Krok"**: 280
  Kč.


  **Délka prohlídky:** 2 hodiny (celá tvrz), samotný vchodový objekt K-S 21 cca 20 minut.


  **Struktura prohlídky:**


  1. **Vstup přes pancéřová vrata** (5 min) — obrovské 20tunové vrata, které se otevírají při zvláštních příležitostech

  2. **Prohlídka rampy a obratu** (10 min)

  3. **Vchodová strážnice** (5 min) — ubikace 6 mužů, dochované vybavení

  4. **Pokračování do podzemí** (120 min) — 800 m chodeb, sály, strojovna, kuchyně, ubikace, ošetřovna, velitelství


  **Co vás čeká v podzemí:**


  - **Teplota 8–12 °C** celoročně — vezměte si **teplé oblečení** i v létě!

  - **Vlhkost 80–90 %** — citlivé na astma; baterku doporučujeme

  - **Ploché dlážděné chodby** — bezpečné pro děti od 6 let

  - **Dva výtahy** do povrchových srubů (K-S 22a a K-S 23)

  - **Největší sál**: kasárenský, 60 × 10 m, možno si zde chvíli odpočinout


  **Dostupnost:**


  - Autem: 15 km jižně od Králík po silnici 312, parkování před areálem (50 Kč)

  - Autobusem: linka 660 z Králík do Dolní Moravy, pak 500 m pěšky

  - Vlakem do Králík, pak autobus nebo taxi (15 min)


  **Celodenní program Bouda:**


  - 9:00: Příjezd, parkování

  - 9:30: **Tvrz Bouda** (2 h, včetně K-S 21)

  - 11:30: Oběd v restauraci Bouda

  - 12:30: **K-S 22a „Krok"** (1 h, samostatná expozice pancéřových zvonů)

  - 13:30: **Pěchotní srub K-S 23** (30 min)

  - 14:00–18:00: Volný program nebo pokračování do **Vojensko-historického muzea Králíky** (15 km)


  **Doporučení:** Boudu rezervujte **alespoň týden dopředu** ve vrcholné sezóně. Výhled z okolí tvrze stojí za návštěvu i
  mimo otevírací dobu.'
