# === HISTORIE ===
history: >
  K-S 21 „Jilm" (v některé literatuře uváděn jako K-S 22) byl postaven v
  letech 1936–1937 firmou Záruba-Pfeffermann Brno jako vchodový objekt
  dělostřelecké tvrze Bouda. Konstrukčně jde o robustní železobetonovou
  stavbu s rampou pro nákladní vozidla zahloubenou do svahu, propojenou
  podzemním systémem se čtyřmi pěchotními sruby tvrze.


  Unikátnost objektu: obousměrná rampa s vnitřním obratem, dvě velká
  pancéřová vrata (vnější + vnitřní), ubikace strážní jednotky, plná
  filtroventilace. Připojen na 800 m dlouhý tunelový systém tvrze.


  V září 1938 plně obsazen, v říjnu předán Wehrmachtu. Za války sklad munice,
  po roce 1948 sklad munice ČSLA — dlouhodobé vojenské využití zachovalo
  objekt v nadprůměrném stavu. Od roku 1991 součást prohlídkového okruhu
  tvrze Bouda.

