wikidata_id: Q29509057
commons_category: R-S 54 Na potoku casemate
updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub „Na potoku" na severovýchodním svahu Orlických
  hor — součást rokytnické linie ŘOP.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti v lesnatém terénu u horského potoka
  — střílny, pozorovací zvony. Objekt je nezrekonstruovaný, autentický.


  **Doporučená délka:** 20 minut.


  **Dostupnost:** Autem z Rokytnice v Orlických horách (8 km) směr Bartošovice, odbočit
  na lesní cestu (800 m pěšky). Ideálně kolem po cyklostezkách Orlického podhůří.


  **Bezpečnost:** lesní terén, v okolí potoka vlhké cesty. V zimě sněhové návěje.


  **Doporučeno kombinovat s:** R-S 74 Hanička (muzeum, 15 km), sruby R-S 60, 66, 69
  (všechny v okolí), Rokytnicí v Orlických horách (historické centrum). Oblíbený cíl
  pro cyklisty po tzv. „Betonové hranici Orlických hor".'
