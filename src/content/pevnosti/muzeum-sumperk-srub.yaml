title: Řopík Šumperk (Vojenské muzeum)
code: LO vz. 37 A — Šumperk
type: lo-vz-37
line: Staré Město pod Sněžníkem
region: "Olomoucký kraj"
location:
  lat: 49.9669
  lon: 16.9706
  elevation: 319
  address: Šumperk, Vojenské muzeum (areál)
built: '1938'
state: muzeum
description: Plnohodnotná expozice řopíku vzoru 37 v areálu Vojenského muzea Šumperk. Součást větší expozice čs. opevnění
  a vojenské historie. Unikátní muzejní prezentace v zastřešeném prostoru.
history: 'Tento řopík nebyl původně postaven v Šumperku — jde o **autentický objekt přenesený z pohraničí** (původní lokalita
  Bělá pod Pradědem). V rámci záchrany opevnění byl v roce 2001 opatrně rozebrán, přepraven a znovu postaven v areálu Vojenského
  muzea Šumperk pod přístřeškem.


  Přenos umožnil **kvalitnější prezentaci** — objekt je chráněn před povětrností, lze ho studovat ze všech stran a interiér
  je díky osvětlení velmi dobře viditelný. Jde o **unikátní muzejní řešení** v ČR.


  Řopík typ A-160, II. stupeň odolnosti, původně vybudován v roce 1938 firmou Lanna. V září 1938 stavebně hotový, bez osazené
  výzbroje. Za okupace Němci nepoužívali.'
visit: 'Vojenské muzeum Šumperk nabízí **kombinaci zastřešeného řopíku s rozsáhlou expozicí** vojenské historie — nejlepší
  místo v Olomouckém kraji pro rodinné návštěvy vojenské tematiky.


  **Otevírací doba:** Celoročně, úterý–neděle 9:00–17:00 (zimní období do 16:00). Pondělí zavřeno kromě svátků. vojenske-muzeum-sumperk.cz.


  **Vstupné:** 130 Kč dospělí, 70 Kč děti/studenti, rodinná vstupenka 300 Kč. **Kompletní expozice** = řopík + muzeum + venkovní
  areál.


  **Délka prohlídky:** 2 hodiny pro celé muzeum, z toho 30 minut u řopíku.


  **Expozice řopíku:**


  - **Autentický objekt** LO vz. 37 A-160 pod zastřešenou krytinou

  - **Vnitřek plně zrekonstruován** s replikou TK vz. 37, periskopem, ruční ventilací

  - **Mříž umožňuje nahlédnutí** do všech místností

  - **Informační panely** s půdorysem, řezem a historií typu

  - **Audiovize** — dokumentární film o stavbě řopíků (15 min)


  **Ostatní expozice muzea:**


  - **Čs. armáda 1918–1938** (uniformy, zbraně, dokumenty)

  - **Sudetská krize 1938** (Mnichov, mobilizace, morální dopady)

  - **Odboj 1939–1945** (parašutisté, partyzáni, legie)

  - **ČSLA 1945–1989** (zbraně studené války, ČLST)

  - **Venkovní areál** — tanky, děla, obrněná vozidla (15 exponátů)


  **Dostupnost:**


  - Vlakem do Šumperka (hlavní nádraží), pak 15 min pěšky (nebo bus)

  - Autem: 60 km severně od Olomouce po silnici 35, parkování u muzea zdarma

  - Autobusem: linka 904 z Olomouce do Šumperka


  **Doporučené kombinace:**


  - **Vojenské muzeum Šumperk** (2 h) + **Hrad Bouzov** (40 km, 2,5 h) = celodenní okruh

  - **Vojenské muzeum** + **Jeseníky — Praděd** (35 km, pěší výstup 2 h) = kombinace historie a přírody

  - **Vojenské muzeum** + **Pradědova galerie U Halouzků** (30 km, 1 h) = kulturní program


  **Tip pro rodiny:** Muzeum pořádá **dětské víkendové programy** (duben–říjen) s rekonstrukcí výcviku vojáka, ukázkami přilby
  a pušky, interaktivní hrou „Dostaň se do řopíku". Vhodné pro děti od 6 let.'
