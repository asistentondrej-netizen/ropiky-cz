title: R-S 85 „Neratov"
code: R-S 85
type: pechotni-srub
line: Rokytnice v Orlických horách
region: Královéhradecký kraj
location:
  lat: 50.1832
  lon: 16.5432
  address: Bartošovice-Neratov
built: '1937'
state: pristupny
description: Pěchotní srub „Neratov" u zaniklé obce Neratov — jedinečný kontext zničeného kostela a vojenské fortifikace.
history: 'R-S 85 byl postaven v letech 1936–1937 jako krajní objekt rokytnické linie. Oboustranný srub II. odolnosti.


  Historie místa je tragická — sousední obec Neratov byla po roce 1945 vysídlena (jako většina německy mluvících obcí Orlických
  hor) a zanikla. Dnes jsou zde vidět ruiny kostela sv. Marie Matky Boží, obnovovaný poutní komplex a... pěchotní srub R-S
  85 jako svědek všech historických etap.

  '
visit: 'Jedinečný kontext — srub u ruin kostela vysídlené obce.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** pěchotní srub s pancéřovými zvony v bezprostřední blízkosti ruin kostela sv. Marie (sklenný strop kostela
  je v rekonstrukci — unikátní moderní památka). Dvojí silný historický zážitek — ŘOP 1938 a vysídlení 1945–1946.


  **Doporučená délka:** 30–45 minut (s prohlídkou kostela).


  **Dostupnost:** Autem z Bartošovic (6 km) po silnici do Neratova. Pěšky po turistických stezkách Orlických hor.


  **Doporučeno kombinovat s:** obnovovanou poutní bazilikou Neratov (jeden z nejzajímavějších sakrálních projektů v ČR), R-S
  60, 66, 69 (sruby v okolí), R-S 74 Hanička (muzeum, 15 km).

  '
