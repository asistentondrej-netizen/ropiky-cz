title: MJ-S 4 „Předsunutý zvon"
code: MJ-S 4
type: pechotni-srub
line: Jižní Morava (Slavonice)
region: Jihočeský kraj
location:
  lat: 48.9986
  lon: 15.3497
  address: Slavonice, u silnice na Stálkov
built: '1938'
state: pristupny
description: Jediný oboustranný pěchotní srub IV. stupně odolnosti na území bývalého
  Československa (stěny 3,5 m). Vzácná ukázka nejvyšší fortifikační kvality čs. opevnění.
  Obsahuje stopy německých zkušebních střeleb z doby okupace.
history: 'MJ-S 4 „Předsunutý zvon" byl v září 1938 nedokončený (asi 80 % hotovosti)
  objekt budovaný firmou Ing. Marek Brno. Součást plánované jihomoravské linie proti
  Rakousku — po anšlusu v březnu 1938 získal prioritu a měl být dokončen v rámci urgentního
  programu.


  Konstrukčně naprosto unikátní: jediný srub vzoru IV. stupně s plánovanými stěnami
  3,5 m a stropem 3,5 m, s dvěma dělostřeleckými kopulemi a čtyřmi pancéřovými zvony.
  Plánovaná posádka 52 mužů, výzbroj měla zahrnovat 4 těžké kulomety vz. 37, 2 protitankové
  kanóny vz. 36 a dva minomety vz. 38 ráže 9 cm.


  V září 1938 byl objekt pouze stavebně zapouzdřený bez osazených pancéřových prvků.
  Po okupaci Němci dokončili vnější plášť (hlavně střechu) a srub použili jako zkušební
  cíl pro nejtěžší ráže dělostřelectva. Stopy po zásazích 30,5 cm moždíře jsou na
  jižní stěně dodnes patrné — přes metrový krater, ale stěna neprolomena.


  Po válce srub bez využití ponechán osudu. V 90. letech dokumentován FortClub Praha,
  od roku 2005 volně přístupný jako technická památka.'
visit: 'Srub je **volně přístupný z venku** 24/7, vnitřek je zpravidla uzavřen (nebezpečí
  zranění z trhavin a prosakující vody). Prohlídku venkovní části lze absolvovat kdykoli
  po roce, ideální jarní a podzimní měsíce (léto nabízí zastínění okolních stromů).


  **Co zde uvidíte:**


  - Masivní betonový objekt rozměru 23 × 16 m, stěny tloušťky 3,5 m (nejvyšší v ČR)

  - **Stopy po zásazích 30,5cm moždíře** na jižní stěně — přes metrový krater, ale
  stěna neprolomena

  - Čtyři prázdné šachty pro pancéřové zvony

  - Dvě šachty pro dělostřelecké kopule

  - Vstup do podzemí zabezpečen mříží (vnitřek nepřístupný)


  **Dostupnost:** Slavonice leží 55 km jihozápadně od Jihlavy, přímo na rakouské hranici.
  K srubu od náměstí Slavonic 2 km pěšky po zelené turistické značce směrem na Stálkov.
  Parkování v centru Slavonic (zdarma).


  **Doporučená délka:** 20–30 minut u srubu + 2–3 hodiny na historické centrum Slavonic
  (UNESCO-worthy renesanční domy, sgrafitová výzdoba).


  **Kombinace:** Poblíž další rozestavěné sruby MJ-S 3 „Zahrada" (jiné muzeum v obci,
  5 min), MJ-S 5 „Dřevák" (ruina, 1 km). Plánovaný projekt slavonických spolků je
  rekonstrukce MJ-S 4 do muzejního stavu — sledujte novinky na slavonice.cz.


  **Co vzít s sebou:** Pevná obuv (terén kolem srubu je nerovný), baterka (pokud chcete
  nahlédnout dovnitř přes mříž), mapa okolních pevnostních objektů (k dispozici v
  IC Slavonice).'
sources:
