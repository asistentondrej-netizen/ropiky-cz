built: '1937'
state: pristupny
description: 'Linie lehkého opevnění kolem Dyje a rakouské hranice. Hustá síť řopíků v rovinatém až kopcovitém terénu jižní Moravy.'
history: |
  Znojemská linie byla zesílena po Anschlussu Rakouska v březnu 1938. V krátkém čase vzniklo několik stovek řopíků podél toku Dyje a dnešní státní hranice.

  Po Mnichovu a následné okupaci část objektů byla poškozena nebo odstřelena. Do dnešní doby se dochovala rozsáhlá síť, zčásti zpřístupněná v rámci turistických tras.
visit: |
  Oblast má hustou síť naučných stezek a cyklotras procházejících kolem řopíků. Některé objekty jsou udržované místními spolky.
