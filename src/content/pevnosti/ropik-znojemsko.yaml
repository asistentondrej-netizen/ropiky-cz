title: Řopíky na Znojemsku (linie Dyje)
code: ZN — jižní Morava
type: lo-vz-37
line: Jižní Morava — Znojemsko
region: Jihomoravský kraj
location:
  lat: 48.8555
  lon: 16.0488
  address: Okolí Znojma a Nového Šaldorfu
built: '1937'
state: pristupny
description: Linie lehkého opevnění kolem Dyje a rakouské hranice. Hustá síť řopíků v rovinatém až kopcovitém terénu jižní
  Moravy.
history: 'Znojemská linie byla zesílena po Anschlussu Rakouska v březnu 1938. V krátkém čase vzniklo několik stovek řopíků
  podél toku Dyje a dnešní státní hranice.


  Po Mnichovu a následné okupaci část objektů byla poškozena nebo odstřelena. Do dnešní doby se dochovala rozsáhlá síť, zčásti
  zpřístupněná v rámci turistických tras.

  '
visit: 'Řopíky na linii Dyje v okolí Znojma — jižní část moravské obrany ŘOP proti Rakousku. Některé objekty jsou v přímém
  sousedství národního parku Podyjí.


  **Přístup:** celoročně volně, 24/7. Objekty rozptýlené v krajině.


  **Co uvidíte:** cca 15 řopíků LO vz. 37 podél Dyje mezi Znojmem, Hnanicemi, Šatovem a Vranovem nad Dyjí. Některé přímo v
  NP Podyjí — kombinace přírodních hodnot s vojenskou architekturou.


  **Doporučená délka:** 3–5 hodin pro 4–6 řopíků s přírodními zastávkami.


  **Dostupnost:** Autem ze Znojma (5–25 km podle objektu). Cyklisté: Moravská vinařská stezka nebo Národní park Podyjí cyklotrasy.
  Vlakem do Znojma + kolo.


  **Doporučeno kombinovat s:** Znojmem (Rotunda sv. Kateřiny, hrad), NP Podyjí (Šobes, Bítov), vinnými sklepy (Hnanice, Šatov),
  hradem Vranov. Kombinace „opevnění + UNESCO (Lednicko-Valtický areál je blízko) + víno".'
sources:
- ropiky.net — Znojemsko
- Vojenský klub Znojmo
