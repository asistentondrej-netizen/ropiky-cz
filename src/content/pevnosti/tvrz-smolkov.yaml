# === NÁVŠTĚVA ===
visit: >
  Tvrz Smolkov nabízí **volně přístupné exteriéry** všech bojových srubů —
  lze je obejít po turistické stezce a prohlédnout si je zvenku. Podzemní
  prohlídky jsou pořádány pouze při **speciálních akcích** (Den otevřených
  bunkrů, historické rekonstrukce). Informace o akcích na obecních webech
  Háje ve Slezsku a místního Klubu vojenské historie.

