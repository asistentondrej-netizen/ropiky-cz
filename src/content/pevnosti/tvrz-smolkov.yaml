# === HISTORIE ===
history: >
  Tvrz Smolkov byla stavěna v letech 1936–1938 jako jediná plně dokončená
  dělostřelecká tvrz na Ostravsku. Tvoří ji čtyři bojové sruby
  (OP-S 20 „Úlehla", OP-S 21 „Padařov", OP-S 22 „Svoboda", OP-S 23 „Na trati")
  a vchodový srub OP-S 19 „Na kopečku", propojené přibližně 850 m podzemních
  chodeb.


  V září 1938 byla tvrz plně vyzbrojena a obsazena. Po Mnichovu odevzdána
  Wehrmachtu, který ji používal pro skladování a krátké experimenty.
  Po roce 1945 přešla pod ČSLA, která ji využívala pro muniční sklad.


  Po roce 1989 přešla postupně pod správu místních spolků a obce. Exteriéry
  srubů jsou dnes volně přístupné a představují jeden z nejzachovalejších
  komplexů čs. opevnění na Ostravsku.

