description: >
  Pátá z plně dokončených dělostřeleckých tvrzí, jediná na Ostravsku. Nachází se
  v úseku Opava u obce Smolkov. Skládá se ze čtyř bojových srubů, vchodového
  objektu a podzemí v délce přibližně 850 metrů. Některé exteriéry jsou volně
  přístupné, podzemní prohlídky pouze při speciálních akcích.

