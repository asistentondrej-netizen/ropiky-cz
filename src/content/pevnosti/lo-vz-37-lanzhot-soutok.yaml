description: Řopík typ A-180 (nejtěžší standardní typ) v přírodní rezervaci Soutok Dyje—Moravy u Lanžhota. Nejjižnější bod prohlížené linie — místo, kde se líní opevnění setkávalo se slovenskou hranicí.
history: |
  Betonován v roce 1938, typ A-180 je největší standardní typ (100 cm čelní stěna). Objekt stál na strategicky významném místě u soutoku řek a hraničního bodu s tehdejším Rakouskem. V září 1938 osazen plnou osádkou (4 muži), kulomety ZB vz. 26. Po Mnichovu opuštěn. Za války objekt ponechán v lužním lese. Po vyhlášení NPR Soutok (1994) chráněný společně s okolním lužním biotopem.
visit: |
  Atmosféricky nejkrásnější řopík trasy — uprostřed NPR Soutok.
  
  **Přístup:** volně, 24/7. Po lesní Hrázové cestě, pěšky nebo na kole.
  
  **Co uvidíte:** LO vz. 37 typ A-180 (nejtěžší typ), dvě střílny, zachovaná vchodová část. Kolem dubohabrové lužní porosty NPR.
  
  **Doporučená délka:** 30–45 minut (včetně procházky po rezervaci).
  
  **Dostupnost:** Autem z Lanžhota po Hrázové cestě (omezený vjezd — citlivá přírodní zóna), na kole ideální. Vlakem do Lanžhota + 5 km pěšky.
  
  **Doporučeno kombinovat s:** NPR Soutok (unikátní lužní les, chráněná fauna), městečkem Lanžhot, cyklotrasou podél Dyje.
