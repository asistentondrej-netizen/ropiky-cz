updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub B-S 4 „Lány" v Bratislavě-Petržalce. Součást
  obranné linie podél Dunaje proti očekávanému útoku z Rakouska/Maďarska.


  **Přístup:** celoročně 24/7, zdarma. Exteriér kdykoliv.


  **Co uvidíte:** pěchotní srub II. odolnosti v parkové úpravě městské části — střílny,
  pozorovací zvony, palebné průhledy. Objekt je dobře udržovaný, v bezprostředním
  okolí památníku 1938.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** MHD trolejbus č. 201 nebo 202, nebo autobus č. 91 (zastávka Rusovská
  cesta). Autem snadné parkování.


  **Doporučeno kombinovat s:** ostatními petržalskými sruby (B-S 1, 5, 6, 8), procházkou
  podél Dunaje, Bratislavským hradem. Celodenní program s fortifikační a historickou
  tématikou.'
