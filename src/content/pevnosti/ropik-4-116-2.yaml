description: "Lehký objekt vz. 36 — starší koncepce s čelní palbou. Součást linie lehkého opevnění jižní Moravy (Mikulovsko), budované v letech 1936—1937 pro ochranu rakouské hranice před Anschlussem. V září 1938 obsazen posádkou, po Mnichovu předán Německu a často použit jako cíl zkušební střelby."
