description: >
  Jednostranný pěchotní srub se zachovaným pancéřovým zvonem a rekonstrukcí
  kasematy. Třetí klíčový objekt Areálu čs. opevnění Hlučín-Darkovičky. Spolu
  s MO-S 5 „Na trati" a MO-S 19 „Alej" tvoří triumvirát nejkvalitněji
  rekonstruovaných srubů skanzenu.

