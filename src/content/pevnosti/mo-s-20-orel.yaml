title: MO-S 20 „Orel"
code: MO-S 20
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.8862
  lon: 18.3285
  address: Hlučín-Darkovičky, skanzen čs. opevnění
built: '1937'
state: muzeum
description: Jednostranný pěchotní srub se zachovaným pozorovacím zvonem a rekonstrukcí
  kazematy. Třetí klíčový objekt Areálu čs. opevnění Hlučín-Darkovičky. Vedle MO-S
  19 „Alej" a MO-S 5 „Na trati" tvoří triumvirát nejkvalitněji zachovalých srubů skanzenu.
history: 'Srub MO-S 20 byl betonován v letech 1936–1937 firmou Kruliš-Hess Ostrava.
  Konstrukčně jde o jednostranný pěchotní srub II. stupně odolnosti s bočním palebným
  polem směřujícím k sousednímu MO-S 19. Výzbroj plánovaná na 2 těžké kulomety vz.
  37 a 1 protitankový kanón vz. 36.


  Po okupaci pohraničí v říjnu 1938 sloužil srub Wehrmachtu ke zkušebním střelbám
  — Němci testovali odolnost stěn proti 15cm a 21cm dělostřelectvu. Srub zkouškám
  odolal bez prolomení vnitřních prostor, pouze povrchové poškození vnějších stěn.


  V 70. a 80. letech byl součástí skladu civilní obrany. Rekonstrukce pro muzejní
  účely proběhla v letech 1993–1998 Slezským zemským muzeem. Byla osazena replika
  pozorovacího zvonu, repliky kulometů v původních lafetách a kompletně zrekonstruován
  interiér včetně ubikací, strojovny a munice.'
visit: 'Součást Areálu čs. opevnění Hlučín-Darkovičky — největšího souvislého skanzenu
  těžkého opevnění v ČR. Prohlídka MO-S 20 je zahrnuta ve společné vstupence s MO-S
  5, MO-S 8, MO-S 9 a MO-S 19.


  **Otevírací doba:** duben–listopad, víkendy 10:00–17:00, v hlavní sezóně (červen–srpen)
  denně mimo pondělí. V zimním období uzavřeno. Aktuální otevírací doba a vstupné
  na szm.cz.


  **Vstupné:** cca 150 Kč dospělí, 80 Kč děti/studenti, rodinné vstupné 380 Kč (pro
  všechny sruby areálu).


  **Doporučená délka prohlídky:** 45 minut pro MO-S 20, celý areál 3–4 hodiny. Trasa
  zahrnuje vnitřek srubu (střelecké místnosti, ubikace, strojovna), přístup k pozorovacímu
  zvonu a venkovní expozici zbraní.


  **Dostupnost:** Autem po D1 z Ostravy (12 km), parkování u areálu zdarma. Vlakem
  do Hlučína, odtud 3 km pěšky nebo autobus linka 268. Cyklisté mohou využít stezku
  podél Odry (Ostrava–Bohumín).


  **Doporučeno kombinovat s:** návštěvou Ostravy (Dolní Vítkovice, Nová radnice),
  Hlučínským jezerem (léto) nebo zámku Kravaře (18 km). Pro hlubší fortifikační zážitek
  pokračovat do Opavy (srub OP-S 25 Památník, 25 km).'
