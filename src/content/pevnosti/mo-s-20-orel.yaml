# === NÁVŠTĚVA ===
visit: >
  Součást Areálu čs. opevnění Hlučín-Darkovičky — největšího souvislého
  skanzenu těžkého opevnění v ČR. Prohlídka MO-S 20 je zahrnuta ve společné
  vstupence s MO-S 5, MO-S 8 a MO-S 19. Celý areál 3–4 hodiny, samotné MO-S 20
  cca 45 minut. Otevřeno duben–listopad, aktuální informace na szm.cz.

