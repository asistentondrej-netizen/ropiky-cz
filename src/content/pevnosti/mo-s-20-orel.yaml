# === HISTORIE ===
history: >
  Srub MO-S 20 byl betonován v letech 1936–1937 firmou Kruliš-Hess Ostrava.
  Konstrukčně jde o jednostranný pěchotní srub II. stupně odolnosti s bočním
  palebným polem směřujícím k sousednímu MO-S 19.


  Po okupaci pohraničí v říjnu 1938 sloužil srub Wehrmachtu ke zkušebním
  střelbám — Němci testovali odolnost stěn proti 15cm a 21cm dělostřelectvu.
  Srub zkouškám odolal bez prolomení vnitřních prostor, pouze povrchové
  poškození vnějších stěn.


  V 70. a 80. letech byl součástí skladu civilní obrany. Rekonstrukce pro
  muzejní účely proběhla v letech 1993–1998 Slezským zemským muzeem. Byla
  osazena replika pozorovacího zvonu, repliky kulometů v původních lafetách
  a kompletně zrekonstruován interiér včetně ubikací, strojovny a munice.

