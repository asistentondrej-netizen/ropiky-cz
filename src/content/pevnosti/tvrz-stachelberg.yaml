description: 'Největší plánovaná dělostřelecká tvrz čs. opevnění — pokud by byla dokončena, stala by se jednou z největších pevnostních staveb v Evropě. Projekt zahrnoval 12 bojových objektů, 2 vchodové a přes 5 km podzemí. Do září 1938 byl dokončen jediný pěchotní srub a část podzemních chodeb. Dnes muzeum s přístupnou podzemní trasou.

  '
