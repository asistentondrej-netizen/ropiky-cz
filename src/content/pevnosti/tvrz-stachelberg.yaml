visit: 'Muzeum Tvrz Stachelberg provozuje občanské sdružení a je **otevřené sezónně** (duben–říjen). Prohlídka zahrnuje dokončený pěchotní srub T-S 73 „Na mušce", část podzemí a venkovní expozici. Trvá cca 90 minut, je možná i bez průvodce. Aktuální otevírací doba a ceník na stachelberg.cz.

  '
