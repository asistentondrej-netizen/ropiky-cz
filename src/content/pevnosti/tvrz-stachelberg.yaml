history: 'Stachelberg u Trutnova měl být vrcholem československého opevnění. V plánu bylo dvanáct bojových objektů (včetně tří dělostřeleckých srubů s kanóny ráže 100 mm), dva vchodové objekty a více než 5 kilometrů podzemních chodeb v hloubce 40 metrů pod povrchem. Plánovaná odolnost IV+ a posádka 778 mužů z něj činily největší projektovanou tvrz celého systému.


  Stavba byla zahájena na jaře 1937 a probíhala ve vysokém tempu. Do září 1938 byl stavebně dokončen pouze pěchotní srub T-S 73 „Na mušce" a podzemí v délce několika set metrů (cca 15 % plánovaného rozsahu). Po Mnichovské dohodě byla výstavba zastavena a nedokončené konstrukce přešly k Wehrmachtu.


  Po válce sloužila lokalita různým vojenským účelům. Od 90. let 20. století probíhá postupné zpřístupňování — od roku 1995 zde funguje muzeum, které provozuje občanské sdružení Stachelberg. Prohlídka zahrnuje dokončený srub T-S 73 a dostupné úseky podzemí.

  '
