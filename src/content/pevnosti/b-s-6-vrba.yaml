title: B-S 6 „Vrba"
code: B-S 6
type: pechotni-srub
line: Bratislava-Petržalka
region: Slovensko
location:
  lat: 48.1297
  lon: 17.1189
  address: Bratislava-Petržalka, Einsteinova ul.
built: '1938'
state: muzeum
description: Oboustranný pěchotní srub I. stupně odolnosti u východního okraje Petržalky.
  Srub, jehož posádka v září 1938 odmítla uvěřit rozkazu k ústupu — musel přijet plukovník,
  aby je přesvědčil. Dnes součást expozice Petržalských bunkrů.
history: 'B-S 6 „Vrba" vznikl v létě 1938 v rámci urgentního dostavby bratislavské
  čáry po anšlusu Rakouska. Jednostranný srub I. stupně, výzbroj plánovaná 2 TK vz.
  37 + 1 PTK vz. 36.


  **Legendární incident 29. září 1938:** Poté, co generální štáb nařídil ústup čs.
  armády z linie, posádka B-S 6 pod velením npor. Jozefa Husovského **odmítla uvěřit**,
  že rozkaz je pravdivý — považovala ho za sabotáž a podvržený příkaz. Teprve po osobní
  intervenci **plk. Ludvíka Svobody** (pozdější prezident ČSR) posádka objekt večer
  30. září 1938 opustila.


  Svoboda později v pamětech napsal: „Tito muži byli připraveni umřít za republiku
  — a nemohli uvěřit, že jim velení nařídí, aby odešli bez boje. Byl to těžký rozhovor,
  ten nejtěžší v mém životě." Incident se stal symbolem morálky čs. vojáků roku 1938.


  Po okupaci Němci demontovali výzbroj, srub stáhli ze služby. Za války sklad Luftwaffe.
  Po roce 1945 stal sklad pohraniční stráže ČSLA. Od 2010 v péči spolku Zachráňme
  petržalské bunkre.'
visit: 'B-S 6 „Vrba" je druhým nejnavštěvovanějším objektem expozice Petržalské bunkre
  (po B-S 5). Přitažlivý především pro **silný lidský příběh** posádky z 29. září
  1938.


  **Otevírací doba:** Víkendy duben–říjen, 13:00–17:00. Prohlídka s průvodcem každou
  celou hodinu. Aktuální program na zacranmepetrzalskebunkre.sk.


  **Vstupné:** 5 EUR dospělí, 3 EUR děti. Společná vstupenka s B-S 5 a B-S 4: 10 EUR.


  **Délka prohlídky:** 40 minut, s důrazem na **příběh posádky** (vyprávění průvodce)
  a dobové fotografie z archivu.


  **Dostupnost:**


  - MHD: tramvaj 1 nebo 3 do zastávky Starohájska, pak 8 min pěšky

  - Autem: parkování na Einsteinova ul. (modré zóny, placené)

  - Pěšky: 15 min od B-S 5 „Žabí most" přes Chorvátske rameno


  **Specifika prohlídky:**


  - Vnitřek zrekonstruován do stavu září 1938 (poslední hodiny před ústupem)

  - Dobová výstroj posádky (uniformy čs. pěchoty, přilby, pušky vz. 24)

  - **Rekonstrukce situační zprávy** popsané Ludvíkem Svobodou v pamětech

  - Video s vyprávěním vnučky npor. Husovského (10 min)


  **Doporučeno kombinovat:** B-S 5 + B-S 6 + krátká procházka po Chorvátskem rameni
  (1 km) = **2 hodiny** intenzivního fortifikačního programu.


  **Speciální akce:** Každoročně 29.–30. září se zde koná **pietní akce** za posádku
  a památku všech obránců čs. opevnění z roku 1938. Účast zástupců armády, věnce,
  vojenská hudba.'
