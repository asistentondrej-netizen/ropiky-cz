# === NÁVŠTĚVA ===
visit: >
  Součást expozice Petržalské bunkre. Prohlídka s průvodcem s důrazem na
  příběh posádky a dobové fotografie. Každoročně 29.–30. září pietní akce
  za posádku. Otevřeno víkendy duben–říjen 13:00–17:00. Aktuální program na
  zacranmepetrzalskebunkre.sk.

