  elevation: 135

built: '1938'
state: muzeum

description: >
  Pěchotní srub u východního okraje Petržalky se silným lidským příběhem —
  posádka v září 1938 odmítla uvěřit rozkazu k ústupu a musel přijet plk.
  Ludvík Svoboda (pozdější prezident ČSR), aby ji přesvědčil. Rekonstruovaný
  objekt je druhou nejnavštěvovanější zastávkou trasy Petržalské bunkre.

