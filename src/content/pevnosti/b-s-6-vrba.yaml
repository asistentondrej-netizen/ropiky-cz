# === HISTORIE ===
history: >
  B-S 6 „Vrba" vznikl v létě 1938 v rámci urgentní dostavby bratislavské čáry
  po anšlusu Rakouska. Jednostranný srub I. stupně s plánovanou výzbrojí
  2 TK vz. 37, 1 PTK vz. 36 a 1 LK v zvonu.


  Legendární incident 29. září 1938: poté, co generální štáb nařídil ústup
  čs. armády z linie, posádka B-S 6 pod velením npor. Jozefa Husovského
  odmítla uvěřit, že rozkaz je pravdivý — považovala ho za sabotáž. Teprve
  po osobní intervenci plk. Ludvíka Svobody (pozdější prezident ČSR) posádka
  objekt večer 30. září 1938 opustila.


  Svoboda později v pamětech napsal: „Tito muži byli připraveni umřít za
  republiku — a nemohli uvěřit, že jim velení nařídí, aby odešli bez boje.
  Byl to těžký rozhovor, ten nejtěžší v mém životě." Incident se stal
  symbolem morálky čs. vojáků roku 1938.


  Po okupaci Wehrmacht demontoval výzbroj. Za války sklad Luftwaffe. Po roce
  1945 sklad pohraniční stráže ČSLA. Od 2010 v péči spolku Zachráňme
  petržalské bunkre — rekonstrukce do stavu září 1938.

