visit: 'Volně přístupný pěchotní srub „U trati" nedaleko Staroměstska — součást staroměstské obranné linie v severní části Moravskoslezských Beskyd.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti v blízkosti železniční tratě (odtud název) — střílny, pozorovací zvony. Objekt je nezrekonstruovaný.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** Autem po silnici do Hanušovic/Starého Města, pěší přístup 200 m od zastávky. Vlakem lokální trať — ideálně objekt navštívit kombinovaně s vlakovou turistikou.


  **Doporučeno kombinovat s:** StM-S 33, Kralickým Sněžníkem, branickou přehradou, jeseníckým termálním parkem Velké Losiny. Ideální rodinný výlet vlakem.'
