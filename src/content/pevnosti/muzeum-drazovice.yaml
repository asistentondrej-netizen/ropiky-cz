title: Řopík Drážovice (Bouzov)
code: LO vz. 37 A-160 — Drážovice
type: lo-vz-37
line: Vnitřní obrana (Olomoucký úsek)
region: Olomoucký kraj
location:
  lat: 49.7025
  lon: 16.9083
  elevation: 439
  address: Drážovice u Bouzova, hřeben
built: '1938'
state: muzeum
description: Kompletně rekonstruovaný řopík v okolí hradu Bouzov, vybavený replikou
  výzbroje a dobovou výstrojí. Oblíbené zastavení pro rodinné výlety spojované s návštěvou
  hradu.
history: 'Řopík Drážovice byl postaven v červnu–srpnu 1938 firmou Konstruktiva jako
  součást **vnitřní obranné čáry Olomouc–Prostějov**, která měla zpomalit postup nepřítele
  přicházejícího z jihu (Maďarsko) nebo ze severu (Opavsko). Typ A-160, standardní
  vzor 37.


  V září 1938 stavebně dokončen, ale bez osazených zbraní. Po Mnichovu evakuován,
  Němci objekt ignorovali (vnitřní linie ztratila význam). Za války nepoužíván.


  Po roce 1945 objekt opuštěn, v 60. letech se začalo uvažovat o jeho demolici kvůli
  zemědělské rekultivaci. Záchranná akce **Klubu vojenské historie Olomouc** v letech
  1990–1994 — řopík byl vyčištěn, vystavěn znovu do původního stavu a vybaven replikami
  výzbroje.


  Od 1995 je objekt otevřen jako **samostatná expozice** spolku KVH Olomouc. Každoročně
  v září se zde koná rekonstrukce bojové pohotovosti s historickými zbraněmi.'
visit: "Řopík Drážovice je **ideální rodinná zastávka** při návštěvě hradu Bouzov\
  \ — jednoho z nejkrásnějších hradů Moravy. Kombinace středověké romantiky a moderní\
  \ vojenské historie.\n\n**Otevírací doba:** Víkendy květen–září, 11:00–17:00. Mimo\
  \ sezónu na objednání (min. 5 osob). Kontakt: kvh-olomouc.cz.\n\n**Vstupné:** 50\
  \ Kč dospělí, 25 Kč děti. **Rodinná vstupenka 100 Kč**. Děti do 6 let zdarma.\n\n\
  **Délka prohlídky:** 30 minut s průvodcem.\n\n**Jak se tam dostat:**\n\n- Autem:\
  \ 35 km severozápadně od Olomouce po silnici 46 a 447, parkoviště u hradu Bouzov\
  \ (20 Kč), odtud 1 km pěšky po žluté značce\n- Autobusem: linka 890 z Olomouce do\
  \ Bouzova (5× denně), pak 15 min pěšky\n\n**Co zde uvidíte:**\n\n- **Kompletně rekonstruovaný\
  \ řopík** typu A-160 s replikou TK vz. 37 v lafetě M\n- **Originální dřevěná lůžka**\
  \ a dobové vybavení (periskop, ruční ventilátor, telefon)\n- **Dobová výstroj**\
  \ čs. pěchoty 1938 (uniformy, přilby, pušky vz. 24)\n- **Informační panely** s historií\
  \ olomouckého úseku\n- **Krátký film** (10 min) o životě posádky 1938 v rámci výkladu\n\
  \n**Doporučený celodenní okruh Bouzovska:**\n\n1. 9:00: Příjezd do Bouzova, parkování\n\
  2. 9:30–12:00: **Hrad Bouzov** (velká prohlídka 2,5 h — nádvoří, věže, kaple, knihovna)\n\
  3. 12:00–13:30: Oběd v restauraci U Krále (tradiční česká kuchyně, 200 m od hradu)\n\
  4. 14:00–15:00: **Řopík Drážovice** (prohlídka 30 min + okolní procházka 30 min)\n\
  5. 15:30–17:00: **Jeskyně Javoříčko** (10 km, přírodní kras)\n6. 18:00: Návrat do\
  \ Olomouce\n\n**Speciální akce:** \n\n- **Posledních víkend v srpnu** — rekonstrukce\
  \ bojové pohotovosti 1938 s historickými zbraněmi (ukázky střeleb, dobová kuchyně,\
  \ vojenská hudba)\n- **Květen** — Den otevřených dveří se sníženým vstupným\n- **Podzim**\
  \ — **Noční prohlídka s baterkami** (v říjnu, atraktivní zejména pro děti)\n\n**Doporučení:**\
  \ Spojení hradu Bouzov a řopíku Drážovice je **perfektní rodinný výlet**. Děti milují\
  \ kontrast středověkých zbraní a moderních kulometů."
