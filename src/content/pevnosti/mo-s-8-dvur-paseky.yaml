title: MO-S 8 „Dvůr Paseky"
code: MO-S 8
type: pechotni-srub
line: Moravská Ostrava
region: "Moravskoslezský kraj"
location:
  lat: 49.8861
  lon: 18.3305
  elevation: 204
  address: Hlučín-Darkovičky, skanzen čs. opevnění
built: 1935 (první betonáž 15.–22. 12. 1935)
state: zachovaly
description: Historicky první pěchotní srub celého čs. opevnění — prvenství v betonáži
  v prosinci 1935. Dnes součást skanzenu Darkovičky.
history: 'Pěchotní srub MO-S 8 „Dvůr Paseky" u Bohumína je **historicky prvním realizovaným
  objektem** celého systému československého opevnění. Betonáž probíhala ve dnech
  15.–22. prosince 1935 jako pilotní projekt ŘOP.


  Sloužil jako referenční objekt, na němž byly odzkoušeny stavební postupy, které
  pak řídily výstavbu celé linie.


  Po Mnichovu byl předán Wehrmachtu. Dnes je součástí pevnostního skanzenu Hlučín-Darkovičky,
  kde ho lze navštívit společně s MO-S 5, MO-S 19 a MO-S 20.

  '
visit: 'V rámci skanzenu Darkovičky, Slezské zemské muzeum. Aktuální otevírací doba
  na szm.cz.

  '
sources:
