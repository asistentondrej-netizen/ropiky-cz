title: Tvrz Hanička
code: R-S Tvrz Hanička
type: delostrelecka-tvrz
line: Rokytnice v Orlických horách
region: Královéhradecký kraj
location:
  lat: 50.1967
  lon: 16.4925
  address: Rokytnice v Orlických horách, 517 61
  elevation: 790

built: '1938'
state: muzeum

description: >
  Plně dokončená dělostřelecká tvrz v Orlických horách, jedna z pěti plně
  dostavěných tvrzí čs. opevnění. Šest bojových objektů propojených přibližně
  1 800 metry podzemních chodeb. V období studené války přestavěna na tajný
  protijaderný kryt ÚV KSČ (akce „Kahan"), což z ní činí unikátní dvojvrstvou
  památku — ŘOP 1938 + komunistický bunkr 70. let.

