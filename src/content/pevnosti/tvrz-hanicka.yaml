# === NÁVŠTĚVA ===
visit: >
  Muzeum Tvrz Hanička je otevřeno sezónně od dubna do listopadu s prohlídkami
  pouze s průvodcem. Nabízí dva různé okruhy: klasický pevnostní (původní stav
  1938) a „Kahan" (komunistický kryt 70. let). Komplexní návštěva trvá
  cca 2 hodiny. Aktuální otevírací doba a rezervace na hanicka.cz.

navsteva:
  pristupnost: auto-kratka-chuze
  vhodnostRodiny: starsi-deti
  doporucenaDoba_minut: 120
  otevreno:
    sezonne: true
    obdobi: duben–listopad
    poznamka: Prohlídka pouze s průvodcem. Aktuální hodiny viz hanicka.cz.
  teplotaUvnitr_C: 9
  upozorneni:
    - Celoroční teplota v podzemí cca 9 °C — teplé oblečení nutné.
    - Prohlídka zahrnuje schodiště a delší chůzi v podzemí.
    - Možnost dvou různých okruhů — pevnostního i „Kahan".

