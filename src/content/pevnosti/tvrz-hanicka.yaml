# === HISTORIE ===
history: >
  Tvrz Hanička byla stavěna v letech 1936–1938 jako součást úseku obrany
  Rokytnice v Orlických horách. Komplex tvoří šest bojových objektů
  (R-S 74 až R-S 79) a vchodový srub R-S 79a, propojené podzemím v celkové
  délce přibližně 1 800 metrů.


  V září 1938 byla tvrz plně obsazena posádkou a připravena k boji. Po podepsání
  Mnichovské dohody 30. září 1938 byla odevzdána Wehrmachtu, který ji
  v letech 1939–1945 využíval především pro destruktivní pokusy s protipancéřovou
  municí. Řada objektů utrpěla rozsáhlé poškození, které je dodnes patrné.


  V 70. a 80. letech byla Hanička tajně reaktivována v rámci projektu „Kahan"
  jako protijaderný kryt Ústředního výboru KSČ pro případ třetí světové války.
  Vnitřní prostory byly kompletně přestavěny a vybaveny klimatizací, filtrovnou,
  vlastní elektrocentrálou a spací kapacitou pro stovky osob. Tento utajovaný
  statut trval až do roku 1993.


  Od poloviny 90. let je tvrz zpřístupněna veřejnosti. Prohlídka kombinuje
  obě historické vrstvy — původní opevnění z roku 1938 i pozdější komunistický
  kryt, což z Haničky činí jedinečnou expozici v evropském kontextu.

