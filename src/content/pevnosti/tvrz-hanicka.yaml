description: Plně dokončená tvrz v Orlických horách, přístupná veřejnosti. Během studené války upravena jako tajný kryt — zajímavá vrstva pozdější historie.
history: 'Tvrz Hanička byla stavěna v letech 1936–1938 a patřila k pěti plně dokončeným tvrzím čs. opevnění. Skládá se ze šesti bojových objektů a jednoho vchodového, propojených podzemím v délce přibližně
  1 800 metrů.


  V září 1938 byla plně obsazena a připravena k boji. Po Mnichovu opuštěna a předána Wehrmachtu, který ji v letech 1939–1945 využíval pro destruktivní pokusy.


  V 70. a 80. letech byla tvrz reaktivována jako tajný protijaderný kryt Ústředního výboru KSČ (projekt „Kahan"). Tato novodobá vrstva dnes tvoří samostatný zajímavý okruh prohlídky.

  '
visit: 'Muzeum je otevřeno od dubna do listopadu, prohlídky s průvodcem. Aktuální otevírací doba a rezervace na hanicka.cz.

  '
