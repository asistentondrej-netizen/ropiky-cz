title: N-S 80 „Jirásek"
code: N-S 80
type: pechotni-srub
line: Náchod
region: Královéhradecký kraj
location:
  lat: 50.41141389
  lon: 16.19973889
built: '1937'
state: pristupny
description: Pěchotní srub „Jirásek" (podle spisovatele A. Jiráska, rodáka z Hronova)
  — odolnost III, blízko muzea N-S 82 Březinka. Volně přístupný v rámci naučné stezky.
sources:
- Wikimedia Commons
- ropiky.net
updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub „Jirásek" na hřebenu Orlických hor — součást
  náchodské linie s názvy po českých spisovatelích a historických osobnostech.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti na hřebenu s panoramatickým výhledem
  — střílny, pozorovací zvony, stopy překážek. Objekt je nezrekonstruovaný.


  **Doporučená délka:** 20 minut + procházka po hřebenu (hodiny).


  **Dostupnost:** Autem z Náchoda (10 km) na Police nad Metují, odbočit na lesní cestu
  (1 km pěšky). Pěší turistické značení z Hronova nebo Polic — napojení na hřebenové
  stezky.


  **Bezpečnost:** hřebenová poloha, v zimě mrazivé větry a náledí. Dobrá turistická
  výstroj.


  **Doporučeno kombinovat s:** tvrzí Dobrošov, T-S 19 Turov, Broumovskými stěnami,
  Adršpachem. Celodenní hřebenová túra s fortifikační tématikou — jedna z nejhezčích
  v ČR.'
