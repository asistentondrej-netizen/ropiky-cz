visit: 'Součást tvrze Hůrka — druhé nejvýznamnější rekonstrukce dělostřelecké tvrze
  v ČR (po Bouda). K-S 52 je jedním z pěti bojových objektů tvrze. Provozuje Vojensko-historický
  klub Pevnost Králíky.


  **Otevírací doba:** duben–říjen, víkendy 10:00–17:00. V hlavní sezóně (červenec–srpen)
  i ve všední dny 10:00–17:00. Prohlídky s průvodcem každou celou hodinu.


  **Vstupné:** cca 180 Kč dospělí, 120 Kč děti/studenti. Kombinovaná vstupenka s dalšími
  objekty tvrze. Aktuální info na pevnostkraliky.cz.


  **Co uvidíte:** kazematy srubu, padací most, pancéřové dveře, ubytovny posádky,
  napojení na podzemí tvrze, skladiště munice. V okolí stopy po osádkových chodbách.
  Exteriér krásně zasazený do skalnatého terénu Suchého vrchu.


  **Doporučená délka:** 60 minut pro samotný K-S 52, celá tvrz Hůrka 2–3 hodiny (s
  dělostřeleckým srubem, vchodovým objektem a prohlídkou podzemí).


  **Dostupnost:** Autem z Králík (10 km) po silnici na Červenou Vodu, parkoviště u
  tvrze. Vlakem do Králík + autobus nebo pěšky po naučné stezce „Betonová hranice"
  (8 km).


  **Doporučeno kombinovat s:** tvrz Bouda (40 km přes Mladkov, spektakulární podzemí),
  Vojenské muzeum Králíky, pěchotní srub K-S 14 U cihelny nebo Memoriál čs. opevnění
  v Králíkách. Ideální víkendová fortifikační túra.'
