history: 'Dělostřelecká tvrz Dobrošov je obranná pevnost postavená v rámci československého opevnění budovaného v třicátých letech, mimo jiné v důsledku zvolení Adolfa Hitlera kancléřem v Německu. Patřila mezi páteřní opevnění na severní hranici Československa a měla být jednou ze čtrnácti tvrzí na západ od Ostravy jako součást pevnostní linie budované od roku 1935. Byla situována u stejnojmenné vsi Dobrošov, která leží mezi Náchodem a Českou Čermnou, západně od kóty 622 Dobrošov. Od roku 1968 je v… (Zdroj: Wikipedie, CC BY-SA)'
