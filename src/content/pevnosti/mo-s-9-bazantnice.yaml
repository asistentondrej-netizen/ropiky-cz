title: MO-S 9 „Bažantnice"
code: MO-S 9
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.9142
  lon: 18.3244
  address: Šilheřovice, polní cesta severně od obce
built: '1937'
state: pristupny
description: Oboustranný pěchotní srub odolnosti II typ B v prostoru Šilheřovic — volně přístupný exteriér v terénu. Nepatří do muzejního Areálu Darkovičky (ten leží cca 3 km jižně), stojí samostatně v polích severně od Šilheřovic. Klidný objekt pro individuální návštěvu.
history: 'Pěchotní srub MO-S 9 „Bažantnice" byl postaven v letech 1936–1937 firmou Kruliš-Hess Ostrava jako součást moravskoostravské linie chránící průmyslovou aglomeraci před útokem od severu (od Polska a Německa). Pojmenování pochází od nedaleké bažantnice na panství Rothschildů. Projekt IV. expozitury ŘOP Ostrava.


  Konstrukčně jde o oboustranný pěchotní srub typu B, odolnost II (stěny 225 cm, stropy 250 cm železobetonu) s dvěma palebnými křídly. Plánovaná výzbroj: v levém a pravém křídle kombinace těžkých kulometů vz. 37 a protitankových kanónů vz. 36. Pancéřové zvony pro pozorování nebyly v září 1938 osazeny.


  Po Mnichovu byl srub bez boje předán Wehrmachtu. Během okupace Němci demontovali veškerou výzbroj, zbylo holé betonové torzo. Po válce objekt nebyl opět obsazen, v 60. letech formálně vyřazen z vojenské evidence.


  Dnes je MO-S 9 „Bažantnice" exteriérově volně přístupný objekt v otevřeném terénu — populární zastavení pro fotografy a znalce ŘOP. Není součástí muzejní expozice Areálu Darkovičky (ta obsahuje objekty MO-S 19 „Alej", MO-S 20 „Orel" a MO-S 21 „Šibenice").

  '
visit: 'Volně přístupný pěchotní srub v polích severně od Šilheřovic — ideální pro krátkou fortifikační procházku bez muzejního vstupného. Exteriérová prohlídka, interiér uzavřen (zamřížován proti neoprávněnému vstupu).


  **Přístup:** celoročně volně, 24/7, bez poplatku.


  **Co uvidíte:** nerekonstruovaný pěchotní srub II. odolnosti — palebné otvory, otvory po demontovaných pancéřových zvonech, stopy po německých střeleckých testech. Okolí zarostlé, ale vede k němu polní cesta.


  **Doporučená délka:** 15–20 minut (pouze exteriér).


  **Dostupnost:** Autem ze Šilheřovic po polní cestě k bažantnici (500 m, terén). Vlakem do Bohumína + autobus na Šilheřovice. Pěšky z Darkoviček cca 3 km severně.


  **Bezpečnost:** objekt v klidné oblasti, při vyšším vegetačním pokryvu opatrně na skryté zbytky konstrukcí.


  **Doporučeno kombinovat s:** **Areálem Darkovičky** (3 km jižně, hlavní muzejní expozice s MO-S 19/20/21), zámkem Šilheřovice, přírodní rezervací Hranečník (meandry Odry).

  '
sources:
