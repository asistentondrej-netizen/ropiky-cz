description: 'Pěchotní srub v úseku Opava, zachovalý v terénu. Volně přístupný, s dochovanou vnější strukturou.'
history: |
  Srub OP-S 18 byl součástí linie chránící Opavsko. Po Mnichovu opuštěn, během okupace využíván Wehrmachtem.

  Dnes stojí volně v terénu, je součástí místní turistické trasy.
