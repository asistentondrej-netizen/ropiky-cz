built: '1937'
state: pristupny
description: Pěchotní srub „Obora" u Milostovic — v opavské linii těžkého opevnění. Oboustranný typ B odolnosti II, zachovalá
  vnější konstrukce. Volně přístupný exteriér, interiér uzavřen. Součást naučné stezky opavského opevnění.
history: 'Srub OP-S 18 byl součástí linie chránící Opavsko. Po Mnichovu opuštěn, během okupace využíván Wehrmachtem.


  Dnes stojí volně v terénu, je součástí místní turistické trasy.

  '
visit: 'Volně přístupný pěchotní srub „U obory" — jeden z objektů opavské linie ŘOP v oblasti Hlučínska. Exteriérová prohlídka,
  interiér nerekonstruován.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** nerekonstruovaný srub II. stupně odolnosti — palebné otvory, pozorovací zvon, stopy po poválečném využití.
  V okolí rozvaliny překážkového systému. Objekt dobře dokumentuje stav typického „běžného" srubu ŘOP, nezasaženého restaurováním.


  **Doporučená délka:** 20–30 minut (pouze exteriér).


  **Dostupnost:** Autem z Opavy (10 km) po silnici na Hlučín, odbočit na Kravaře, lesní cesta 500 m. Vlakem do Kravař + 3
  km pěšky.


  **Bezpečnost:** srub není zrekonstruovaný, vstup dovnitř na vlastní nebezpečí — nejsou zajištěny šachty ani žebříky, hrozí
  pády. Doporučeno prohlížet pouze zvenčí.


  **Doporučeno kombinovat s:** Areálem Hlučín-Darkovičky (12 km, muzeum), OP-S 25 Milostovice Památník (5 km), zámkem Kravaře
  (2 km) nebo Opavským muzeem.'
