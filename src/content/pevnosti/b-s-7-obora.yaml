built: '1937'
state: pristupny
description: Volně přístupný pěchotní srub „Obora" v zalesněné části Petržalky. Součást
  obranné linie Dunaje proti maďarské a rakouské armádě.
history: 'B-S 7 byl betonován na podzim 1937 jako jeden z 18 pěchotních srubů bratislavské
  linie. Oboustranný srub II. odolnosti s plánovanou výzbrojí 2× TK vz. 37 a 1× protitankový
  kanón vz. 36.


  Po okupaci Wehrmachtem v roce 1939 objekt nebyl zkušebně střílen (na rozdíl od srubů
  v Sudetech). Sloužil jako skladiště. Po roce 1945 byl ponechán ve vlastnictví čs.
  armády, nyní patří městské části Bratislava-Petržalka.

  '
visit: 'Volně přístupný pěchotní srub v lesnatém prostředí Petržalky — součást „bratislavské
  stezky opevnění".


  **Přístup:** celoročně volně, 24/7, zdarma. Exteriér kdykoliv, interiér většinou
  zavřený (nárazové otevření KVH).


  **Co uvidíte:** pěchotní srub II. odolnosti s pancéřovými zvony (dochované), střílny,
  vchod s obranou, stopy po překážkovém systému. Objekt je nezrekonstruovaný, autentický.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** MHD trolejbus č. 201 nebo 202 (zastávka Pečnianská). Autem snadné
  parkování na sídlišti. Pěšky nebo kolo z centra Bratislavy (5–6 km podél Dunaje).


  **Doporučeno kombinovat s:** B-S 8 Hřbitov (muzeum, 1 km), B-S 5 Žabí most, B-S
  6 Vrba (500 m). Ideální součást „petržalské fortifikační stezky" — 6–8 srubů za
  2–3 hodiny.

  '
sources:
- 'Martin Slezák: Bratislavské opevnení 1938'
