title: K-S 31 „U besídky"
code: K-S 31
type: pechotni-srub
line: Králíky
region: Pardubický kraj
location:
  lat: 50.096259
  lon: 16.644977
built: '1937'
state: pristupny
description: Pěchotní srub u Lichkova — oboustranný objekt odolnosti III kontroloval
  přechod přes železnici a silnici. Interiér konzervován, exteriér volně přístupný,
  součást naučné stezky.
sources:
- Wikimedia Commons
- ropiky.net
updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub „U besídky" v lesích Pevnostní oblasti Králíky.
  Jeden z kilometrů dlouhé linie srubů kolem tvrze Adam.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti v hlubokém lese — střílny, pozorovací
  zvony, charakteristické zakřivené stěny. Objekt je nezrekonstruovaný, autentický
  stav po likvidaci Wehrmachtem.


  **Doporučená délka:** 20 minut (pouze exteriér).


  **Dostupnost:** Autem z Mladkova nebo Králík, odbočit na lesní cestu u tvrze Adam
  (700 m pěšky). Ideální pro cyklisty — napojeno na cyklostezku Králicko.


  **Bezpečnost:** lesní prostředí, opatrnost s otvory a šachtami. Nerekonstruováno,
  vstup dovnitř na vlastní nebezpečí.


  **Doporučeno kombinovat s:** tvrz Adam (K-S 30), tvrz Bouda (K-S 22), tvrz Hůrka
  (K-S 52). Celá oblast Králicka nabízí jednu z nejhustších linií ŘOP v ČR — ideální
  pro vícedenní pobyt.'
