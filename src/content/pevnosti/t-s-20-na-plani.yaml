description: Pěchotní srub „Na pláni" nad Hronovem — odolnost III. Součást naučné
  stezky Pevnost Hronov, exteriér volně přístupný, interiér uzavřen.
sources:
- Wikimedia Commons
wikidata_id: Q62657243
commons_category: T-S 20 Na pláni casemate
updated: '2026-04-18'
visit: 'Volně přístupný pěchotní srub „Na pláni" v Broumovském výběžku — součást nedokončené
  teplické linie ŘOP. Atypická poloha uprostřed polních „pláních" Broumovska.


  **Přístup:** celoročně volně, 24/7.


  **Co uvidíte:** pěchotní srub II. odolnosti v otevřené krajině — palebné otvory,
  pozorovací zvony, v dohledu Broumovské stěny a Ostaš. Objekt je nezrekonstruovaný,
  autentický.


  **Doporučená délka:** 20 minut + procházka (hodiny).


  **Dostupnost:** Autem z Broumova nebo Teplic nad Metují (5 km podle objektu) + polní
  cesta. Pěšky po turistickém značení Broumovska.


  **Doporučeno kombinovat s:** T-S 19 Turov (muzeum, 8 km), T-S 73 Polom (10 km, volně
  přístupný), Broumovským klášterem, Adršpašskými skálami, Ostašem. Celodenní výlet
  po Broumovsku s fortifikacemi.'
