description: "Lehký objekt vz. 37 („řopík“), typ A-140 Z — oboustranný kulometný (čelní úhel 140°, zesílený (II. stupeň odolnosti)). Součást linie lehkého opevnění jižní Moravy (Mikulovsko), budované po Anschlussu Rakouska v roce 1938."
