title: MO-S 23 „Darkovice"
code: MO-S 23
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.8987
  lon: 18.3412
  address: Darkovice, obec
built: '1937'
state: pristupny
description: Pěchotní srub „Darkovice" v obci Darkovice — v okolí obdobného jména
  jako areál Hlučín-Darkovičky, ale mimo skanzen. Volně přístupný.
history: 'MO-S 23 byl dokončen v létě 1937 jako součást moravskoostravské linie. Oboustranný
  pěchotní srub II. odolnosti.


  Po Mnichovu sloužil Wehrmachtu jako skladiště. Po roce 1990 pozornost KVH, ale nebyl
  rekonstruován. Volně přístupný, v bezprostřední blízkosti obce.

  '
visit: 'Srub volně přístupný v klidné obci — kontrast s muzeálním areálem Hlučín-Darkovičky
  (5 km).


  **Přístup:** volně 24/7.


  **Co uvidíte:** srub v lukách mimo turistické davy — autentická nálada fortifikace
  v krajině. Dochované pancéřové zvony.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem ze Silesie (2 km) nebo z Hlučína (4 km). Vlakem do Hlučína
  + bus.


  **Doporučeno kombinovat s:** Areálem Hlučín-Darkovičky (muzeum, 5 km), Ostravou,
  MO-S 19, 20 (muzeální sruby).

  '
