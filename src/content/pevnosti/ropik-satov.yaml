location:
  lat: 48.7708
  lon: 16.0103
  address: Šatov 395, 671 22 Šatov
built: '1938'
state: muzeum
description: Precizně rekonstruovaný řopík typu A-160 nedaleko rakouských hranic. Expozice Jihomoravského muzea ve Znojmě.
history: 'Řopík u Šatova byl součástí jižní moravské linie lehkého opevnění, budované v posledních letech první republiky jako reakce na Anschluss Rakouska (březen 1938).


  Po Mnichovu a následné okupaci byl řopík opuštěn. V 80. letech zde probíhala postupná rekonstrukce — dnes je objekt kompletně vybaven včetně ocelolitinových lafet, pancéřových dveří a dobové výstroje.

  '
visit: 'Otevřeno sezónně od dubna do října, zpravidla víkendy. Informace na jmmznojmo.cz (Jihomoravské muzeum ve Znojmě).

  '
