title: Muzeum Šatov — rekonstruovaný řopík
code: LO vz. 37 A-160 — Šatov
type: lo-vz-37
line: Jižní Morava (Znojemsko)
region: Jihomoravský kraj
location:
  lat: 48.7708
  lon: 16.0103
  address: Šatov 395, 671 22 Šatov
built: '1938'
state: muzeum
description: Precizně rekonstruovaný řopík typu A-160 nedaleko rakouských hranic. Jediná veřejně přístupná expozice lehkého opevnění na jižní Moravě, ve správě Jihomoravského muzea ve Znojmě.
history: |
  Řopík u Šatova (oficiální označení 154/A-160 Z) byl součástí jihomoravské linie lehkého opevnění, budované v reakci na Anschluss Rakouska (březen 1938). Jižní Morava se ze dne na den stala přímo hraniční oblastí s nacistickou Říší a původní obranný plán musel být radikálně přepracován. Ředitelství opevňovacích prací pověřilo budováním ÚIII. ekspozituru Brno, která ve spolupráci s místními dodavateli (firmy Ing. Záruba-Pfeffermann a Ing. Otakar Marek z Brna) zahájila stavbu řopíků v dubnu 1938.

  Šatovský řopík je typ A-160 — lehký objekt vzor 37, varianta A (oboustranná) se zalomením 160°, normální odolnost (stěny 60 cm železobetonu, strop 80 cm). Výzbroj: dva lehké kulomety vz. 26 v ocelolitinových lafetách M, vlastní ventilace pomocí ručního ventilátoru, periskop, pancéřové dveře typu N. Posádka 7 mužů. Tento konkrétní typ představoval páteřní objekt jihomoravské linie — A-160 byl použit u více než 60 % objektů.

  Linie na Znojemsku byla v září 1938 stavebně dokončená z 95 %, ale neosazená výzbrojí — pancéřové dveře, lafety a kulomety dorazily na frontu až v posledním srpnovém týdnu. Po Mnichovu byla celá oblast okupována Wehrmachtem. Vnitřní výbava byla částečně demontována a odvezena. Za války sloužily šatovské řopíky jako sklady a stanoviště Volkssturmu v jaře 1945.

  Po válce byly objekty na Znojemsku z velké části zničeny v rámci „akce Trvalé objekty" (1948–1955) — komunistický režim odstřeloval řopíky jako součást přípravy nové železné opony proti západu. Šatovský objekt přežil díky tomu, že stál v zástavbě obce a jeho destrukce by ohrozila okolní domy.

  Systematická rekonstrukce začala v polovině 80. let pod vedením místních nadšenců. Po roce 1990 se přístupu chopilo Jihomoravské muzeum ve Znojmě a v letech 1995–1998 řopík kompletně zrekonstruovalo — včetně replik ocelolitinových lafet, originálního kulometu vz. 26, dobové výstroje a periskopu. V roce 2010 byla expozice rozšířena o vnější repliku překážkového systému (drátěný plot, jezci, polní opevnění).

  Z pohledu typologie je šatovský A-160 jediným plně vystrojeným exemplářem tohoto typu zpřístupněným na jižní Moravě a důležitou referencí pro pochopení strategie urgentního opevnění hranice po anšlusu.
visit: |
  Muzeum Šatov je otevřeno od dubna do října, prohlídky zpravidla o víkendech (10:00–17:00) a v hlavní sezóně (červenec–srpen) i ve všedních dnech. Aktuální provozní doba, vstupné a možnost objednání prohlídky pro skupinu na jmmznojmo.cz (Jihomoravské muzeum ve Znojmě, expozice Šatov).

  Doporučená délka prohlídky: 30–40 minut. Trasa zahrnuje vnitřek řopíku s rekonstruovanou výzbrojí (lafety M s kulomety vz. 26, periskop, ventilátor), pancéřové dveře, ruční komunikační zařízení a ubikaci pro 7 mužů. Vně objektu replika překážkového systému a informační panely o jihomoravské linii. Vhodné i pro děti od 6 let.

  Šatov se nachází 8 km jihovýchodně od Znojma na hraniční silnici se Rakouskem. Parkování u objektu zdarma. Vlakem do Znojma, odtud autobus linka 818 do Šatova (8 min). Cykloturistická trasa Greenways Praha–Vídeň prochází přímo kolem řopíku.

  Doporučená kombinace: návštěva Šatova s prohlídkou znojemského Loucký kláštera nebo NP Podyjí. Pro fortifikační návštěvníky možnost trekkingu po dalších řopících linie směrem na Hnanice (5 km, ~12 objektů viditelných z polních cest, většina jen ruina).
