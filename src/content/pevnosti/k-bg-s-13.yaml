title: K-BG-S-13 „U lomu"
code: K-BG-S-13
type: pechotni-srub
line: Králicko
region: Pardubický kraj
location:
  lat: 50.096322
  lon: 16.766673
state: zachovaly
description: Pěchotní srub K-BG-S-13 „U lomu" náležející k dělostřelecké tvrzi Berghöhe
  na úseku Králicko. Součást československého těžkého opevnění z let 1935–1938.
history: 'Úsek Králicko na jižním úpatí Orlických hor — nejhustěji opevněný pás v
  ČR. Tři dělostřelecké tvrze (Bouda, Adam, Hůrka) + přes 50 srubů.


  Srub K-BG-S-13 byl součástí této linie. Stavební práce probíhaly v letech 1935–1938,
  dokončení a výzbroj závisely na fázi budování daného úseku.


  Srub byl stavěn jako součást obranného obvodu tvrze Berghöhe — jednoho z hlavních
  dělostřeleckých objektů plánované čs. linie.


  Po Mnichovské dohodě (září 1938) byla linie opuštěna bez boje a objekty předány
  Wehrmachtu. Za války sloužily jako sklady nebo cíle střeleckých zkoušek. Po roce
  1948 byly některé objekty v rámci akce „Trvalé objekty" poškozeny; jiné přežily
  v lesním či polním terénu.'
visit: '**Stav:** objekt je pravděpodobně v ruinózním nebo zarostlém stavu, bez oficiální
  péče. Před návštěvou ověřte přístupnost — může být v soukromém pozemku nebo v chráněné
  oblasti.


  **GPS:** 50.096322, 16.766673 — zadat do navigace nebo [Mapy.cz](https://mapy.cz/zakladni?x=16.766673&y=50.096322&z=17&source=coor&id=16.766673%2C50.096322).


  **Doporučení:** Nevstupujte do objektu bez baterky a vhodné obuvi. Interiér může
  být zaplavený, zřícený nebo obsahovat ostré betonové výstupky. V lesním terénu doporučujeme
  GPS navigaci.'
