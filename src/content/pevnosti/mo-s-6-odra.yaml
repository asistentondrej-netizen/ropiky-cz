description: Pěchotní srub pojmenovaný podle řeky, kterou kontroloval. Oboustranný
  objekt odolnosti II na klíčovém místě — přechod Odry u Bohumína. Vystřelovací otvory
  zničeny Němci během okupace, nosné stěny intaktní.
