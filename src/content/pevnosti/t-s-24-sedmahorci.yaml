description: Pěchotní srub v trutnovském úseku, součást krkonošského předpolí. Dnes v přírodním prostředí Českého ráje.
history: 'Trutnovská linie (T) byla budována jako obrana severovýchodních hranic. T-S 24 je středně velký objekt s bočními střílnami.


  Po Mnichovu zabrán Wehrmachtem. Z poválečné doby nejsou významné úpravy, objekt postupně chátrá.


  Vhodný jako součást turistické trasy v Českém ráji a Podkrkonoší.

  '
visit: 'Přístupný zvenku, vnitřek zatopený. Součást pěších tras.

  '
