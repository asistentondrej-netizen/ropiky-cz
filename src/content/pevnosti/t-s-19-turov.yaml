visit: 'Pěchotní srub T-S 19 „Turov" na hřebenu Orlických hor — součást obranné linie nad Hronovem. Rekonstrukce provozovaná
  Klubem vojenské historie Náchod.


  **Otevírací doba:** květen–září, víkendy 10:00–17:00, v červenci a srpnu i všední dny. Aktuální info na klub-vojenske-historie.cz.


  **Vstupné:** cca 80 Kč dospělí, 40 Kč děti.


  **Co uvidíte:** zrekonstruovaný interiér srubu II. odolnosti, repliky kulometů, ukázka posádkového života. Srub je zasazen
  na kopci s panoramatickým výhledem na Broumovské stěny a Adršpašské skály.


  **Doporučená délka:** 30 minut pro srub, 2 hodiny s procházkou po hřebenu (výhledy).


  **Dostupnost:** Autem z Hronova (6 km) po silnici na Velké Petrovice + 1 km pěšky po lesní cestě. Vlakem do Hronova + taxi
  nebo kolo. Ideální pro cyklisty — navazuje na síť cyklostezek Broumovska.


  **Doporučeno kombinovat s:** tvrz Dobrošov (25 km — největší cíl regionu), Adršpašské skály (15 km), T-S 73 Polom (12 km,
  volně přístupný), Broumovský klášter (20 km). Celodenní túra s několika objekty ŘOP.'
