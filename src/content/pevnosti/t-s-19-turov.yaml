description: >
  Soukromě rekonstruované muzeum „Pevnost Hronov" v pěchotním srubu T-S 19
  „Turov". Oboustranný srub III. odolnosti s kompletně obnoveným interiérem,
  replikami výzbroje a panoramatickým výhledem na Broumovské stěny a
  Adršpašské skály. Spravuje Klub vojenské historie Náchod.

