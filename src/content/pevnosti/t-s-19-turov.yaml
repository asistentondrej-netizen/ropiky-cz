# === NÁVŠTĚVA ===
visit: >
  Muzeum „Pevnost Hronov" spravuje Klub vojenské historie Náchod. Otevřeno
  květen–září, víkendy 10:00–17:00, v červenci a srpnu i všední dny. Ideální
  pro cyklisty — navazuje na síť cyklostezek Broumovska. Kombinujte s T-S 73
  „Jeřáb" (12 km), Adršpašskými skálami a tvrzí Dobrošov (25 km). Aktuální
  informace na klub-vojenske-historie.cz.

