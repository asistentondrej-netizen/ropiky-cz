# === HISTORIE ===
history: >
  T-S 19 „Turov" byl postaven v letech 1937–1938 jako součást trutnovské
  linie čs. opevnění. Oboustranný typ C s odolností III, plánovaná posádka
  32 mužů. V září 1938 byl plně vyzbrojen a obsazen.


  Po Mnichovu odevzdán Wehrmachtu, během okupace sloužil jako cíl zkušebních
  střeleb a sklad. Po válce postupně chátrající. Od 90. let rekonstrukce
  soukromou iniciativou, od roku 2005 provozuje Klub vojenské historie
  Náchod jako muzejní expozici „Pevnost Hronov".


  Interiér zahrnuje zrekonstruovanou ubytovnu posádky, střelecké stanoviště,
  strojovnu a dobovou výbavu. Specifikem muzea je důraz na osobní příběhy
  vojáků a unikátní poloha s rozhledy.

