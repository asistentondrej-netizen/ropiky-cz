title: R-S 69 „Bartošovice (horní)"
code: R-S 69
type: pechotni-srub
line: Rokytnice v Orlických horách
region: Královéhradecký kraj
location:
  lat: 50.1743
  lon: 16.4682
  address: Bartošovice v Orlických horách
built: '1937'
state: pristupny
description: Pěchotní srub „Bartošovice horní" — výše položený než R-S 60, s panoramatickým výhledem na Orlické hory. Oblíbený
  fortoturistický cíl.
history: 'R-S 69 byl dokončen v říjnu 1937. Oboustranný srub II. odolnosti s neobvykle silným pancéřováním — klíčový objekt
  pro kontrolu hřebene nad Orlicí.


  V roce 1938 byl plně vyzbrojen. Po Mnichovu zůstal nezasažen (Orlické hory nebyly anektovány), ale výzbroj byla odstraněna.
  Od roku 1945 v pasivním stavu.

  '
visit: 'Horní srub bartošovické skupiny — panoramatický výhled na Orlické hory.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** vyvýšená poloha nad údolím, charakteristické palebné pole kryjící hřeben, pancéřové zvony. Výhled na sousední
  sruby R-S 60 a R-S 66.


  **Doporučená délka:** 25–30 minut (s fotopříležitostmi).


  **Dostupnost:** Autem z Bartošovic (3 km) + pěšky do kopce (500 m). Značená turistická cesta.


  **Doporučeno kombinovat s:** R-S 60, R-S 66, R-S 74 Hanička, hřebenovou túrou Orlických hor.

  '
