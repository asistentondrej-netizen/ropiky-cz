  address: Bartošovice v Orlických horách
built: '1937'
state: pristupny
description: Pěchotní srub „Bartošovice" — součást rozsáhlé linie v Orlických horách. V okolí je patrná logistická síť cest
  pro zásobování objektů.
history: 'R-S 60 byl postaven v letech 1936–1937 jako součást obrany horního toku Orlice. Oboustranný srub II. odolnosti s
  plánovanou výzbrojí 2× TK vz. 37 a 1× PTK vz. 36.


  Po Mnichovu objekt zůstal v českém území (Orlické hory nebyly součástí Sudet). V letech 1939–1945 sloužil slovenským a německým
  posádkám jako pozorovatelna. Po roce 1945 v majetku čs. armády.

  '
visit: 'Klasický pěchotní srub v Orlických horách — volně přístupný exteriér.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** oboustranný pěchotní srub II. odolnosti v podhorském terénu — střílny, pancéřové zvony, stopy překážek.
  Kolem něj naučná stezka.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** Autem z Rokytnice v Orlických horách (6 km) do Bartošovic. Vlakem do Rokytnice + 6 km pěšky nebo kolo.


  **Doporučeno kombinovat s:** R-S 66 Křivá, R-S 69, R-S 74 Hanička (muzeum, 10 km). Vícedenní pobyt v Orlických horách —
  nejhustší koncentrace ŘOP v ČR.

  '
