title: Řopík 8/10/A-140 — Hlohovec (u rybníka)
code: 8/10/A-140 Hlohovec
type: lo-vz-37
line: B-4 Úvaly — Břeclav
region: Jihomoravský kraj
location:
  lat: 48.7837
  lon: 16.7632
  address: Hlohovec, jižní břeh Hlohoveckého rybníka
built: '1938'
state: pristupny
description: Řopík u Hlohoveckého rybníka — blokoval příjezd od Valtic přes vodní
  plochy. Specifický tím, že stojí v terénu Lednicko-valtického areálu v přímém výhledu
  na Apollonův chrám.
history: 'Betonován v červenci 1938 — jeden z posledních objektů úseku B-4 před Mnichovem.
  Linie zde kombinovala vodní překážku (rybník) s palebnou činností ze dvou řopíků
  na opačných březích.


  V září 1938 osazen (4 muži). Po Mnichovu opuštěn, za války Wehrmacht používal jako
  pozorovatelnu.


  Po válce zasypán hlínou a ponechán zapomenutý do 90. let. V roce 2008 částečně odkryt,
  ale interiér zůstává nepřístupný (zatopený spodními vodami).

  '
visit: 'Řopík v prostředí UNESCO Lednicko-valtického areálu — unikátní kombinace barokní
  krajiny a vojenské architektury.


  **Přístup:** volně, 24/7. Po cestě kolem Hlohoveckého rybníka (z Hlohovce 1 km,
  z Valtic 5 km).


  **Co uvidíte:** LO vz. 37 typ A-140. Částečně odkrytý — viditelná jen přední strana
  se střílnami. Zadní strana stále pod hlínou.


  **Doporučená délka:** 20 minut.


  **Dostupnost:** Cyklistická (Moravská vinařská stezka prochází okolo), pěší z Hlohovce.


  **Doporučeno kombinovat s:** Apollonovým chrámem (kousek odtud), zámkem Lednice
  (4 km), Minaretem, dalšími řopíky v Boří doubravě. Ideální cíl na kole.

  '
