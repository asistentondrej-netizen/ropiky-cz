title: OP-S 22 „Nad úvrtem"
code: OP-S 22
type: pechotni-srub
line: Opava
region: Moravskoslezský kraj
location:
  lat: 49.8672
  lon: 17.8745
  elevation: 301
  address: Hradec nad Moravicí, u zámku
built: '1937'
state: pristupny
description: Oboustranný pěchotní srub na strategickém svahu nad Hradcem nad Moravicí.
  Volně přístupný, s dochovanými střílnami. Součást naučné stezky Čs. opevnění Opavsko.
history: 'OP-S 22 „Nad úvrtem" byl vystavěn v roce 1937 firmou Kruliš-Hess Ostrava
  jako součást obranné linie chránící vstup do Opavy ze severu. Oboustranný srub II.
  stupně, plánovaná výzbroj 4 TK vz. 37 a 1 PTK vz. 36.


  Srub se nachází na svahu 280 m n.m. s výhledem na řeku Moravici a zámek Hradec nad
  Moravicí. V září 1938 plně obsazen, během okupace Němci demontovali pancéřové prvky
  a zbraně. Pouze beton zůstal na místě.


  Po válce nepoužíván, od 1999 součástí naučné stezky „Čs. opevnění Opavsko", kterou
  provozuje Klub vojenské historie Opava.'
visit: 'Volně přístupný 24/7, ideální pro krátkou fortifikační procházku v krajině.
  **Nenáročný výlet** vhodný i pro rodiny s dětmi.


  **Kudy přijdete:**


  - Pěšky ze zámku Hradec nad Moravicí: 1 km po červené turistické značce (~20 min)

  - Autem: parkování pod zámkem (50 Kč), odtud pěšky

  - Na kole: cyklostezka č. 6 (Krakov–Vídeň) vede přes obec


  **Co zde uvidíte:**


  - Oboustranný srub rozměru 18 × 12 m, dvě boční střílny

  - **Dochované ocelolitinové střílny** (vzácnost — většinu Němci demontovali)

  - Čtyři šachty pro pancéřové zvony (prázdné)

  - Vstup zabezpečen mříží, vnitřek nepřístupný bez průvodce

  - Informační panel s plánem obrany Opavska 1938


  **Dva tipy pro návštěvu:**


  1. **Kombinace s návštěvou zámku Hradec nad Moravicí** — architektonická perla 19.
  století, 2 hodiny na prohlídku, v roce byla u Beethovena koncertní pobytovou rezidencí.


  2. **Fortifikační procházka po 5 srubech** — naučná stezka pokračuje k OP-S 21,
  OP-S 23, OP-S 24 a OP-S 25 „Památník". Celkem 4 km, 2,5 hodiny. Všechny objekty
  volně přístupné.


  **Speciální akce:** 3× ročně (květen, srpen, říjen) pořádá Klub vojenské historie
  Opava **komentované prohlídky** s historikem a přístupem dovnitř srubu. Termíny
  na opava-kvh.cz.


  **Doporučeno:** Dobrá obuv (terén svahu je kamenitý), baterka pro nahlédnutí dovnitř
  přes mříž, foťák (výhled na Moravici je fotogenický).'
sources:
