description: >
  Rozestavěná dělostřelecká tvrz u Sněžného, severní část Orlických hor. Součást čs. opevnění 1935–1938. Nedokončena před Mnichovem, dnes zčásti zpřístupněna jako muzeum.

history: >
  Tvrz Skutina byla součástí plánu výstavby čs. opevnění 1935–1938.
  Realizace byla přerušena po Mnichovské dohodě 30. 9. 1938, tvrz zůstala
  nedokončená. Některé betonové objekty jsou dodnes patrné v krajině.

visit: >
  Tvrz je **rozestavěná** — jednotlivé objekty jsou volně přístupné v terénu,
  ale bez interiérů a vybavení. Před návštěvou ověřte přístupnost, některé
  části mohou být na soukromých pozemcích.

