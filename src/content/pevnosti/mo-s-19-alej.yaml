title: MO-S 19 „Alej"
code: MO-S 19
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.8855
  lon: 18.3272
  address: Hlučín-Darkovičky, skanzen čs. opevnění
built: '1937'
state: muzeum
description: Pěchotní srub „Alej" — druhý z triumvirátu rekonstruovaných objektů Areálu čs. opevnění Hlučín-Darkovičky. Oboustranný
  typ B odolnosti II. Kompletní rekonstrukce interiéru včetně lafet, výzbroje a výstroje.
history: 'Srub MO-S 19 byl postaven v roce 1936 jako součást předválečné linie chránící Ostravsko. Po Mnichovu byl opuštěn
  a během okupace sloužil jako objekt pro německé střelecké zkoušky.


  Dnes představuje jeden z nejkvalitněji rekonstruovaných objektů skanzenu, s dobovou výstrojí a vybavením.

  '
visit: 'Druhý z triumvirátu rekonstruovaných objektů Areálu čs. opevnění Hlučín-Darkovičky. Prohlídka je zahrnuta ve společné
  vstupence s ostatními objekty skanzenu.


  **Otevírací doba:** duben–listopad, víkendy 10:00–17:00, v hlavní sezóně (červen–srpen) denně mimo pondělí. Prohlídky s
  průvodcem každou celou hodinu. V zimním období uzavřeno.


  **Vstupné:** cca 150 Kč dospělí, 80 Kč děti/studenti, rodinné vstupné 380 Kč (platí pro všechny objekty areálu MO-S 5, MO-S
  19, MO-S 20). Aktuální info na szm.cz.


  **Co uvidíte:** kompletně rekonstruovaný interiér oboustranného srubu II. odolnosti — střelecké místnosti s replikami protitankových
  kanónů vz. 36 a těžkých kulometů vz. 37, ubikace posádky, strojovna s původním agregátem, filtroventilační zařízení, munice.
  Kvalita rekonstrukce patří k nejvyšší v České republice.


  **Doporučená délka:** 45–60 minut pro MO-S 19, celý areál 3–4 hodiny (přidat MO-S 5 Na trati, MO-S 20 Orel, venkovní expozici
  zbraní a dělostřelecký srub MO-S 8 Dvůr Paseky).


  **Dostupnost:** Autem z Ostravy po silnici II/469 na Hlučín (12 km), parkování u areálu zdarma. Vlakem do Hlučína, odtud
  3 km pěšky naučnou stezkou nebo autobus linka 268. Cyklisté využijí stezku podél Odry (Ostrava–Bohumín).


  **Doporučeno kombinovat s:** návštěvou Ostravy (Dolní Vítkovice, Landek Park, Nová radnice), zámku Kravaře (18 km) nebo
  Hlučínského jezera (léto). Pro další fortifikační zážitek pokračovat do Opavy (OP-S 25 Památník, 25 km).'
