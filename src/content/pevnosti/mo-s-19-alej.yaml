title: MO-S 19 „Alej"
code: MO-S 19
type: pechotni-srub
line: Moravská Ostrava
region: Moravskoslezský kraj
location:
  lat: 49.8855
  lon: 18.3272
  address: Hlučín-Darkovičky, skanzen čs. opevnění
built: '1936'
state: muzeum
description: Pěchotní srub v rámci skanzenu Darkovičky. Ukázkově rekonstruovaný oboustranný
  objekt s plnou výstrojí.
history: 'Srub MO-S 19 byl postaven v roce 1936 jako součást předválečné linie chránící
  Ostravsko. Po Mnichovu byl opuštěn a během okupace sloužil jako objekt pro německé
  střelecké zkoušky.


  Dnes představuje jeden z nejkvalitněji rekonstruovaných objektů skanzenu, s dobovou
  výstrojí a vybavením.

  '
visit: 'Součást areálu Slezského zemského muzea v Hlučíně-Darkovičkách. Vstup v rámci
  společné prohlídky skanzenu.

  '
