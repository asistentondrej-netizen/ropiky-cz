# === HISTORIE ===
history: >
  Srub MO-S 19 byl postaven v letech 1936–1937 jako součást páteřní linie
  chránící přístupy k ostravské průmyslové oblasti. Oboustranný typ B s
  odolností II byl plně vyzbrojen a osazen v září 1938.


  Po Mnichovu odevzdán Wehrmachtu. Během okupace sloužil německé armádě ke
  zkušebním střelbám spolu s ostatními objekty úseku — přesto zůstal strukturálně
  nedotčený. Po válce krátce armádní sklad, od 80. let muzejní rekonstrukce.


  Dnes patří k ukázkově rekonstruovaným srubům areálu. Interiér zahrnuje
  obytné místnosti posádky, filtrovnu, strojovnu, muniční sklad a velitelské
  stanoviště. Prohlídka je vedena průvodcem.

