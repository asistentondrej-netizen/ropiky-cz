  lat: 49.8855
  lon: 18.3272
  address: Hlučín-Darkovičky, skanzen čs. opevnění
  elevation: 254

built: '1936'
state: muzeum

description: >
  Ukázkově rekonstruovaný oboustranný pěchotní srub v rámci skanzenu
  Darkovičky. Vybaven plnou dobovou výstrojí, replikami zbraní a pozorovacím
  zvonem. Spolu s MO-S 5 a MO-S 20 patří k nejkvalitněji zachovaným objektům
  těžkého opevnění v ČR.

