  Součást Areálu čs. opevnění Hlučín-Darkovičky Slezského zemského muzea.
  Vstup v rámci společné prohlídky skanzenu. Průvodcovský výklad cca 45 minut.
  Otevřeno duben–listopad. Aktuální informace na szm.cz.

