  address: Komárno a okolí, Podunajsko
built: '1937'
state: rozpadly
description: Linie lehkého opevnění na Podunají proti Maďarsku. Strategicky významný úsek bránící Bratislavu a jižní Slovensko.
history: 'Komárnská linie byla součástí obrany proti Horthyho Maďarsku, které si od 30. let nárokovalo jižní Slovensko. Hustota objektů byla vyšší než v severnějších oblastech.


  Po Vídeňské arbitráži v listopadu 1938 bylo území Maďarskem anektováno. Bunkry byly částečně zlikvidovány, část převzata maďarskou armádou.


  Po válce a obnovení hranic byly objekty opět československé, poté opuštěné. Dnes převážně v rozpadlém stavu na slovenském území.

  '
visit: 'Objekty rozeseté v terénu mezi Komárnem a dolním tokem Váhu. Bez turistické infrastruktury, vhodné pro hledače stop minulosti.

  '
