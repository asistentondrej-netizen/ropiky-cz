description: Jedna z pěti plně dokončených dělostřeleckých tvrzí čs. opevnění a nejzachovalejší — kompletně zpřístupněná tvrz s podzemím přes 1 700 metrů.
history: 'Tvrz Bouda v sedle Suchý vrch–Buková hora byla budována v letech 1936–1938 jako součást linie chránící Králicko. Patří k pěti dělostřeleckým tvrzím, jež byly do Mnichova plně stavebně dokončeny
  (společně s Adamem, Hůrkou, Haničkou a Smolkovem).


  Tvrz se skládá z pěti bojových srubů a jednoho vchodového srubu, propojených podzemním systémem chodeb a sálů v hloubce 38 metrů pod skálou.


  V říjnu 1938 byla bez jediného výstřelu předána Wehrmachtu. Po válce sloužila jako muniční sklad. Od roku 1990 funguje jako muzeum spravované občanským sdružením.

  '
visit: 'Otevřeno od dubna do října, prohlídky s průvodcem. Aktuální informace na muzeumboud­a.cz. Doporučená délka prohlídky: 2 hodiny. Teplota v podzemí cca 7 °C celoročně — vezměte si svetr.

  '
