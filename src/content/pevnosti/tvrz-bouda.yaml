visit: 'Tvrz Bouda je nejautentičtěji zachovaná dělostřelecká tvrz ŘOP. Prohlídka trvá cca 2 hodiny a je vedena pouze s průvodcem — začíná v pokladně u vchodového srubu, vede 750 metrů podzemních chodeb a končí u srubu K-S 24.


  Co uvidíte: kompletní kasárny, strojovna s kompresory, filtrovna vzduchu, studna v hloubce 40 m, střílny s dochovanými lafetami pro kulomety ZB vz. 37, pancéřové zvony in-situ, stopy německých experimentů.


  Tempo je střední — v podzemí je schodiště 160 stupňů klesání. Chodby jsou pohodlně průchodné, stropy min. 2,2 m. Oblečení teplé (i v srpnu je dole 7 °C), pevné boty.

  '
