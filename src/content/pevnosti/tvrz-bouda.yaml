description: 'Dělostřelecká tvrz Bouda je jedním z pěti plně dokončených pevnostních komplexů československého opevnění 1935–1938 a dnes nejautentičtěji zachovaná tvrz na území ČR. Pětice bojových srubů propojených systémem podzemních chodeb v hloubce 38 metrů tvoří páteř fortifikace chránící Králicko. Po válce sloužila armádě jako sklad, od roku 1990 funguje jako muzeum s průvodcem.

  '
