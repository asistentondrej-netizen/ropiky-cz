history: 'Stavba tvrze Bouda byla zahájena 1. září 1936 a probíhala v režimu nejvyšší státní priority. V jejím nitru bylo vyhloubeno přes 750 metrů podzemních chodeb v hloubce 38 metrů pod úrovní terénu, která nese jméno podle nedalekého vrchu Suchý vrch.


  Komplex tvoří pětice bojových srubů: K-S 22 „U silnice", K-S 22a „U kamene", K-S 23 „Krok", K-S 24 „Utržený" a vchodový srub K-S 21 „Pod lomem". Páteří podzemí je centrální hala s kasárnami pro posádku, strojovna, filtrace vzduchu, studna a polní lékařská stanice. Tvrz byla navržena jako zcela soběstačná jednotka schopná obrany po dobu 30 dnů bez vnější podpory.


  Po podepsání mnichovské dohody 30. září 1938 byla tvrz odevzdána Němcům nepoužita. Wehrmacht provedl během války několik experimentů s průrazovou municí (stopy jsou dodnes patrné na srubu K-S 24), ale betonový monolit odolal. Po roce 1945 převzala tvrz Československá lidová armáda, sloužila jako muniční sklad a po roce 1969 jako součást systému civilní obrany.


  Od roku 1990 funguje tvrz jako muzeum pod správou Společnosti přátel československého opevnění. Prohlídka pokrývá všech pět bojových srubů, kasárny, strojovnu i filtrovny.

  '
