history: 'Dělostřelecká tvrz Milotický vrch (též Hohnberg) je tvrz, která byla plánována v důsledku zvolení Adolfa Hitlera kancléřem v Německu. Patřila mezi páteř obrany československého opevnění na severní hranici Československa. Byla situována na kótu 665 Hohnberg (dnes 674 Velký Tetřev) severovýchodně od Bruntálu. Tvrz však byla z finančních důvodů zrušena a nahradily ji dva izolované dělostřelecké sruby u Horních Životic. Tvrz měla být tvořena dvěma pěchotními sruby (OP-S 59-60), dělostřeleckou… (Zdroj: Wikipedie, CC BY-SA)'
