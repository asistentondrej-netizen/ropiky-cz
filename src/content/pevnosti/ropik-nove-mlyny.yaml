description: 'Linie řopíků v okolí Pálavských vrchů a Novomlýnských nádrží. Volně přístupné objekty v turistické oblasti, dobře dostupné pěšky i na kole.'
history: |
  Mikulovská oblast byla součástí jižní linie lehkého opevnění budované v letech 1937–1938 proti hrozbě útoku z rakouského (po březnu 1938 říšského) území.

  Řopíky v oblasti Pálavy a u Nových Mlýnů se ve velké většině dochovaly. Patří k nejdostupnějším objektům čs. opevnění pro turistiku, integrované do sítě cyklotras a naučných stezek.
visit: |
  Volně přístupné, vhodné pro pěší i cyklovýlety. Součástí turistických tras CHKO Pálava. Vnitřky většiny objektů zavřené, ale vnější konstrukce dobře patrná.
