title: Řopíky u Nových Mlýnů (Pálava)
code: MIK / Pálava — lehké opevnění
type: lo-vz-37
line: Jižní Morava (Mikulovsko)
region: Jihomoravský kraj
location:
  lat: 48.8611
  lon: 16.6361
  address: Mikulovsko, oblast Pálavy a Nových Mlýnů
built: '1938'
state: pristupny
description: Linie řopíků v okolí Pálavských vrchů a Novomlýnských nádrží. Volně přístupné objekty v turistické oblasti, dobře
  dostupné pěšky i na kole.
history: 'Mikulovská oblast byla součástí jižní linie lehkého opevnění budované v letech 1937–1938 proti hrozbě útoku z rakouského
  (po březnu 1938 říšského) území.


  Řopíky v oblasti Pálavy a u Nových Mlýnů se ve velké většině dochovaly. Patří k nejdostupnějším objektům čs. opevnění pro
  turistiku, integrované do sítě cyklotras a naučných stezek.

  '
visit: 'Řopíky v oblasti Nových Mlýnů a Pálavy — obranná linie podél Dyje. Ideální cíl pro spojení fortifikace s vinařskou
  turistikou.


  **Přístup:** volně, 24/7. Objekty jsou rozptýlené v krajině, většina volně přístupná pouze zvenčí.


  **Co uvidíte:** cca 12 řopíků LO vz. 36 a LO vz. 37 rozesetých kolem přehrady Nové Mlýny a pod Pálavou. Typické prvky: ve
  vinicích, u cyklostezek, některé polozbouráné, některé zachované. Absence jakéhokoliv skanzenu — ryzí fortifikační krajina.
  Nejzachovalejší objekty u obcí Popice, Strachotín a Dolní Věstonice.


  **Doporučená délka:** 2–4 hodiny pro návštěvu nejzajímavějších 4–5 řopíků kombinovaných s přírodou.


  **Dostupnost:** Autem z Mikulova (12 km) nebo z Brna po dálnici D52 (50 km). Cyklisté ideálně po Moravské vinařské stezce.
  Vlakem do Popic + pěšky podél Dyje.


  **Doporučeno kombinovat s:** vinicemi Pálavy (Sonberk, Mikrosvín), archeologickým skanzenem Věstonická venuše, lázněmi Pasohlávky,
  hradem Děvičky. Kombinace „opevnění + víno + příroda" — jeden z nejkrásnějších fortifikačních výletů v ČR.'
