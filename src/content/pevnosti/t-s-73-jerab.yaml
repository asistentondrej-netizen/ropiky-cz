title: T-S 73 „Jeřáb"
code: T-S 73
type: pechotni-srub
line: Trutnov
region: Královéhradecký kraj
location:
  lat: 50.5878
  lon: 16.1567
  address: Teplice nad Metují, svah nad obcí
built: '1938'
state: pristupny
description: Pěchotní srub II. stupně na hřebeni nad Teplicemi nad Metují. Součást
  naučné stezky Adršpach–Teplice, známý svou polohou v skalním městě. Volně přístupný.
history: 'T-S 73 „Jeřáb" byl postaven v roce 1938 firmou Konstruktiva jako součást
  obrany severních Čech a přístupů do vnitrozemí přes Broumovské stěny. Oboustranný
  srub II. stupně, výzbroj 4 TK + 1 PTK.


  V září 1938 byl ještě rozestavěn (cca 85 % hotovosti, bez výzbroje). Po okupaci
  Němci stavbu dokončili pro vlastní potřeby a během války využívali jako pozorovací
  stanoviště.


  Po roce 1945 objekt opuštěn. Od 1990 součást naučné stezky Adršpach–Teplice, která
  propojuje skalní město s vojenskou historií regionu.'
visit: 'T-S 73 „Jeřáb" je **dokonalé spojení přírody a historie** — srub stojí přímo
  v okraji Adršpašsko-teplických skal, což je národní přírodní rezervace s mimořádnou
  krajinou pískovcových věží.


  **Otevírací doba:** Volně přístupný 24/7 po celý rok. Doporučené období **květen–říjen**
  (v zimě nebezpečí klouzavého ledu na cestě).


  **Jak se dostat:**


  - Vlakem do Teplic nad Metují, pak 40 min pěšky po žluté turistické značce

  - Autem: parkoviště Skalní město Adršpach (100 Kč/den), odtud pěšky přes Vlčí rokli

  - Cyklostezka 4045 (Adrspach–Broumov) vede 500 m pod srubem


  **Okruh Jeřáb (doporučený):**


  1. Parkoviště Adršpach (8:30) →

  2. Skalní město Adršpach (prohlídka 2 h) →

  3. Obědvá v restauraci Skalní město →

  4. T-S 73 „Jeřáb" + okolí (1 h) →

  5. Pokračování do Teplic nad Metují přes skalní bránu →

  6. Teplické skály (1,5 h) →

  7. Návrat do Teplic n. Metují (16:30)


  **Co zde uvidíte:**


  - Mohutný oboustranný srub s pěti střílnami

  - Dochované pancéřové prvky (dva zvony)

  - **Unikátní výhled na Adršpach** — skalní věže a kaňon Metuje

  - Informační panel s historií linie Trutnov


  **Vnitřek je zpravidla uzavřen**, ale 2× ročně (červen, září) pořádá Muzeum Broumovska
  komentované prohlídky se vstupem do srubu. Termíny na muzeum-broumovska.cz.


  **Pro fotografy:** Nejlepší světlo je **odpoledne kolem 16:00** — slunce ozařuje
  jižní stěnu srubu a skalní věže v pozadí. Exponenciálně vzniknou ikonická díla čs.
  opevnění.


  **Bezpečnost:** Cesta k srubu vede přes pískovcové skály — **pevná obuv** nutná,
  v mokru klouzavé. Baterku doporučujeme pro případ zdržení po setmění.'
