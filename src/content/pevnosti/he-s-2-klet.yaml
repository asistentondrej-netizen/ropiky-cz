title: HE-S 2 „Kleť" (Habartov)
code: HE-S 2
type: lo-vz-37
line: Sokolov–Cheb
region: Karlovarský kraj
location:
  lat: 50.1797
  lon: 12.5497
  address: Habartov, svah nad obcí
built: '1938'
state: pristupny
description: Řopík typu A-160, svědek prvního ozbrojeného incidentu sudetské krize
  13. září 1938. Památník padlých čs. obránců. Volně přístupný s informačními panely.
history: 'HE-S 2 „Kleť" byl postaven v jarních měsících 1938 firmou Stavba-Pittel&Brausewetter
  jako součást linie na západní hranici proti Německu. Typ A-160, standardní řopík
  vzoru 37.


  **Incident 13. září 1938 — Habartovský masakr:** V ranních hodinách 13. září napadli
  ozbrojení sudetoněmečtí funkcionáři z obce Habartov policejní stanici a poté podnikli
  útok na pozice čs. armády. Posádka řopíku HE-S 2 pod velením svobodníka Josefa Koukla
  čelila skupině cca 30 ozbrojených sudetských Němců.


  Po tříhodinovém boji byl útok odražen, ale za cenu **3 padlých čs. obránců**: svb.
  Josef Koukl, vojín Jan Dvořák a vojín Karel Novák. Sudetoněmecký útočník Fritz Köllner
  zůstal na bojišti — jako **první sudetský Němec padlý v ozbrojeném konfliktu s ČSR**.
  Incident dostal okamžitý mezinárodní mediální ohlas.


  Po Mnichovu obsadili Němci oblast, **zničili pamětní desku** a srub použili jako
  pozorovací stanoviště. Po válce ČSR postavila u řopíku **pomník padlým**, který
  byl v 80. letech zdevastován neznámým pachatelem.


  V roce 2008 byl **nový pamětní kámen** postaven u příležitosti 70. výročí incidentu,
  za účasti armádních představitelů a rodinných příslušníků obětí.'
visit: 'HE-S 2 „Kleť" je **důležitá pamětní lokalita** a ideální místo pro zamyšlení
  nad událostmi září 1938. Volně přístupný **24/7** po celý rok.


  **Jak se tam dostat:**


  - Autem: 15 km severně od Sokolova po silnici 212, pak odbočka na Habartov, 2 km
  po polní cestě

  - Autobusem: linka 442 ze Sokolova do Habartova, pak 30 min pěšky po žluté značce

  - Cyklotrasa 2019 (Krušné hory) vede kolem objektu


  **Na místě:**


  - **Řopík** typ A-160 v relativně dobrém stavu (vnitřek nepřístupný)

  - **Pamětní kámen** obětem 13. září 1938 (obnoven 2008)

  - **Informační panel** s popisem habartovského incidentu

  - **Stopy po střelách** v betonu z boje 1938 (dodnes viditelné na jižní stěně)

  - Výhled na krajinu Karlovarska a Krušné hory


  **Doporučené kombinace:**


  - **Habartov — obec** (1 km) — v obecním úřadě malá stálá expozice k incidentu,
  otevřeno v úředních hodinách, vstup zdarma

  - **Muzeum Sokolov** (15 km) — komplexní expozice sudetské krize 1938

  - **Cheb a chebský hrad** (40 km) — hlavní centrum sudetského problému

  - **Lázně Kynžvart** (35 km) — zámek s Metternichovskou knihovnou


  **Speciální akce:** Každoročně **13. září** se zde koná **pietní akt** za památku
  obětí. Účast armády, místní samosprávy, příbuzných obětí. Zpravidla od 14:00.


  **Pro fotografy:** Objekt je fotogenický hlavně **za podzimních ranních mlh** —
  krušné kopce v pozadí, beton v popředí. Jedná se o jedno z nejikoničtějších pevnostních
  míst v ČR.


  **Bezpečnost:** Vnitřek řopíku není přístupný (zamčeno), venkovní prohlídka bezpečná.
  Pevná obuv doporučena.'
