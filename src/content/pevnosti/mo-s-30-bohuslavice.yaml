description: Pěchotní srub „Bohuslavice" — součást moravskoostravské linie. Volně
  přístupný, dobře zachovalý.
history: 'MO-S 30 byl dokončen v září 1937 jako součást sítě srubů kolem Bohuslavic.
  Oboustranný pěchotní srub II. odolnosti s plánovanou výzbrojí 2× TK vz. 37.


  Po Mnichovu v německých rukou, zvony odvezeny. Od 1990 volně přístupný.

  '
visit: 'Srub v obci — snadný přístup.


  **Přístup:** volně 24/7.


  **Co uvidíte:** pěchotní srub v otevřeném terénu, střílny, prázdné pancéřové otvory
  po odebraných zvonech.


  **Doporučená délka:** 15 minut.


  **Dostupnost:** Autem z Hlučína (4 km) do Bohuslavic. Autobus MHD z Ostravy.


  **Doporučeno kombinovat s:** MO-S 23 (2 km), Areálem Hlučín-Darkovičky (5 km), Ostravou.

  '
