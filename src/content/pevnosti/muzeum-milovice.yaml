# === HISTORIE ===
history: >
  Muzeum čs. armády Milovice bylo otevřeno v roce 2010 v areálu bývalého
  vojenského prostoru Milovice-Mladá (ČSLA 1948–1968, sovětská okupační armáda
  1968–1991). Areál zahrnuje několik desítek hektarů bývalých kasáren,
  hangárů a cvičných ploch.


  Fortifikační expozice muzea vznikla v letech 2008–2012 v rámci projektu
  „Záchrana ohrožených fortifikačních objektů" financovaného Ministerstvem
  obrany ČR. Přeneseny byly tři originální řopíky z jižní a jihovýchodní
  Moravy, které by jinak padly za oběť demolicím nebo degradaci.


  V roce 2015 doplněna plnohodnotná kopie pěchotního srubu v měřítku 1:1
  — unikátní vzdělávací prostor pro pochopení těžkého opevnění bez nutnosti
  cestovat do pohraničí.


  Dnes je Milovice nejdostupnější fortifikační expozicí z Prahy a ideálním
  vstupem do tématu čs. opevnění pro rodiny, školy a zájmovou veřejnost.

