# === NÁVŠTĚVA ===
visit: >
  Největší vojenské muzeum ve Středočeském kraji, nejlépe dostupné pevnostní
  místo z Prahy (40 km, vlakem 45 min). Otevřeno celoročně, úterý–neděle
  9:00–17:00 (zima do 16:00). Pondělí zavřeno kromě svátků. Aktuální
  informace na muzeum-milovice.cz.

