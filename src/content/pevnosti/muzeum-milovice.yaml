  address: Milovice, bývalý vojenský prostor
built: '1937'
state: muzeum
description: Rozsáhlý muzejní areál v bývalém vojenském prostoru Milovice s přesunutými řopíky z různých lokalit. Jediná ucelená
  expozice čs. opevnění ve Středočeském kraji. Vhodné pro rodinné výlety z Prahy.
history: 'Muzeum čs. armády Milovice bylo otevřeno v roce **2010** v areálu bývalého sovětského vojenského prostoru (ČSLA
  1948–1968, sovětská okupační armáda 1968–1991). Areál zahrnuje **několik desítek hektarů** bývalých kasáren, hangárů a cvičných
  ploch.


  **Fortifikační expozice** muzea zahrnuje:


  - **3 originální řopíky** přenesené z jižní a jihovýchodní Moravy (před demolicí)

  - **1 kopie pěchotního srubu** v měřítku 1:1 (postavená 2015)

  - **Venkovní trenažér** pro ukázky bojové činnosti posádky

  - **Expozice v interiérech** kasáren s modely, plány, dokumenty


  Přenesení řopíků bylo realizováno v letech 2008–2012 v rámci projektu **Záchrana ohrožených fortifikačních objektů** (financováno
  Ministerstvem obrany ČR).'
visit: 'Muzeum čs. armády Milovice je **největší vojenské muzeum** ve Středočeském kraji a **nejlépe dostupné pevnostní místo
  z Prahy** (40 km). Vhodné pro rodiny s dětmi, školní exkurze a zájemce o komplexní vojenskou historii.


  **Otevírací doba:** Celoročně, úterý–neděle 9:00–17:00 (zimní období do 16:00). Pondělí zavřeno kromě svátků. muzeum-milovice.cz.


  **Vstupné:** 170 Kč dospělí, 90 Kč děti/studenti, rodinná vstupenka 400 Kč. Studenti a senioři mají slevu.


  **Délka prohlídky:** 3–4 hodiny pro celý areál (dostatek pro prohlídku hlavních expozic).


  **Struktura areálu:**


  1. **Hlavní budova** (1 h) — historie čs. armády 1918–1991

  2. **Fortifikační expozice** (1 h) — tři autentické řopíky, kopie pěchotního srubu

  3. **Zbraňová expozice** (30 min) — palné zbraně 20. století

  4. **Venkovní areál** (1 h) — tanky, transportéry, letadla (40 exponátů)

  5. **Kavárna a shop** s fortifikační literaturou


  **Fortifikační část podrobně:**


  - **Řopík 1 — typ A-120** (ze severní Moravy) — plně vystrojen, vstupný

  - **Řopík 2 — typ A-180** (ze Slovácka) — venkovní prohlídka

  - **Řopík 3 — typ B** (z Podyjí) — neukončená rekonstrukce, jen venkovní

  - **Kopie srubu** — vnitřek s pěti místnostmi, dobovým vybavením, lze projít


  **Dostupnost:**


  - **Vlakem z Prahy**: do Milovic (45 min, linky 070/072), pak 15 min pěšky

  - **Autem**: D10 z Prahy, výjezd Milovice (45 min), parkoviště zdarma

  - **Autobusem**: linka 432 z Prahy-Palmovky (60 min)


  **Doporučený program:**


  - 9:00: Odjezd z Prahy

  - 10:00: Příjezd, parkování, vstup do muzea

  - 10:30–12:30: **Hlavní expozice + fortifikační část**

  - 12:30–13:30: Oběd v kavárně muzea (nebo restauraci Milovice v obci)

  - 13:30–15:30: **Venkovní areál s tanky + zbraňová expozice**

  - 16:00: Odjezd, návrat do Prahy kolem 17:00


  **Pro rodiny s dětmi:**


  - Vstup volný pro předškoláky

  - Interaktivní prvky (děti si mohou sednout do tanku, sáhnout na výstrojní prvky)

  - Dětský koutek v hlavní budově

  - **Letní tábor** (červenec–srpen) s historickou tematikou


  **Speciální akce:**


  - **Květen** — Den armády ČR s ukázkami moderní techniky

  - **Srpen** — Historický den s rekonstrukcí bojů 1938 a 1945

  - **Září** — Sudetská krize s komentovanými prohlídkami

  - **Listopad** — Den veteránů


  **Doporučení:** Milovice jsou **ideální rodinný víkendový výlet z Prahy**. Kombinace rozsáhlé expozice, venkovního areálu,
  dostupnosti a přiměřeného vstupného z něj dělá jedno z nejoblíbenějších muzeí v ČR.'
