description: >
  Rozsáhlý muzejní areál v bývalém vojenském prostoru Milovice — nejdostupnější
  fortifikační expozice z Prahy (40 km). Jediná ucelená expozice čs. opevnění
  ve Středočeském kraji se třemi přesunutými originálními řopíky a kopií
  pěchotního srubu v měřítku 1:1. Ideální rodinný cíl z metropole.

