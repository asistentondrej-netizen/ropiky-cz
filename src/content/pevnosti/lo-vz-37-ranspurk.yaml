title: Řopík 8/2/A-140 — Ranšpurk (soutok Dyje a Moravy)
code: 8/2/A-140 Ranšpurk
type: lo-vz-37
line: B-4 Úvaly — Břeclav / soutok Dyje—Moravy
region: Jihomoravský kraj
location:
  lat: 48.6725
  lon: 16.9421
  address: NPR Ranšpurk, lužní les u soutoku Dyje a Moravy
built: '1938'
state: pristupny
description: Nejjihovýchodnější řopík celého Valticka — stojí v Národní přírodní rezervaci Ranšpurk u soutoku Dyje a Moravy, v nejníže položeném bodě Moravy.
history: |
  Objekt betonován v květnu 1938 jako krajní bod úseku B-4. Stavba byla technicky náročná — lužní terén vyžadoval hluboké piloty a zvláštní hydroizolaci.

  V září 1938 osazen, ale osádka musela řešit neustálou vlhkost — výdech větrání plesnivěl za dva dny. Po Mnichovu opuštěn.

  Za protektorátu Němci objekt sezonně zaplavili — sloužil jako pastvinová vodní nádrž pro dobytek (provizorní úprava). Po válce ponechán v klidu. Dnes součást NPR Ranšpurk — citlivá chráněná oblast.
visit: |
  Nejvzdálenější řopík jižní Moravy — kombinuje fortifikační zážitek s ornitologickou lokalitou (bílý čáp, orel mořský, stříbrný volavec).

  **Přístup:** volně v rámci NPR Ranšpurk, ale **respektujte pravidla rezervace** — nevstupujte mimo značené cesty.

  **Co uvidíte:** LO vz. 37 typ A-140 v lužním lese, částečně zatopený (v jarních měsících nepřístupný). Okolo rezervace s prastarými duby a ojedinělou faunou.

  **Doporučená délka:** 1 hodina (včetně přírody).

  **Dostupnost:** Z Břeclavi 12 km po cyklotrase „Soutok Dyje a Moravy". Autem pouze k parkovišti Lány (2 km pěšky).

  **Doporučeno kombinovat s:** NPR Ranšpurk (les), soutokem Dyje a Moravy (trojmezí ČR-SK-AT), cyklostezkou Břeclav–Hodonín.
