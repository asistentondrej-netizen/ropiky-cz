description: LO vz. 37 typ A-140, součást úsek 8 — Boří les / Lanžhot na jižní Moravě. Objekt leží v lužních lesích NPR Soutok u hranice se Slovenskem, jižně od Lanžhota — nejjižnější část jihomoravského opevnění. Dohledatelné v databázi ropiky.net (ID 1075726685) a v OSM.
history: |
  Betonován v roce 1938 jako součást jižní linie lehkého opevnění vz. 37 — úsek 8 — Boří les / Lanžhot. Dva kulomety ZB vz. 26, směrové střílny pro kosou palbu. III. třída odolnosti proti 150mm dělostřelectvu. Čelní stěna 80 cm, III. třída odolnosti (zesílený).

  V září 1938 zařazen do obranného plánu proti hrozbě útoku z rakouského území (po Anschlussu v březnu 1938). Během všeobecné mobilizace 23.–30. září 1938 obsazen pohotovostní jednotkou se základní výzbrojí.

  Po Mnichovské dohodě a záboru pohraničí opuštěn a předán Wehrmachtu. Němci využili část linie k testům protipevnostní munice; v letech 1939–40 odvezeny kovové prvky (dveře, mříže). Po válce objekt zůstal v krajině bez systematické péče.
visit: |
  **Přístup:** volně přístupný, 24/7.

  **Lokace:** Objekt leží v lužních lesích NPR Soutok u hranice se Slovenskem, jižně od Lanžhota — nejjižnější část jihomoravského opevnění. Autem nebo na kole z Lanžhota do NPR Soutok (5 km), dále lesní cestou.

  **Co uvidíte:** LO vz. 37 typ A-140, dvě boční střílny. Interiér pravděpodobně neprůchodný (vchod zabetonovaný nebo zborcený).

  **Doporučená délka:** 15–20 minut u objektu; jako součást většího výletu po linii 2–4 hodiny.

  **Doporučeno kombinovat s:** soutokem Dyje a Moravy, lužními lesy NPR Soutok, bunkry na slovenské straně.
