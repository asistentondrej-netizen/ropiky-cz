title: B-S 10 „Napoleon"
code: B-S 10
type: pechotni-srub
line: Bratislava-Petržalka
region: Slovensko
location:
  lat: 48.1145
  lon: 17.0887
  address: Bratislava-Petržalka, Kopčianska
built: '1937'
state: pristupny
description: Pěchotní srub „Napoleon" — s napoleonskými konotacemi na Dunaji. Pojmenován
  po bitvě u Wagramu (1809), kdy zde přepadl Dunaj francouzsko-rakouský konflikt.
history: 'B-S 10 byl dokončen v říjnu 1937 jako součást jižní obranné linie Bratislavy.
  Oboustranný srub II. odolnosti s charakteristickým pancéřovým zvonem.


  Pojmenování je odkazem na období napoleonských válek — v těchto místech tábořila
  francouzská a rakouská vojska v roce 1809. V roce 1939 srub připadl maďarské správě
  (Petržalka byla připojena k Maďarsku). Po roce 1945 vrácen ČSR, po rozdělení federace
  SR.

  '
visit: 'Jeden z několika volně přístupných srubů bratislavské linie — s historickou
  přezdívkou po napoleonském období.


  **Přístup:** volně 24/7, zdarma.


  **Co uvidíte:** dobře zachovalý pěchotní srub — pancéřové zvony, střílny, stopy
  překážek. V blízkosti jsou zbytky historických palebných postavení z 19. století
  (napoleonské polní opevnění).


  **Doporučená délka:** 20 minut.


  **Dostupnost:** MHD autobus č. 91 (zastávka Kopčianska). Autem parkování u Kopčianske
  ulice.


  **Doporučeno kombinovat s:** procházkou podél Dunaje s pohledem do Rakouska, ostatními
  petržalskými sruby (B-S 1 až B-S 13), Bratislavským hradem. Krásný kontrast historických
  a moderních fortifikací.

  '
sources:
- 'Martin Slezák: Bratislavské opevnení 1938'
