title: Řopík 8/7/A-160 — Charvátská Nová Ves
code: 8/7/A-160 Charvátská NV
type: lo-vz-37
line: B-4 Úvaly — Břeclav
region: Jihomoravský kraj
location:
  lat: 48.7685
  lon: 16.8553
  address: Charvátská Nová Ves, břeh Dyje severně od obce
built: '1937'
state: pristupny
description: Řopík na břehu Dyje chránící přechod mezi Lednicí a Břeclaví. Dostupný
  po cyklotrase podél řeky, dobrá zastávka mezi hlavními památkami LVA.
history: 'Betonován v srpnu 1937 jako součást obranné linie na levém břehu Dyje. Kombinoval
  palebnou činnost s řopíkem na druhém břehu.


  V září 1938 osazen. Po Mnichovu opuštěn. Za války sloužil jako polní sklad pro Wehrmacht.


  V 70. letech prohlášen technickou památkou místního významu — zachráněn před demolicí.
  Vyčištěn v roce 1998, dnes s informační cedulí Jihomoravského kraje.

  '
visit: 'Klasický říční řopík — dobrá ukázka, jak linie kopírovala přirozené překážky.


  **Přístup:** volně, 24/7. Na cyklotrase podél Dyje, značené.


  **Co uvidíte:** LO vz. 37 typ A-160. Dochované střílny, ochranný zdvih u vchodu,
  drobné exteriérové detaily. Informační cedule s dobovými fotografiemi.


  **Doporučená délka:** 15–20 minut.


  **Dostupnost:** Z Břeclavi 4 km po cyklotrase, z Lednice 5 km. Autem obtížné (jen
  polní cesta).


  **Doporučeno kombinovat s:** cyklotrasou Břeclav-Lednice, UNESCO areálem, dalšími
  řopíky u Janohradu a v Poštorné.

  '
