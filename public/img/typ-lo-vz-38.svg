<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="LO vz. 38 — Turecká věž, schéma">
  <rect width="200" height="140" fill="#F1ECE0"/>
  <!-- země -->
  <path d="M 0 115 L 200 115 L 200 140 L 0 140 Z" fill="#5C6B3A" opacity="0.35"/>

  <!-- 360° kruh pokrytí — jen prstenec, bez výplně -->
  <circle cx="100" cy="70" r="48" fill="none" stroke="#7A3B2E" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.55"/>

  <!-- kruhový objekt — tělo -->
  <circle cx="100" cy="70" r="28" fill="#8B7D62" stroke="#1A1612" stroke-width="1.5"/>
  <!-- horní pás -->
  <path d="M 72 70 A 28 28 0 0 1 128 70 Z" fill="#7A6E55"/>

  <!-- boční střílna (pomocný LK) -->
  <rect x="125" y="67" width="8" height="6" rx="1" fill="#1A1612"/>

  <!-- pancéřová věž uprostřed — elipsa -->
  <ellipse cx="100" cy="70" rx="16" ry="10" fill="#5E5646" stroke="#1A1612" stroke-width="1.2"/>

  <!-- dvě hlavně TK ve věži -->
  <rect x="94" y="53" width="4" height="14" fill="#1A1612" transform="rotate(-12 96 60)"/>
  <rect x="102" y="53" width="4" height="14" fill="#1A1612" transform="rotate(12 104 60)"/>

  <!-- rotační šipky kolem věže -->
  <g opacity="0.65" stroke="#7A3B2E" stroke-width="1" fill="none">
    <path d="M 100 55 A 18 18 0 0 1 118 72" stroke-dasharray="2 2"/>
    <path d="M 100 85 A 18 18 0 0 1 82 68" stroke-dasharray="2 2"/>
  </g>
  <polygon points="116,68 120,72 118,75" fill="#7A3B2E" opacity="0.65"/>
  <polygon points="84,72 80,68 82,65" fill="#7A3B2E" opacity="0.65"/>

  <!-- 4 šipky palby (reprezentace 360°) -->
  <g opacity="0.55" stroke="#7A3B2E" stroke-width="1" stroke-dasharray="3 3" fill="#7A3B2E">
    <line x1="100" y1="42" x2="100" y2="22"/>
    <polygon points="97,26 100,18 103,26"/>

    <line x1="137" y1="70" x2="157" y2="70"/>
    <polygon points="153,67 160,70 153,73"/>

    <line x1="100" y1="98" x2="100" y2="112"/>
    <polygon points="97,108 100,114 103,108"/>

    <line x1="63" y1="70" x2="43" y2="70"/>
    <polygon points="47,67 40,70 47,73"/>
  </g>

  <!-- patina -->
  <path d="M 78 82 Q 80 92 76 100" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 122 82 Q 124 92 120 100" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>

  <text x="100" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A1612" opacity="0.6">vz. 38 — otočná věž, 360°</text>
</svg>
