<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="Pancéřová pozorovací kopule — schéma">
  <rect width="200" height="140" fill="#F1ECE0"/>
  <!-- země -->
  <path d="M 0 115 L 200 115 L 200 140 L 0 140 Z" fill="#5C6B3A" opacity="0.35"/>

  <!-- ŽB srub (spodní část) -->
  <g transform="translate(45 70)">
    <rect x="0" y="0" width="110" height="45" fill="#8B7D62" stroke="#1A1612" stroke-width="1.5"/>
    <path d="M 0 0 L 110 0 L 110 10 L 0 10 Z" fill="#7A6E55"/>
    <!-- šachta uvnitř (tečkovaně) -->
    <rect x="48" y="12" width="14" height="33" fill="none" stroke="#1A1612" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.55"/>
  </g>

  <!-- ložiskový prstenec (otočný mechanismus) v ŽB stropu -->
  <rect x="72" y="60" width="56" height="12" fill="#5E5646" stroke="#1A1612" stroke-width="1"/>
  <!-- kuličky ložiska -->
  <g fill="#3A342A" opacity="0.75">
    <circle cx="78" cy="66" r="1.2"/>
    <circle cx="86" cy="66" r="1.2"/>
    <circle cx="94" cy="66" r="1.2"/>
    <circle cx="102" cy="66" r="1.2"/>
    <circle cx="110" cy="66" r="1.2"/>
    <circle cx="118" cy="66" r="1.2"/>
    <circle cx="122" cy="66" r="1.2"/>
  </g>

  <!-- pancéřová kopule — vyšší, plnější dóm -->
  <path d="M 74 66 Q 74 26 100 22 Q 126 26 126 66 Z" fill="#5E5646" stroke="#1A1612" stroke-width="1.5"/>
  <!-- horní lesk -->
  <path d="M 82 56 Q 100 32 118 56" fill="none" stroke="#8A7F65" stroke-width="1" opacity="0.55"/>

  <!-- 5 pozorovacích štěrbin po obvodu (360° pokrytí) -->
  <rect x="75" y="54" width="6" height="4" rx="1" fill="#1A1612"/>
  <rect x="88" y="42" width="6" height="4" rx="1" fill="#1A1612"/>
  <rect x="97" y="36" width="6" height="4" rx="1" fill="#1A1612"/>
  <rect x="106" y="42" width="6" height="4" rx="1" fill="#1A1612"/>
  <rect x="119" y="54" width="6" height="4" rx="1" fill="#1A1612"/>

  <!-- periskop na vrcholu -->
  <rect x="98" y="14" width="4" height="10" fill="#3A342A" stroke="#1A1612" stroke-width="0.6"/>
  <rect x="96" y="12" width="8" height="3" fill="#3A342A" stroke="#1A1612" stroke-width="0.6"/>

  <!-- rotační šipka kolem kopule (symbol otáčení 360°) -->
  <g fill="none" stroke="#7A3B2E" stroke-width="1.2" opacity="0.7">
    <path d="M 60 68 Q 60 48 76 40" stroke-dasharray="3 2"/>
    <polygon points="73,36 78,40 73,43" fill="#7A3B2E" stroke="none"/>
    <path d="M 140 68 Q 140 48 124 40" stroke-dasharray="3 2"/>
    <polygon points="127,36 122,40 127,43" fill="#7A3B2E" stroke="none"/>
  </g>

  <!-- patina -->
  <path d="M 84 52 Q 86 60 82 66" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 116 52 Q 118 60 114 66" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>

  <text x="100" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A1612" opacity="0.6">kopule — otočná, 360°</text>
</svg>
