<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="Izolovaný těžký objekt — schéma">
  <rect width="200" height="140" fill="#F1ECE0"/>
  <!-- země -->
  <path d="M 0 115 L 200 115 L 200 140 L 0 140 Z" fill="#5C6B3A" opacity="0.35"/>

  <!-- dashed okruh "samostatnosti" -->
  <ellipse cx="100" cy="75" rx="80" ry="38" fill="none" stroke="#7A3B2E" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.35"/>

  <!-- samostatný mohutný srub (větší než běžný) -->
  <g transform="translate(25 30)">
    <!-- tělo -->
    <path d="M 0 45 L 22 10 L 128 10 L 150 45 L 150 85 L 0 85 Z" fill="#8B7D62" stroke="#1A1612" stroke-width="1.5"/>
    <!-- horní pás -->
    <path d="M 0 45 L 22 10 L 128 10 L 150 45 L 150 56 L 0 56 Z" fill="#7A6E55"/>

    <!-- tři pancéřové zvony nahoře (větší osádka, víc zvonů) -->
    <ellipse cx="40" cy="10" rx="11" ry="4" fill="#5E5646" stroke="#1A1612" stroke-width="1"/>
    <rect x="37" y="4" width="6" height="6" rx="1" fill="#1A1612"/>

    <ellipse cx="75" cy="7" rx="13" ry="5" fill="#5E5646" stroke="#1A1612" stroke-width="1"/>
    <rect x="72" y="1" width="6" height="6" rx="1" fill="#1A1612"/>

    <ellipse cx="110" cy="10" rx="11" ry="4" fill="#5E5646" stroke="#1A1612" stroke-width="1"/>
    <rect x="107" y="4" width="6" height="6" rx="1" fill="#1A1612"/>

    <!-- 4 boční střílny (dvoukřídlý, 2× TK) -->
    <rect x="10" y="62" width="22" height="8" rx="1" fill="#1A1612"/>
    <rect x="40" y="62" width="22" height="8" rx="1" fill="#1A1612"/>
    <rect x="88" y="62" width="22" height="8" rx="1" fill="#1A1612"/>
    <rect x="118" y="62" width="22" height="8" rx="1" fill="#1A1612"/>

    <!-- patina -->
    <path d="M 22 70 Q 25 80 20 85" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M 128 70 Q 130 80 125 85" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- palebné linie (4 směry — oboustranná palba) -->
  <g opacity="0.5" stroke="#7A3B2E" stroke-width="1" stroke-dasharray="3 3" fill="#7A3B2E">
    <line x1="35" y1="100" x2="10" y2="115"/>
    <line x1="165" y1="100" x2="190" y2="115"/>
    <line x1="85" y1="42" x2="75" y2="18"/>
    <line x1="115" y1="42" x2="125" y2="18"/>
  </g>

  <text x="100" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A1612" opacity="0.6">izolovaný TO — samostatná obrana</text>
</svg>
