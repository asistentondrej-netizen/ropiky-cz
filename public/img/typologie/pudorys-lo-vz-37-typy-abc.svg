<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Georgia, serif" font-size="12">
  <style>
    .bg { fill: #F4EFE6; }
    .wall { fill: #8B5A3C; stroke: #3E2A1F; stroke-width: 1.5; }
    .inner { fill: #F4EFE6; stroke: #8B5A3C; stroke-width: 1; }
    .streilna { fill: #3E2A1F; }
    .label { fill: #2A2522; font-size: 10px; }
    .title { fill: #3E2A1F; font-size: 14px; font-weight: bold; }
    .typetitle { fill: #7A3B2E; font-size: 13px; font-weight: bold; }
    .dim { fill: #5A6B4F; font-size: 10px; font-style: italic; }
    .arrow { stroke: #7A3B2E; stroke-width: 1.3; fill: none; marker-end: url(#ar2); }
  </style>
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7A3B2E"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="400"/>
  <text class="title" x="20" y="28">Srovnání typů A, B, C — LO vz. 37</text>
  <text class="dim" x="20" y="45">Schematické půdorysy tří hlavních variant řopíku</text>

  <!-- TYP A — dvě boční střílny -->
  <text class="typetitle" x="80" y="85">Typ A (~85 %)</text>
  <text class="label" x="80" y="100">2 boční střílny, posádka 7 mužů</text>
  <polygon class="wall" points="60,120 240,120 225,250 75,250"/>
  <polygon class="inner" points="80,140 220,140 210,232 90,232"/>
  <rect class="streilna" x="60" y="170" width="6" height="14"/>
  <rect class="streilna" x="234" y="170" width="6" height="14"/>
  <path class="arrow" d="M 60 177 L 20 155"/>
  <path class="arrow" d="M 60 177 L 20 200"/>
  <path class="arrow" d="M 240 177 L 280 155"/>
  <path class="arrow" d="M 240 177 L 280 200"/>
  <rect class="wall" x="140" y="250" width="20" height="15"/>
  <text class="label" x="145" y="262" fill="#F4EFE6" font-size="8">V</text>
  <text class="dim" x="85" y="282">vchod</text>

  <!-- TYP B — jedna boční + jedna čelní -->
  <text class="typetitle" x="390" y="85">Typ B</text>
  <text class="label" x="390" y="100">1 boční + 1 čelní střílna, 7 mužů</text>
  <polygon class="wall" points="360,120 540,120 525,250 375,250"/>
  <polygon class="inner" points="380,140 520,140 510,232 390,232"/>
  <rect class="streilna" x="360" y="170" width="6" height="14"/>
  <rect class="streilna" x="440" y="120" width="16" height="6"/>
  <path class="arrow" d="M 360 177 L 320 155"/>
  <path class="arrow" d="M 360 177 L 320 200"/>
  <path class="arrow" d="M 448 120 L 430 80"/>
  <path class="arrow" d="M 448 120 L 470 80"/>
  <rect class="wall" x="440" y="250" width="20" height="15"/>
  <text class="dim" x="385" y="282">strana B1 / B2 variuje</text>

  <!-- TYP C — jediná čelní střílna -->
  <text class="typetitle" x="700" y="85">Typ C</text>
  <text class="label" x="700" y="100">1 čelní střílna, posádka 4 muži</text>
  <polygon class="wall" points="680,140 820,140 810,240 690,240"/>
  <polygon class="inner" points="695,155 805,155 798,225 702,225"/>
  <rect class="streilna" x="740" y="140" width="16" height="6"/>
  <path class="arrow" d="M 748 140 L 735 100"/>
  <path class="arrow" d="M 748 140 L 770 100"/>
  <rect class="wall" x="740" y="240" width="18" height="15"/>
  <text class="dim" x="700" y="272">nejmenší typ, doplňkový</text>

  <!-- Vysvětlivky -->
  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="18" height="12" class="wall"/>
    <text class="label" x="24" y="10">stěna ŽB</text>
    <rect x="110" y="0" width="18" height="12" fill="#F4EFE6" stroke="#8B5A3C"/>
    <text class="label" x="134" y="10">vnitřní prostor</text>
    <rect x="250" y="0" width="10" height="12" class="streilna"/>
    <text class="label" x="266" y="10">střílna</text>
    <line x1="340" y1="6" x2="360" y2="6" stroke="#7A3B2E" marker-end="url(#ar2)"/>
    <text class="label" x="366" y="10">palebný směr</text>
    <text class="dim" x="480" y="10">Pozn.: schematické znázornění bez detailu pancéřování a zvonu</text>
  </g>
</svg>
