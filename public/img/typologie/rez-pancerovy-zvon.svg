<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif" font-size="12">
  <style>
    .bg { fill: #F4EFE6; }
    .sky { fill: #EDE5D4; }
    .terrain { fill: #D9D0BE; stroke: #8B7355; }
    .concrete { fill: #5A4632; stroke: #2A2522; stroke-width: 1.5; }
    .armor { fill: #2A2522; stroke: #000; stroke-width: 1.2; }
    .armor-light { fill: #4A3A2C; stroke: #1A1510; stroke-width: 1.2; }
    .inner { fill: #F4EFE6; stroke: #5A4632; stroke-width: 1; }
    .weld { fill: #8B5A3C; stroke: #2A2522; stroke-width: 0.8; }
    .label { fill: #2A2522; font-size: 11px; }
    .callout { fill: #7A3B2E; font-size: 11px; font-weight: bold; }
    .title { fill: #3E2A1F; font-size: 16px; font-weight: bold; }
    .subtitle { fill: #3E2A1F; font-size: 12px; font-weight: bold; }
    .dim { fill: #5A6B4F; font-size: 10px; font-style: italic; }
    .lead { stroke: #5A6B4F; stroke-width: 0.8; fill: none; }
    .line { stroke: #7A3B2E; stroke-width: 1; fill: none; stroke-dasharray: 2,3; }
  </style>

  <rect class="bg" width="800" height="500"/>
  <text class="title" x="20" y="28">Pancéřový zvon — anatomie v řezu</text>
  <text class="dim" x="20" y="46">Typický palebný zvon (SBM) na pěchotním srubu · hmotnost 45–70 t · pancéř 20–30 cm</text>

  <!-- Nebe -->
  <rect class="sky" x="0" y="60" width="800" height="160"/>
  <!-- Terén -->
  <path class="terrain" d="M 0 220 L 250 220 Q 320 215 340 215 L 440 215 Q 460 215 530 220 L 800 220 L 800 500 L 0 500 Z"/>

  <!-- Betonový srub pod terénem -->
  <rect class="concrete" x="250" y="220" width="280" height="260"/>
  <!-- vnitřní vydutá kopule/šachta -->
  <path class="inner" d="M 270 240 L 510 240 L 510 460 L 270 460 Z"/>

  <!-- Šachta pod zvonem -->
  <rect class="inner" x="340" y="240" width="100" height="120" stroke="#8B5A3C"/>
  <text class="label" x="355" y="285">Přístupová</text>
  <text class="label" x="368" y="300">šachta</text>
  <text class="label" x="360" y="315">(žebřík)</text>

  <!-- Zvon – spodní "límec" zapuštěný do stropu srubu -->
  <rect class="weld" x="310" y="205" width="160" height="20"/>

  <!-- Zvon – tělo (polokopule) -->
  <path class="armor" d="M 310 215 Q 390 110 470 215 Z"/>
  <!-- vnitřek zvonu -->
  <path class="inner" d="M 335 215 Q 390 140 445 215 Z"/>

  <!-- Tloušťka pancíře – naznačení u paty -->
  <path d="M 310 215 Q 335 180 335 215 Z" fill="#6B5640" stroke="#2A2522"/>
  <path d="M 470 215 Q 445 180 445 215 Z" fill="#6B5640" stroke="#2A2522"/>

  <!-- Střílny – 3 ks kolem pláště -->
  <rect class="armor-light" x="308" y="160" width="14" height="12"/>
  <rect class="armor-light" x="383" y="125" width="14" height="12"/>
  <rect class="armor-light" x="458" y="160" width="14" height="12"/>

  <!-- Palebné linie -->
  <line class="line" x1="308" y1="166" x2="220" y2="155"/>
  <line class="line" x1="390" y1="125" x2="390" y2="70"/>
  <line class="line" x1="472" y1="166" x2="560" y2="155"/>

  <!-- Kulomet vz. 37 na lafetě uvnitř zvonu – schematicky -->
  <rect class="armor-light" x="380" y="175" width="20" height="8"/>
  <circle cx="390" cy="200" r="6" fill="#8B5A3C" stroke="#2A2522"/>
  <text class="label" x="360" y="220">TK vz. 37</text>

  <!-- Vojenská obsluha – silueta -->
  <circle cx="390" cy="260" r="8" fill="#5A6B4F"/>
  <rect x="383" y="268" width="14" height="22" fill="#5A6B4F"/>
  <text class="label" x="405" y="278">střelec</text>

  <!-- Kóty -->
  <!-- Výška zvonu -->
  <line x1="210" y1="115" x2="210" y2="215" stroke="#5A6B4F" stroke-width="0.6"/>
  <line x1="205" y1="115" x2="215" y2="115" stroke="#5A6B4F" stroke-width="0.6"/>
  <line x1="205" y1="215" x2="215" y2="215" stroke="#5A6B4F" stroke-width="0.6"/>
  <text class="dim" x="135" y="168">výška ~1,0 m</text>

  <!-- Průměr -->
  <line x1="310" y1="490" x2="470" y2="490" stroke="#5A6B4F" stroke-width="0.6"/>
  <line x1="310" y1="486" x2="310" y2="494" stroke="#5A6B4F" stroke-width="0.6"/>
  <line x1="470" y1="486" x2="470" y2="494" stroke="#5A6B4F" stroke-width="0.6"/>
  <text class="dim" x="355" y="480">Ø 1,80–2,20 m</text>

  <!-- Popisové šipky vpravo -->
  <g transform="translate(560, 110)">
    <text class="subtitle" x="0" y="0">Prvky pancéřového zvonu:</text>

    <line class="lead" x1="0" y1="20" x2="-180" y2="30"/>
    <text class="label" x="0" y="24">1 · lité pancéřové tělo (Škoda / Vítkovice)</text>

    <line class="lead" x1="0" y1="48" x2="-170" y2="78"/>
    <text class="label" x="0" y="52">2 · svařený límec do ŽB stropu (1,5 m)</text>

    <line class="lead" x1="0" y1="76" x2="-200" y2="105"/>
    <text class="label" x="0" y="80">3 · střílna (3–6 ks, radiálně)</text>

    <line class="lead" x1="0" y1="104" x2="-190" y2="130"/>
    <text class="label" x="0" y="108">4 · vnitřní výzbroj (TK vz. 37 / LK)</text>

    <line class="lead" x1="0" y1="132" x2="-215" y2="200"/>
    <text class="label" x="0" y="136">5 · přístupová šachta se žebříkem</text>

    <line class="lead" x1="0" y1="160" x2="-220" y2="250"/>
    <text class="label" x="0" y="164">6 · obsluha (1–2 muži)</text>
  </g>

  <!-- Druhy zvonů -->
  <g transform="translate(560, 330)">
    <text class="subtitle" x="0" y="0">Druhy zvonů:</text>
    <text class="label" x="0" y="20">SBM · palebný (standardní)</text>
    <text class="label" x="0" y="36">SBO · pozorovací (bez TK)</text>
    <text class="label" x="0" y="52">SBK · pomocný palebný</text>
    <text class="label" x="0" y="68">dělostř. kopule · na tvrzích</text>
    <text class="dim" x="0" y="90">Hmotnost 45–70 t dle stupně</text>
  </g>
</svg>
