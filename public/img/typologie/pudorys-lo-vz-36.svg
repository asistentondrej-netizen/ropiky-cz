<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Georgia, serif" font-size="12">
  <style>
    .bg { fill: #F4EFE6; }
    .wall { fill: #7A3B2E; stroke: #3E2A1F; stroke-width: 1.5; }
    .inner { fill: #F4EFE6; stroke: #8B5A3C; stroke-width: 1; }
    .streilna { fill: #3E2A1F; }
    .label { fill: #2A2522; font-size: 11px; }
    .title { fill: #3E2A1F; font-size: 16px; font-weight: bold; }
    .dim { fill: #5A6B4F; font-size: 10px; font-style: italic; }
    .typetitle { fill: #7A3B2E; font-size: 13px; font-weight: bold; }
    .arrow { stroke: #7A3B2E; stroke-width: 1.3; fill: none; marker-end: url(#ar3); }
    .compare { fill: #E8DDC7; }
  </style>
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7A3B2E"/>
    </marker>
  </defs>

  <rect class="bg" width="700" height="380"/>
  <text class="title" x="20" y="28">LO vz. 36 — čelná palba</text>
  <text class="dim" x="20" y="46">Taktický předchůdce řopíku — střílny orientované ČELNĚ k nepříteli (zranitelnější)</text>

  <!-- TYP A (dvě čelní střílny) -->
  <text class="typetitle" x="90" y="80">Typ A (~70 %)</text>
  <text class="label" x="90" y="96">2 čelní střílny, posádka 4 muži</text>
  <rect class="wall" x="80" y="120" width="160" height="120"/>
  <rect class="inner" x="95" y="140" width="130" height="85"/>
  <rect class="streilna" x="110" y="120" width="16" height="6"/>
  <rect class="streilna" x="194" y="120" width="16" height="6"/>
  <path class="arrow" d="M 118 120 L 100 70"/>
  <path class="arrow" d="M 118 120 L 135 70"/>
  <path class="arrow" d="M 202 120 L 185 70"/>
  <path class="arrow" d="M 202 120 L 220 70"/>
  <rect class="wall" x="145" y="240" width="30" height="18"/>
  <text class="label" x="145" y="275">vchod (vzadu)</text>
  <text class="dim" x="90" y="295">stěny 50 cm / strop 60 cm (stupeň I)</text>
  <text class="dim" x="90" y="310">typ B: 60 cm / 80 cm (stupeň II)</text>

  <!-- TYP B (boční + čelní) -->
  <text class="typetitle" x="410" y="80">Typ B</text>
  <text class="label" x="410" y="96">1 čelní + 1 boční, 4 muži</text>
  <rect class="wall" x="400" y="120" width="160" height="120"/>
  <rect class="inner" x="415" y="140" width="130" height="85"/>
  <rect class="streilna" x="460" y="120" width="16" height="6"/>
  <rect class="streilna" x="400" y="160" width="6" height="14"/>
  <path class="arrow" d="M 468 120 L 450 70"/>
  <path class="arrow" d="M 468 120 L 485 70"/>
  <path class="arrow" d="M 400 167 L 360 150"/>
  <path class="arrow" d="M 400 167 L 360 185"/>
  <rect class="wall" x="465" y="240" width="30" height="18"/>

  <!-- POROVNÁNÍ — text dole -->
  <g transform="translate(20, 340)">
    <text class="title" x="0" y="10" font-size="12">Proč byl vzor 36 nahrazen?</text>
    <text class="label" x="180" y="10">Čelná palba = menší palebné pole, snadnější zaměření děly, vyšší zranitelnost.</text>
    <text class="label" x="180" y="22">Vzor 37 zavedl boční palbu — zásadní taktická změna.</text>
  </g>
</svg>
