<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif" font-size="12">
  <style>
    .bg { fill: #F4EFE6; }
    .wall { fill: #5A4632; stroke: #2A2522; stroke-width: 2; }
    .inner { fill: #F4EFE6; stroke: #5A4632; stroke-width: 1; }
    .room { fill: #F4EFE6; stroke: #8B5A3C; stroke-width: 0.8; }
    .streilna { fill: #2A2522; }
    .zvon { fill: #4A3A2C; stroke: #2A2522; stroke-width: 1; }
    .label { fill: #2A2522; font-size: 11px; }
    .roomlabel { fill: #3E2A1F; font-size: 9.5px; }
    .title { fill: #3E2A1F; font-size: 16px; font-weight: bold; }
    .dim { fill: #5A6B4F; font-size: 10px; font-style: italic; }
    .arrow { stroke: #7A3B2E; stroke-width: 1.5; fill: none; marker-end: url(#ar4); }
  </style>
  <defs>
    <marker id="ar4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7A3B2E"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M-1,1 l2,-2 M0,6 l6,-6 M5,7 l2,-2" stroke="#5A4632" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect class="bg" width="800" height="500"/>
  <text class="title" x="20" y="28">Pěchotní srub — oboustranný typ B (II. stupeň odolnosti)</text>
  <text class="dim" x="20" y="46">Schematický půdorys patrového objektu — bojové patro v úrovni terénu, ubikace v podzemí</text>
  <text class="dim" x="20" y="62">Posádka 32 mužů · stěny 1,50 m · strop 1,50 m · 2 pancéřové zvony, 1 dělostřelecký kopule</text>

  <!-- Tělo srubu (oboustranný — křídla po stranách) -->
  <polygon class="wall" points="80,100 240,100 280,180 280,320 240,400 80,400 50,320 50,180"/>
  <!-- Vnitřní prostor -->
  <polygon class="inner" points="100,120 220,120 250,180 250,320 220,380 100,380 70,320 70,180"/>

  <!-- Pravé křídlo (s lafetami pro dvojče těžkých kulometů) -->
  <polygon class="wall" points="280,180 480,180 480,320 280,320"/>
  <polygon class="inner" points="295,200 465,200 465,300 295,300"/>
  <rect class="room" x="310" y="215" width="140" height="70"/>
  <text class="roomlabel" x="335" y="245">Střelecká</text>
  <text class="roomlabel" x="335" y="258">místnost</text>
  <text class="roomlabel" x="335" y="271">(pravá)</text>
  <text class="roomlabel" x="335" y="284">2× TK + PT kanón</text>

  <!-- Levé křídlo -->
  <polygon class="wall" points="-80,180 50,180 50,320 -80,320"/>
  <!-- (zkrácený obrys vlevo, zde stačí pravostranná část pro znázornění) -->
  <text class="dim" x="20" y="250">←</text>
  <text class="dim" x="20" y="270">levé</text>
  <text class="dim" x="20" y="285">křídlo</text>
  <text class="dim" x="20" y="300">(zrcadlově)</text>

  <!-- Střílny pravého křídla -->
  <rect class="streilna" x="478" y="220" width="8" height="20"/>
  <rect class="streilna" x="478" y="260" width="8" height="20"/>
  <path class="arrow" d="M 486 230 L 540 200"/>
  <path class="arrow" d="M 486 230 L 540 240"/>
  <path class="arrow" d="M 486 270 L 540 250"/>
  <path class="arrow" d="M 486 270 L 540 290"/>

  <!-- Centrální blok — chodba, schodiště, šachta zvonu -->
  <rect class="room" x="120" y="210" width="100" height="40"/>
  <text class="roomlabel" x="130" y="235">Centrální chodba</text>

  <rect class="room" x="120" y="260" width="100" height="40"/>
  <text class="roomlabel" x="130" y="285">Šachta výtahu / schodiště</text>

  <rect class="room" x="120" y="310" width="100" height="40"/>
  <text class="roomlabel" x="130" y="335">Strojovna (dieselagregát)</text>

  <!-- Pancéřové zvony (kruhy) -->
  <circle class="zvon" cx="160" cy="140" r="22"/>
  <text class="roomlabel" x="142" y="145" fill="#F4EFE6">Pozor.</text>
  <text class="roomlabel" x="142" y="158" fill="#F4EFE6">zvon</text>

  <circle class="zvon" cx="160" cy="370" r="22"/>
  <text class="roomlabel" x="142" y="373" fill="#F4EFE6">Pozor.</text>
  <text class="roomlabel" x="142" y="386" fill="#F4EFE6">zvon</text>

  <!-- Dělostřelecká kopule -->
  <circle class="zvon" cx="380" cy="250" r="30"/>
  <text class="roomlabel" x="358" y="248" fill="#F4EFE6">Dělostř.</text>
  <text class="roomlabel" x="358" y="261" fill="#F4EFE6">kopule</text>

  <!-- Vstup -->
  <rect class="wall" x="155" y="395" width="35" height="20"/>
  <text class="label" x="155" y="430">Vstupní portál</text>

  <!-- Vysvětlivky -->
  <g transform="translate(560, 100)">
    <text class="title" x="0" y="0" font-size="13">Hlavní prvky:</text>
    <circle cx="10" cy="20" r="8" class="zvon"/>
    <text class="label" x="28" y="24">pancéřový zvon (až 70 t)</text>
    <rect x="2" y="38" width="16" height="14" class="wall"/>
    <text class="label" x="28" y="50">ŽB stěna 1,50–3,5 m</text>
    <rect x="6" y="60" width="8" height="14" class="streilna"/>
    <text class="label" x="28" y="72">střílna v lafetě</text>
    <line x1="2" y1="92" x2="20" y2="92" stroke="#7A3B2E" marker-end="url(#ar4)"/>
    <text class="label" x="28" y="96">palebný směr (boční)</text>
  </g>

  <g transform="translate(560, 230)">
    <text class="title" x="0" y="0" font-size="13">Stupně odolnosti:</text>
    <text class="label" x="0" y="20">I. — 1,25 m / 1,00 m</text>
    <text class="label" x="0" y="38">II. — 1,50 m / 1,50 m</text>
    <text class="label" x="0" y="56">III. — 2,25 m / 2,25 m</text>
    <text class="label" x="0" y="74">IV. — 3,50 m / 3,50 m</text>
    <text class="dim" x="0" y="98">(stěny / strop)</text>
  </g>

  <g transform="translate(560, 360)">
    <text class="title" x="0" y="0" font-size="13">Výzbroj typu:</text>
    <text class="label" x="0" y="20">2× těžký kulomet vz. 37</text>
    <text class="label" x="0" y="38">1× protitankový kanón vz. 36 (4 cm)</text>
    <text class="label" x="0" y="56">1× minomet vz. 38 (9 cm)</text>
    <text class="label" x="0" y="74">2× lehký kulomet vz. 26</text>
  </g>
</svg>
