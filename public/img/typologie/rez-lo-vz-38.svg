<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Georgia, serif" font-size="12">
  <style>
    .bg { fill: #F4EFE6; }
    .sky { fill: #EDE5D4; }
    .terrain { fill: #D9D0BE; stroke: #8B7355; }
    .wall { fill: #5A4632; stroke: #2A2522; stroke-width: 1.5; }
    .inner { fill: #F4EFE6; stroke: #5A4632; stroke-width: 1; }
    .turret { fill: #4A3A2C; stroke: #1A1510; stroke-width: 2; }
    .mechanism { fill: #8B7355; stroke: #2A2522; stroke-width: 1; }
    .armor { fill: #2A2522; stroke: #000; stroke-width: 1; }
    .label { fill: #2A2522; font-size: 11px; }
    .whitelabel { fill: #F4EFE6; font-size: 10px; font-weight: bold; }
    .title { fill: #3E2A1F; font-size: 16px; font-weight: bold; }
    .callout { fill: #7A3B2E; font-size: 11px; font-weight: bold; }
    .dim { fill: #5A6B4F; font-size: 10px; font-style: italic; }
    .line { stroke: #7A3B2E; stroke-width: 1; fill: none; }
    .lead { stroke: #5A6B4F; stroke-width: 0.8; fill: none; }
  </style>

  <rect class="bg" width="800" height="460"/>
  <text class="title" x="20" y="28">LO vz. 38 — svislý řez objektem</text>
  <text class="dim" x="20" y="46">Pohled zboku · otočná pancéřová věž · ubikace pod bojovým patrem · celková výška 4,5 m</text>

  <!-- Nebe -->
  <rect class="sky" x="0" y="60" width="800" height="180"/>

  <!-- Terén -->
  <path class="terrain" d="M 0 240 L 180 240 Q 240 220 290 218 L 490 218 Q 540 220 600 240 L 800 240 L 800 460 L 0 460 Z"/>

  <!-- Věž (nad terénem) -->
  <rect class="turret" x="325" y="150" width="130" height="70"/>
  <!-- Plochá "čapka" věže -->
  <path class="turret" d="M 320 150 Q 390 120 460 150 Z"/>
  <text class="whitelabel" x="355" y="195">Pancéř. věž</text>

  <!-- Dvě hlavně kulometů -->
  <rect class="armor" x="300" y="172" width="30" height="8"/>
  <rect class="armor" x="450" y="172" width="30" height="8"/>
  <line class="line" x1="300" y1="176" x2="250" y2="176"/>
  <line class="line" x1="480" y1="176" x2="530" y2="176"/>

  <!-- Hlavní těleso objektu – bojové patro (na úrovni terénu) -->
  <rect class="wall" x="260" y="218" width="260" height="90"/>
  <rect class="inner" x="282" y="234" width="216" height="70"/>

  <!-- Hřídel věže / rotační mechanismus -->
  <rect class="mechanism" x="370" y="218" width="40" height="40"/>
  <circle class="mechanism" cx="390" cy="260" r="18"/>
  <line x1="372" y1="260" x2="408" y2="260" stroke="#2A2522"/>
  <line x1="390" y1="242" x2="390" y2="278" stroke="#2A2522"/>

  <!-- Ubikace (podpatro) -->
  <rect class="wall" x="260" y="308" width="260" height="90"/>
  <rect class="inner" x="282" y="318" width="216" height="72"/>
  <text class="label" x="330" y="355">Ubikace (5 mužů)</text>
  <text class="label" x="330" y="370">+ filtroventilace + sklad</text>

  <!-- Boční střílna (LK vz. 26) -->
  <rect class="armor" x="520" y="252" width="10" height="18"/>
  <line class="line" x1="530" y1="261" x2="600" y2="245"/>
  <line class="line" x1="530" y1="261" x2="600" y2="277"/>

  <!-- Vstup -->
  <rect class="wall" x="255" y="330" width="20" height="35"/>
  <rect class="armor" x="258" y="335" width="14" height="25"/>

  <!-- Schodiště mezi patry – naznačení -->
  <path d="M 460 308 L 470 298 L 480 298 L 490 288 L 500 288 L 500 308 Z" fill="#8B7355" stroke="#2A2522" stroke-width="0.8"/>

  <!-- Popisy vedle – vpravo -->
  <g transform="translate(600, 100)">
    <text class="title" x="0" y="0" font-size="13">Části objektu:</text>

    <line class="lead" x1="0" y1="20" x2="-80" y2="50"/>
    <text class="label" x="0" y="24">1 · pancéřová věž (18 t)</text>

    <line class="lead" x1="0" y1="48" x2="-90" y2="145"/>
    <text class="label" x="0" y="52">2 · hřídel / rotační ložisko</text>

    <line class="lead" x1="0" y1="76" x2="-100" y2="160"/>
    <text class="label" x="0" y="80">3 · bojové patro (věž+TK)</text>

    <line class="lead" x1="0" y1="104" x2="-95" y2="200"/>
    <text class="label" x="0" y="108">4 · rotační pohon (ruční)</text>

    <line class="lead" x1="0" y1="132" x2="-85" y2="260"/>
    <text class="label" x="0" y="136">5 · ubikace + sklad</text>

    <line class="lead" x1="0" y1="160" x2="-130" y2="270"/>
    <text class="label" x="0" y="164">6 · boční střílna LK vz. 26</text>

    <line class="lead" x1="0" y1="188" x2="-345" y2="345"/>
    <text class="label" x="0" y="192">7 · vstup s pancéř. dveřmi</text>
  </g>

  <!-- Kóty (výškové) -->
  <line x1="155" y1="150" x2="155" y2="240" stroke="#5A6B4F" stroke-width="0.6"/>
  <line x1="150" y1="150" x2="160" y2="150" stroke="#5A6B4F" stroke-width="0.6"/>
  <line x1="150" y1="240" x2="160" y2="240" stroke="#5A6B4F" stroke-width="0.6"/>
  <text class="dim" x="90" y="197">~1,5 m věž</text>

  <line x1="155" y1="240" x2="155" y2="398" stroke="#5A6B4F" stroke-width="0.6"/>
  <line x1="150" y1="398" x2="160" y2="398" stroke="#5A6B4F" stroke-width="0.6"/>
  <text class="dim" x="75" y="320">~3,0 m betonové těleso</text>

  <!-- Hmotnost -->
  <g transform="translate(600, 340)">
    <text class="title" x="0" y="0" font-size="13">Hmotnost a materiál:</text>
    <text class="label" x="0" y="20">beton: ~280 tun</text>
    <text class="label" x="0" y="36">pancíř: ~18 tun (Škoda)</text>
    <text class="label" x="0" y="52">stěny: 100–150 cm ŽB</text>
    <text class="callout" x="0" y="74">II. stupeň odolnosti</text>
  </g>
</svg>
