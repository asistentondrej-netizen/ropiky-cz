<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="Pěchotní srub — schéma">
  <rect width="200" height="140" fill="#F1ECE0"/>
  <path d="M 0 115 L 200 115 L 200 140 L 0 140 Z" fill="#5C6B3A" opacity="0.35"/>
  <!-- mohutný dvoukřídlý srub -->
  <g transform="translate(20 35)">
    <!-- tělo -->
    <path d="M 0 40 L 20 10 L 140 10 L 160 40 L 160 80 L 0 80 Z" fill="#8B7D62" stroke="#1A1612" stroke-width="1.5"/>
    <!-- pancéřový zvon nahoře -->
    <ellipse cx="80" cy="10" rx="18" ry="6" fill="#5E5646" stroke="#1A1612" stroke-width="1"/>
    <rect x="76" y="3" width="8" height="8" rx="1" fill="#1A1612"/>
    <!-- horní pás -->
    <path d="M 0 40 L 20 10 L 140 10 L 160 40 L 160 52 L 0 52 Z" fill="#7A6E55"/>
    <!-- 4 boční střílny (dvě křídla) -->
    <rect x="10" y="56" width="25" height="8" rx="1" fill="#1A1612"/>
    <rect x="45" y="56" width="22" height="8" rx="1" fill="#1A1612"/>
    <rect x="95" y="56" width="22" height="8" rx="1" fill="#1A1612"/>
    <rect x="125" y="56" width="25" height="8" rx="1" fill="#1A1612"/>
    <!-- patina -->
    <path d="M 22 64 Q 25 75 20 80" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M 138 64 Q 140 75 135 80" stroke="#5A4E3A" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>
  <!-- 3–4 směry palby -->
  <g opacity="0.5" stroke="#7A3B2E" stroke-width="1" stroke-dasharray="3 3" fill="#7A3B2E">
    <line x1="30" y1="95" x2="5" y2="112"/>
    <line x1="170" y1="95" x2="195" y2="112"/>
    <line x1="100" y1="45" x2="100" y2="15"/>
  </g>
  <text x="100" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A1612" opacity="0.6">pěchotní srub — těžké opevnění</text>
</svg>
