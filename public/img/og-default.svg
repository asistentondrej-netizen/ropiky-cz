<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Ropiky.cz — Open Graph image">
  <defs>
    <linearGradient id="ogsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8DFCC"/>
      <stop offset="100%" stop-color="#F1ECE0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#ogsky)"/>

  <!-- jemný grid -->
  <g opacity="0.07" stroke="#1A1612" stroke-width="0.5">
    <g>
      <line x1="0" y1="100" x2="1200" y2="100"/>
      <line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="0" y1="400" x2="1200" y2="400"/>
      <line x1="0" y1="500" x2="1200" y2="500"/>
    </g>
    <g>
      <line x1="100" y1="0" x2="100" y2="630"/>
      <line x1="300" y1="0" x2="300" y2="630"/>
      <line x1="500" y1="0" x2="500" y2="630"/>
      <line x1="700" y1="0" x2="700" y2="630"/>
      <line x1="900" y1="0" x2="900" y2="630"/>
      <line x1="1100" y1="0" x2="1100" y2="630"/>
    </g>
  </g>

  <!-- hory -->
  <path d="M 0 430 L 200 390 L 380 420 L 560 380 L 740 410 L 900 380 L 1100 410 L 1200 390 L 1200 500 L 0 500 Z" fill="#9AA28C" opacity="0.5"/>
  <path d="M 0 500 L 1200 470 L 1200 630 L 0 630 Z" fill="#5C6B3A"/>

  <!-- ŘOPÍK silhouette vpravo -->
  <g transform="translate(820 380)">
    <path d="M 0 50 L 25 20 L 175 20 L 200 50 L 200 130 L 0 130 Z" fill="#8B7D62" stroke="#1A1612" stroke-width="2"/>
    <path d="M 0 50 L 25 20 L 175 20 L 200 50 L 200 70 L 0 70 Z" fill="#7A6E55"/>
    <rect x="25" y="80" width="40" height="14" rx="2" fill="#1A1612"/>
    <rect x="80" y="80" width="40" height="14" rx="2" fill="#1A1612"/>
    <rect x="135" y="80" width="40" height="14" rx="2" fill="#1A1612"/>
  </g>

  <!-- text -->
  <text x="80" y="220" font-family="Georgia, 'Crimson Pro', serif" font-size="96" font-weight="700" fill="#1A1612">Ropiky.cz</text>
  <text x="80" y="280" font-family="Georgia, serif" font-size="34" font-style="italic" fill="#7A3B2E">Československé opevnění 1935–1938</text>

  <line x1="80" y1="320" x2="700" y2="320" stroke="#1A1612" stroke-width="2" opacity="0.3"/>

  <text x="80" y="370" font-family="Inter, sans-serif" font-size="22" fill="#1A1612" opacity="0.75">~10 000 objektů · 263 pěchotních srubů · 5 dělostřeleckých tvrzí</text>
  <text x="80" y="405" font-family="Inter, sans-serif" font-size="22" fill="#1A1612" opacity="0.75">Pevnosti, které nikdy nepadly v boji</text>

  <!-- razítko -->
  <g transform="translate(80 540)" opacity="0.85">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#7A3B2E" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#7A3B2E">ŘOP</text>
  </g>
  <text x="130" y="538" font-family="Inter, sans-serif" font-size="18" fill="#1A1612" opacity="0.7">Ředitelství opevňovacích prací</text>
  <text x="130" y="562" font-family="Inter, sans-serif" font-size="14" fill="#1A1612" opacity="0.5">www.ropiky.cz</text>
</svg>
